<!DOCTYPE html>
<html lang="es">
<head>
<style>
  body:not(.fonts-loaded) * { animation-play-state: paused !important; transition: none !important; }
  html, body { background:#00FF00 !important; }
  .bg-glow { display:none !important; }
</style>
<script>
  document.fonts.ready.then(() => {
    setTimeout(() => { document.body.classList.add("fonts-loaded"); }, 200);
  });
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=720">
<title>anim_l1_an2 — INICIO LECCIÓN</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Inter:wght@300;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1280px; height:720px; overflow:hidden; }
  .scene { background:#00FF00 !important;
    width:1280px; height:720px; position:relative; overflow:hidden;
    background:#00FF00;
    transform:translateX(100%);
    animation:slideIn .55s cubic-bezier(.2,0,.1,1) .1s forwards;
  }
  @keyframes slideIn { to{transform:translateX(0)} }
  .scene.exit { animation:slideOut .55s cubic-bezier(.9,0,.8,1) forwards; }
  @keyframes slideOut { from{transform:translateX(0)} to{transform:translateX(-100%)} }

  /* Silueta número grande de fondo */
  .number-bg {
    position:absolute; right:-30px; top:50%; transform:translateY(-50%);
    font-family:'Playfair Display',Georgia,serif;
    font-size:600px; font-weight:900; line-height:1;
    color:transparent;
    -webkit-text-stroke:2px rgba(107,26,42,.45);
    user-select:none; pointer-events:none;
    opacity:0; animation:numIn .8s ease-out .4s forwards;
  }
  @keyframes numIn { to{opacity:1} }

  .content {
    position:absolute; left:100px; top:50%; transform:translateY(-50%); z-index:2;
  }

  .accent-line {
    width:4px; height:0;
    background:linear-gradient(180deg,#E8C870,#E8C870,#E8C870);
    margin-bottom:24px;
    animation:growLine .4s ease-out .7s forwards;
  }
  @keyframes growLine { to{height:80px} }

  .leccion-nombre {
    font-family:'Playfair Display',Georgia,serif;
    font-size:76px; font-weight:900; color:#F9F3E8;
    line-height:1.05; max-width:720px; opacity:0;
  }
  .leccion-nombre.flash { animation:flashReveal 1.2s ease-out forwards; }
  @keyframes flashReveal {
    0%  {opacity:0}
    10% {opacity:1;filter:brightness(3) blur(2px)}
    20% {opacity:.3;filter:brightness(1) blur(0)}
    30% {opacity:1;filter:brightness(2.5) blur(1px)}
    45% {opacity:.5;filter:brightness(1) blur(0)}
    55% {opacity:1;filter:brightness(2) blur(.5px)}
    70% {opacity:.8}
    85% {opacity:1;filter:brightness(1.3)}
    100%{opacity:1;filter:brightness(1)}
  }

  .leccion-sub {
    font-family:'Inter',sans-serif; font-size:17px; font-weight:300;
    color:#E8C870; letter-spacing:.28em; text-transform:uppercase;
    margin-top:20px; opacity:0;
    animation:fadeUp .5s ease-out 2s forwards;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .glow {
    position:absolute; left:-100px; top:50%; transform:translateY(-50%);
    width:600px; height:600px;
    background:radial-gradient(ellipse,rgba(107,26,42,.3) 0%,transparent 70%);
    pointer-events:none;
  }
</style>
</head>
<body>
<div class="scene" id="scene">
  <div class="glow"></div>
  <div class="number-bg">1</div>
  <div class="content">
    <div class="accent-line"></div>
    <h1 class="leccion-nombre" id="titulo">¿Qué es el<br>Código Soberana?</h1>
    <p class="leccion-sub">Lección 1</p>
  </div>
</div>
<script>
  const DURACION_MS = 4000;
  setTimeout(() => { document.getElementById('titulo').classList.add('flash'); }, 900);
  setTimeout(() => { document.getElementById('scene').classList.add('exit'); }, DURACION_MS);
</script>
</body>
</html>
