<!DOCTYPE html>
<html lang="es">
<head>
<style>
  body:not(.fonts-loaded) * { animation-play-state: paused !important; transition: none !important; }
  html, body { background:#00FF00 !important; }
  .bg-glow { display:none !important; }
</style>
<script>
  document.fonts.ready.then(() => {
    setTimeout(() => { document.body.classList.add("fonts-loaded"); }, 200);
  });
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=720">
<title>anim_l1_an4 — NO ES v2</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:ital,wght@1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1280px; height:720px; overflow:hidden; background:#00FF00; }
  .scene {
    width:1280px; height:720px; position:relative;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:#00FF00;
  }
  .header {
    position:absolute; top:44px; left:0; right:0; text-align:center;
    opacity:0; animation:fadeIn .6s ease-out .3s forwards;
  }
  @keyframes fadeIn{to{opacity:1}}
  .header-label {
    font-family:'Inter',sans-serif; font-size:13px; font-weight:500;
    color:#C97080; letter-spacing:.3em; text-transform:uppercase; margin-bottom:6px;
  }
  .header-title {
    font-family:'Playfair Display',Georgia,serif; font-size:46px; font-weight:900; color:#F9F3E8;
  }
  .header-title span { color:#C97080; }

  .item-panel {
    position:absolute; width:860px;
    background:rgba(61,12,17,.35); border:1px solid rgba(107,26,42,.4);
    border-radius:12px; padding:30px 48px;
    opacity:0; transform:scale(.94);
    transition:opacity .4s ease,transform .4s ease;
  }
  .item-panel.visible { opacity:1; transform:scale(1); }
  .item-panel.hidden  { opacity:0; transform:scale(.94); pointer-events:none; }

  .item-name {
    font-family:'Cormorant Garamond',Georgia,serif;
    font-style:italic; font-size:56px; font-weight:400;
    color:#F9F3E8; margin-bottom:14px; position:relative; display:block;
  }
  .strike {
    position:absolute; left:0; right:0; top:52%;
    height:4px; background:#C97080;
    transform:scaleX(0); transform-origin:left; border-radius:2px;
    box-shadow:0 0 14px rgba(201,112,128,.7);
  }
  .item-panel.striked .strike { animation:strikeThru .4s ease-out forwards; }
  @keyframes strikeThru{to{transform:scaleX(1)}}

  .floaters { display:flex; gap:16px; flex-wrap:wrap; margin-top:8px; min-height:42px; align-items:center; }
  .icon-svg { opacity:0; animation:floatIn .4s ease-out forwards; flex-shrink:0; }
  .floater-text {
    font-family:'Inter',sans-serif; font-size:13px; color:#C97080;
    opacity:0; padding:4px 12px; border:1px solid rgba(201,112,128,.3);
    border-radius:20px; animation:floatIn .4s ease-out forwards;
    font-style:italic; letter-spacing:.04em;
  }
  @keyframes floatIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  .steps { display:flex; gap:8px; align-items:center; opacity:0; animation:floatIn .4s ease-out .3s forwards; }
  .step-num {
    width:30px; height:30px; border-radius:50%; border:1.5px solid rgba(107,26,42,.8);
    color:#C97080; font-family:'Inter',sans-serif; font-size:13px;
    display:flex; align-items:center; justify-content:center;
  }
  .step-arrow { color:#4A3038; font-size:14px; margin:0 2px; }
  .books-row { display:flex; gap:12px; align-items:center; opacity:0; animation:floatIn .5s ease-out .6s forwards; margin-left:14px; }
  .cal-note {
    font-family:'Inter',sans-serif; font-size:12px; color:#E8C870;
    padding:3px 10px; background:rgba(220,180,60,.12);
    border:1px solid rgba(220,180,60,.25); border-radius:12px; letter-spacing:.04em;
  }
  .big-x {
    position:absolute; top:50%; right:36px; transform:translateY(-50%) scale(0);
    font-size:72px; font-family:'Playfair Display',Georgia,serif;
    color:#C97080; font-weight:900; line-height:1; opacity:0;
    text-shadow:0 0 30px rgba(201,112,128,.5);
    transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .3s ease;
  }
  .item-panel.striked .big-x { transform:translateY(-50%) scale(1); opacity:1; }
</style>
</head>
<body>
<div class="scene">
  <div class="header">
    <p class="header-label">Lo que vas a recibir hoy</p>
    <h2 class="header-title">Código Soberana <span>NO ES:</span></h2>
  </div>

  <!-- Item 1 -->
  <div class="item-panel" id="item1">
    <span class="item-name">Taller promedio<div class="strike"></div></span>
    <div class="floaters">
      <svg class="icon-svg" style="animation-delay:.2s" width="28" height="32" viewBox="0 0 28 32" fill="none">
        <path d="M10 24V8l14-4v16" stroke="#C97080" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="7" cy="24" r="4" stroke="#C97080" stroke-width="1.5" fill="none"/>
        <circle cx="21" cy="20" r="4" stroke="#C97080" stroke-width="1.5" fill="none"/>
      </svg>
      <svg class="icon-svg" style="animation-delay:.35s" width="22" height="26" viewBox="0 0 22 26" fill="none">
        <path d="M8 20V6l10-3v13" stroke="#8B2D3F" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="5" cy="20" r="3.5" stroke="#8B2D3F" stroke-width="1.5" fill="none"/>
        <circle cx="15" cy="16" r="3.5" stroke="#8B2D3F" stroke-width="1.5" fill="none"/>
      </svg>
      <span class="floater-text" style="animation-delay:.48s">Tú puedes lograrlo</span>
      <span class="floater-text" style="animation-delay:.64s">Visualiza lo que quieres</span>
      <span class="floater-text" style="animation-delay:.80s">Activa tu mejor versión</span>
    </div>
    <div class="big-x">✕</div>
  </div>

  <!-- Item 2 -->
  <div class="item-panel" id="item2">
    <span class="item-name">Masterclass genérica<div class="strike"></div></span>
    <div class="steps">
      <span class="step-num">1</span><span class="step-arrow">—</span>
      <span class="step-num">2</span><span class="step-arrow">—</span>
      <span class="step-num">3</span><span class="step-arrow">—</span>
      <span class="step-num">4</span><span class="step-arrow">—</span>
      <span class="step-num">5</span>
      <div class="books-row">
        <svg width="20" height="25" viewBox="0 0 20 25" fill="none"><rect x="2" y="1" width="16" height="23" rx="2" stroke="#C97080" stroke-width="1.5"/><line x1="6" y1="1" x2="6" y2="24" stroke="#C97080" stroke-width="1.5"/><line x1="9" y1="6" x2="16" y2="6" stroke="#C97080" stroke-width="1"/><line x1="9" y1="10" x2="16" y2="10" stroke="#C97080" stroke-width="1"/></svg>
        <svg width="20" height="25" viewBox="0 0 20 25" fill="none"><rect x="2" y="1" width="16" height="23" rx="2" stroke="#8B2D3F" stroke-width="1.5"/><line x1="6" y1="1" x2="6" y2="24" stroke="#8B2D3F" stroke-width="1.5"/><line x1="9" y1="6" x2="16" y2="6" stroke="#8B2D3F" stroke-width="1"/><line x1="9" y1="10" x2="16" y2="10" stroke="#8B2D3F" stroke-width="1"/></svg>
        <svg width="20" height="25" viewBox="0 0 20 25" fill="none"><rect x="2" y="1" width="16" height="23" rx="2" stroke="#E8C870" stroke-width="1.5"/><line x1="6" y1="1" x2="6" y2="24" stroke="#E8C870" stroke-width="1.5"/><line x1="9" y1="6" x2="16" y2="6" stroke="#E8C870" stroke-width="1"/><line x1="9" y1="10" x2="16" y2="10" stroke="#E8C870" stroke-width="1"/></svg>
        <span class="cal-note">3 semanas</span>
      </div>
    </div>
    <div class="big-x">✕</div>
  </div>

  <!-- Item 3 -->
  <div class="item-panel" id="item3">
    <span class="item-name">Trucos para manipular a tu pareja<div class="strike"></div></span>
    <div class="floaters">
      <svg class="icon-svg" style="animation-delay:.2s" width="28" height="36" viewBox="0 0 28 36" fill="none">
        <path d="M10 4h8M9 4L5 14v18a2 2 0 002 2h14a2 2 0 002-2V14L19 4" stroke="#C97080" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M5 20h18" stroke="#C97080" stroke-width="1" stroke-dasharray="3 2"/>
        <circle cx="14" cy="27" r="2.5" fill="#C97080" opacity=".4"/>
      </svg>
      <svg class="icon-svg" style="animation-delay:.38s" width="38" height="22" viewBox="0 0 38 22" fill="none">
        <path d="M2 11C2 11 8 2 19 2s17 9 17 9-6 9-17 9S2 11 2 11z" stroke="#8B2D3F" stroke-width="1.5"/>
        <circle cx="19" cy="11" r="4" stroke="#8B2D3F" stroke-width="1.5"/>
        <circle cx="19" cy="11" r="1.5" fill="#8B2D3F"/>
      </svg>
      <span class="floater-text" style="animation-delay:.52s">Trucos psicológicos</span>
      <span class="floater-text" style="animation-delay:.68s">Detectados en 48 horas</span>
    </div>
    <div class="big-x">✕</div>
  </div>
</div>
<script>
  function show(id,t)  { setTimeout(()=>document.getElementById(id).classList.add('visible'),t) }
  function strike(id,t){ setTimeout(()=>document.getElementById(id).classList.add('striked'),t) }
  function hide(id,t)  {
    setTimeout(()=>{
      document.getElementById(id).classList.remove('visible');
      document.getElementById(id).classList.add('hidden');
    },t)
  }
  show('item1', 900);  strike('item1', 3800); hide('item1', 5200);
  show('item2', 5600); strike('item2', 8500); hide('item2', 9800);
  show('item3',10200); strike('item3',13000);
</script>
</body>
</html>
