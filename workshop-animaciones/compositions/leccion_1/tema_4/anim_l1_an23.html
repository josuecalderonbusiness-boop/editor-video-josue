<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1280px; height:720px; overflow:hidden; background:#00FF00; }
  .scene {
    width:1280px; height:720px; position:relative;
    background:#00FF00;
    display:flex; align-items:center; justify-content:center;
    gap:80px;
    opacity:0; animation:fadeIn .5s ease-out .1s forwards;
  }
  @keyframes fadeIn { to{opacity:1} }
  .scene.out { animation:fadeOut .6s ease-in forwards; }
  @keyframes fadeOut { to{opacity:0} }

  /* Texto izquierdo */
  .left-text {
    max-width:460px; z-index:2;
    opacity:0; transform:translateX(-20px);
    animation:slideIn .5s ease-out .5s forwards;
  }
  @keyframes slideIn { to{opacity:1;transform:translateX(0)} }

  .left-label {
    font-family:'Inter',sans-serif; font-size:13px; font-weight:500;
    color:#E8C870; letter-spacing:.25em; text-transform:uppercase;
    margin-bottom:14px;
    background:rgba(15,10,11,.85); padding:5px 14px; border-radius:4px;
    display:inline-block; border-left:3px solid #E8C870;
    text-shadow:0 0 10px rgba(232,200,112,.5);
  }

  .left-title {
    font-family:'Playfair Display',Georgia,serif;
    font-size:42px; font-weight:900; color:#F9F3E8; line-height:1.15;
    margin-bottom:16px;
    background:rgba(15,10,11,.85); padding:10px 16px; border-radius:6px;
    text-shadow:0 0 20px rgba(255,255,255,.2);
  }

  .left-pregunta {
    font-family:'Cormorant Garamond',Georgia,serif;
    font-style:italic; font-size:26px; color:#F9F3E8; line-height:1.5;
    background:rgba(61,12,17,.88); padding:16px 20px; border-radius:8px;
    border-left:3px solid #E8C870;
    opacity:0; animation:fadeIn .5s ease-out 1.8s forwards;
  }
  .left-pregunta span { color:#E8C870; }

  .left-instruccion {
    font-family:'Inter',sans-serif; font-size:15px; font-weight:300;
    color:#C97080; margin-top:12px; line-height:1.5;
    background:rgba(15,10,11,.7); padding:10px 14px; border-radius:6px;
    opacity:0; animation:fadeIn .5s ease-out 2.8s forwards;
  }

  /* Mockup celular */
  .phone-wrap {
    position:relative; z-index:2;
    opacity:0; transform:translateY(20px) scale(.95);
    animation:phoneIn .6s cubic-bezier(.2,0,.1,1) .8s forwards;
  }
  @keyframes phoneIn { to{opacity:1;transform:translateY(0) scale(1)} }

  .phone {
    width:240px; height:480px; position:relative;
    background:#1a1a1a;
    border-radius:36px;
    border:3px solid #333;
    box-shadow:
      0 0 0 1px #444,
      0 25px 60px rgba(0,0,0,.6),
      0 0 40px rgba(232,200,112,.15);
    overflow:hidden;
  }

  /* Notch */
  .phone-notch {
    position:absolute; top:0; left:50%; transform:translateX(-50%);
    width:80px; height:22px; background:#1a1a1a;
    border-radius:0 0 14px 14px; z-index:10;
  }

  /* Pantalla del celular */
  .phone-screen {
    width:100%; height:100%; position:relative; overflow:hidden;
    border-radius:34px;
  }

  /* Tap indicator */
  .tap-dot {
    position:absolute; width:40px; height:40px;
    border-radius:50%; background:rgba(232,200,112,.4);
    border:2px solid rgba(232,200,112,.8);
    top:38%; left:60%; transform:translate(-50%,-50%) scale(0);
    opacity:0; z-index:20;
    animation:tapEffect .6s ease-out 2.2s forwards;
  }
  @keyframes tapEffect {
    0%  { transform:translate(-50%,-50%) scale(0); opacity:0; }
    30% { transform:translate(-50%,-50%) scale(1); opacity:1; }
    70% { transform:translate(-50%,-50%) scale(1.4); opacity:.5; }
    100%{ transform:translate(-50%,-50%) scale(1.8); opacity:0; }
  }

  /* Flecha indicadora */
  .arrow {
    position:absolute; right:-45px; top:50%; transform:translateY(-50%);
    font-size:28px; color:#E8C870;
    opacity:0; animation:arrowPulse 1s ease-in-out 1.5s infinite;
    text-shadow:0 0 12px rgba(232,200,112,.8);
  }
  @keyframes arrowPulse {
