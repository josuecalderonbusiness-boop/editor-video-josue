<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=720">
<title>anim_l1_an11 — 20 años</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:ital,wght@1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1280px; height:720px; overflow:hidden; background:#00FF00; }

  .scene {
    width:1280px; height:720px; position:relative;
    background:#00FF00;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:12px;
    opacity:0; animation:fadeIn .5s ease-out .1s forwards;
  }
  @keyframes fadeIn { to{opacity:1} }
  .scene.out { animation:fadeOut .6s ease-in forwards; }
  @keyframes fadeOut { to{opacity:0} }

  /* Título */
  .titulo {
    font-family:'Playfair Display',Georgia,serif;
    font-size:24px; font-weight:700; color:#F9F3E8;
    text-align:center;
    background:rgba(15,10,11,.85);
    padding:6px 20px; border-radius:6px;
    border-bottom:2px solid #E8C870;
    opacity:0; animation:fadeIn .5s ease-out .4s forwards;
    text-shadow:0 0 20px rgba(255,255,255,.15);
  }
  .titulo span { color:#E8C870; }

  /* Grid */
  .grid {
    display:flex; gap:12px; align-items:stretch;
  }

  /* Card */
  .card {
    width:178px; display:flex; flex-direction:column;
    background:rgba(15,10,11,.88);
    border:1px solid rgba(232,200,112,.25);
    border-radius:10px; overflow:hidden;
    opacity:0; transform:translateY(18px);
    box-shadow:0 4px 20px rgba(15,10,11,.5);
  }

  .card:nth-child(1){ animation:riseIn .4s ease-out 0.8s forwards; }
  .card:nth-child(2){ animation:riseIn .4s ease-out 1.5s forwards; }
  .card:nth-child(3){ animation:riseIn .4s ease-out 2.2s forwards; }
  .card:nth-child(4){ animation:riseIn .4s ease-out 2.9s forwards; }
  .card:nth-child(5){ animation:riseIn .4s ease-out 3.6s forwards; }
  .card:nth-child(6){ animation:riseIn .4s ease-out 4.3s forwards; }

  @keyframes riseIn { to{opacity:1;transform:translateY(0)} }

  /* Foto */
  .card-img {
    width:100%; height:180px;
    object-fit:cover; object-position:center 20%;
    display:block;
  }

  /* Línea */
  .card-line {
    width:0; height:2px;
    background:linear-gradient(90deg,#E8C870,#D4A843,transparent);
    animation:lineGrow .3s ease-out forwards;
  }
  .card:nth-child(1) .card-line { animation-delay:.9s; }
  .card:nth-child(2) .card-line { animation-delay:1.6s; }
  .card:nth-child(3) .card-line { animation-delay:2.3s; }
  .card:nth-child(4) .card-line { animation-delay:3.0s; }
  .card:nth-child(5) .card-line { animation-delay:3.7s; }
  .card:nth-child(6) .card-line { animation-delay:4.4s; }
  @keyframes lineGrow { to{width:100%} }

  .card-body { padding:10px 12px; flex:1; }
  .card-label {
    font-family:'Cormorant Garamond',Georgia,serif;
    font-style:italic; font-size:16px; color:#F9F3E8; line-height:1.3;
  }
  .card-sub {
    font-family:'Inter',sans-serif; font-size:10px; font-weight:300;
    color:#E8C870; letter-spacing:.08em; text-transform:uppercase; margin-top:3px;
  }

  /* Cards especiales (pérdida) */
  .card.especial { border-color:rgba(201,112,128,.35); }
  .card.especial .card-line {
    background:linear-gradient(90deg,#C97080,#A84455,transparent);
  }
  .card.especial .card-label { color:#F0D0D5; }
  .card.especial .card-sub { color:#C97080; }
</style>
</head>
