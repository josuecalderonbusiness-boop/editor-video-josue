<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=720">
<title>anim_l1_an10 — Tormenta Gemini</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1280px; height:720px; overflow:hidden; background:#EDE3CE; }

  .scene {
    width:1280px; height:720px; position:relative;
    overflow:hidden;
    opacity:0; animation:fadeIn .4s ease-out .1s forwards;
  }
  @keyframes fadeIn { to{opacity:1} }

  /* Video de fondo */
  .bg-video {
    position:absolute; top:0; left:0;
    width:1280px; height:720px;
    object-fit:cover;
  }

  /* Borde izquierdo borgoña */
  .scene::before {
    content:''; position:absolute; left:0;top:0;bottom:0;
    width:6px; background:linear-gradient(180deg,#3D0C11,#6B1A2A,#3D0C11);
    z-index:10;
  }
  /* Borde superior dorado */
  .scene::after {
    content:''; position:absolute; top:0;left:0;right:0; height:3px;
    background:linear-gradient(90deg,#6B1A2A,#E8C870,#D4A843,#E8C870,#6B1A2A);
    z-index:10;
  }

  /* Labels */
  .label {
    position:absolute;
    font-family:'Cormorant Garamond',Georgia,serif;
    font-style:italic; font-size:22px; color:#3D0C11;
    background:rgba(237,227,206,.88);
    padding:6px 14px; border-radius:4px;
    border-left:3px solid #E8C870;
    opacity:0; animation:fadeIn .6s ease-out forwards;
    z-index:5;
    box-shadow:0 2px 12px rgba(61,12,17,.15);
  }

  .label-tu {
    bottom:60px; left:80px;
    animation-delay:4.0s;
  }
  .label-yo {
    top:60px; right:80px;
    animation-delay:7.0s;
  }

  /* Fade out al final */
  .scene.out { animation:fadeOut .7s ease-in forwards; }
  @keyframes fadeOut { to{opacity:0} }
</style>
</head>
<body>
<div class="scene" id="scene">

  <!-- Video Gemini de fondo -->
  <video class="bg-video" id="bgVideo" autoplay muted playsinline>
    <source src="tormenta.mp4" type="video/mp4">
  </video>

  <!-- Labels -->
  <p class="label label-tu">tú — dentro de la tormenta</p>
  <p class="label label-yo">yo — viendo el panorama completo</p>

</div>
<script>
  const DURACION_MS = 13000;
  setTimeout(() => { document.getElementById('scene').classList.add('out'); }, DURACION_MS);
</script>
</body>
</html>
