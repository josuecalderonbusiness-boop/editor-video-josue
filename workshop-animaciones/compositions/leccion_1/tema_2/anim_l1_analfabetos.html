<!DOCTYPE html>
<html lang="es">
<head>
<style>
  body:not(.fonts-loaded) * { animation-play-state: paused !important; transition: none !important; }
</style>
<script>
  document.fonts.ready.then(() => {
    setTimeout(() => { document.body.classList.add("fonts-loaded"); }, 1500);
  });
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=720">
<title>anim_l1 — Analfabetos emocionales</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Cormorant+Garamond:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1280px; height:720px; overflow:hidden; background:#0F0A0B; }

  .slide {
    position:absolute; inset:0;
    width:1280px; height:720px;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    opacity:0; pointer-events:none;
    overflow:hidden;
  }

  @keyframes enterUp {
    0%   { opacity:0; transform:translateY(60px) scale(.96); }
    100% { opacity:1; transform:translateY(0) scale(1); }
  }
  @keyframes exitUp {
    0%   { opacity:1; transform:translateY(0); }
    100% { opacity:0; transform:translateY(-60px); }
  }
  @keyframes wordBlur {
    0%   { opacity:0; filter:blur(12px); transform:translateY(20px); }
    100% { opacity:1; filter:blur(0); transform:translateY(0); }
  }
  @keyframes lineGrow {
    0%   { width:0; opacity:0; }
    100% { width:100%; opacity:1; }
  }
  @keyframes fadeIn { to { opacity:1; } }
  @keyframes pulse {
    0%,100% { opacity:.7; transform:scale(1); }
    50%     { opacity:1; transform:scale(1.02); }
  }

  /* ── SLIDE 1: "MUCHOS HOMBRES" ── */
  #s1 {
    background:linear-gradient(135deg, #0F0A0B 0%, #1C0A0E 50%, #3D0C11 100%);
  }
  #s1 .palabra {
    font-family:'Playfair Display',serif; font-weight:900;
    font-size:96px; color:rgba(249,243,232,.18);
    letter-spacing:.05em; text-transform:uppercase;
    position:absolute; top:40px; left:60px;
    opacity:0; animation:fadeIn .5s ease-out .2s forwards;
  }
  #s1 .grande {
    font-family:'Playfair Display',serif; font-weight:900;
    font-size:168px; color:#F9F3E8; line-height:.88;
    text-align:center; z-index:2;
    opacity:0; animation:wordBlur .5s ease-out .3s forwards;
    text-shadow:0 0 60px rgba(201,112,128,.2);
  }
  #s1 .grande em {
    color:#E8C870; font-style:normal;
    display:block; font-size:120px;
  }
  #s1 .sub {
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:46px; color:rgba(249,243,232,.5);
    margin-top:20px; z-index:2;
    opacity:0; animation:fadeIn .4s ease-out .8s forwards;
  }

  /* ── SLIDE 2: "ANALFABETOS EMOCIONALES" ── */
  #s2 {
    background:linear-gradient(135deg, #3D0C11 0%, #6B1A2A 60%, #4A1520 100%);
  }
  #s2 .linea-deco {
    position:absolute; left:0; top:0; bottom:0; width:10px;
    background:linear-gradient(180deg, transparent, #E8C870, #B8892A, #E8C870, transparent);
  }
  #s2 .grande {
    font-family:'Playfair Display',serif; font-weight:900;
    font-size:120px; color:#F9F3E8; line-height:.9;
    text-align:center; z-index:2;
    opacity:0; animation:wordBlur .5s ease-out .2s forwards;
    text-shadow:0 0 80px rgba(249,243,232,.12);
  }
  #s2 .grande span {
    display:block; font-size:92px; color:#E8C870;
    opacity:0; animation:wordBlur .5s ease-out .6s forwards;
  }
  #s2 .linea {
    height:4px; background:linear-gradient(90deg, transparent, #E8C870, transparent);
    border-radius:2px; margin-top:24px; z-index:2;
    width:0; animation:lineGrow .6s ease-out 1.0s forwards;
    max-width:640px;
  }

  /* ── SLIDE 3: "ATRAPADOS" ── */
  #s3 {
    background:linear-gradient(135deg, #0A0608 0%, #1A0D14 60%, #0F0A0B 100%);
  }
  #s3 .bg-num {
    position:absolute; font-family:'Playfair Display',serif; font-weight:900;
    font-size:580px; color:rgba(107,26,42,.06);
    line-height:1; right:-60px; top:-80px; z-index:0;
    pointer-events:none; opacity:0;
    animation:fadeIn .6s ease-out .1s forwards;
  }
  #s3 .grande {
    font-family:'Playfair Display',serif; font-weight:900;
    font-size:190px; color:#F9F3E8; line-height:.85;
    text-align:center; z-index:2;
    opacity:0; animation:wordBlur .5s ease-out .2s forwards;
    text-shadow:0 0 80px rgba(201,112,128,.15);
  }
  #s3 .sub {
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:46px; color:rgba(232,200,112,.65);
    margin-top:18px; z-index:2; text-align:center;
    opacity:0; animation:fadeIn .4s ease-out .7s forwards;
  }

  /* ── SLIDE 4: "SOBREVIVIR Y PROVEER" ── */
  #s4 {
    background:linear-gradient(135deg, #1C1114 0%, #2D1520 50%, #1A0810 100%);
  }
  #s4 .grande {
    font-family:'Playfair Display',serif; font-weight:900;
    font-size:130px; color:#F9F3E8; line-height:.9;
    text-align:center; z-index:2;
    opacity:0; animation:wordBlur .5s ease-out .2s forwards;
  }
  #s4 .grande span {
    display:block; font-size:108px;
    color:#E8C870;
    opacity:0; animation:wordBlur .5s ease-out .55s forwards;
  }
  #s4 .sub {
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:38px; color:rgba(249,243,232,.4);
    margin-top:18px; z-index:2; text-align:center; max-width:800px;
    opacity:0; animation:fadeIn .4s ease-out .9s forwards;
  }
  #s4 .linea {
    height:3px; background:linear-gradient(90deg, transparent, rgba(232,200,112,.4), transparent);
    border-radius:2px; margin-top:20px; z-index:2;
    width:0; animation:lineGrow .5s ease-out 1.1s forwards;
    max-width:480px;
  }
</style>
</head>
<body>

<!-- S1: Muchos hombres -->
<div class="slide" id="s1">
  <p class="palabra">HOMBRES</p>
  <p class="grande">NO SON<br><em>FRÍOS.</em></p>
  <p class="sub">Muchos hombres no son fríos.</p>
</div>

<!-- S2: Analfabetos emocionales -->
<div class="slide" id="s2">
  <div class="linea-deco"></div>
  <p class="grande">ANALFABETOS<span>EMOCIONALES</span></p>
  <div class="linea"></div>
</div>

<!-- S3: Atrapados -->
<div class="slide" id="s3">
  <div class="bg-num">∞</div>
  <p class="grande">ATRAPADOS</p>
  <p class="sub">en una estructura lógica</p>
</div>

<!-- S4: Sobrevivir y proveer -->
<div class="slide" id="s4">
  <p class="grande">SOBREVIVIR<span>Y PROVEER.</span></p>
  <p class="sub">Es la única que les enseñaron.</p>
  <div class="linea"></div>
</div>

<script>
  // 4:56 → 5:09 = 13 segundos
  const SLIDES = [
    { id:'s1', dur:3000 },
    { id:'s2', dur:3500 },
    { id:'s3', dur:3000 },
    { id:'s4', dur:4500 },
  ];
  const TRANS = 350;
  let current = 0;

  function show(idx) {
    const el = document.getElementById(SLIDES[idx].id);
    el.style.opacity = '1';
    el.style.pointerEvents = 'auto';
    el.style.animation = `enterUp ${TRANS}ms ease-out forwards`;
  }

  function hide(idx) {
    const el = document.getElementById(SLIDES[idx].id);
    el.style.animation = `exitUp ${TRANS}ms ease-in forwards`;
    setTimeout(() => {
      el.style.opacity = '0';
      el.style.pointerEvents = 'none';
      el.style.animation = '';
    }, TRANS);
  }

  function next() {
    hide(current);
    current++;
    if (current < SLIDES.length) {
      setTimeout(() => {
        show(current);
        if (current < SLIDES.length - 1) {
          setTimeout(next, SLIDES[current].dur);
        }
      }, TRANS);
    }
  }

  show(0);
  setTimeout(next, SLIDES[0].dur);
</script>
</body>
</html>
