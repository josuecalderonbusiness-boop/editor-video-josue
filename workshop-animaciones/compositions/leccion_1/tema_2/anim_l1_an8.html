<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1280px; height:720px; overflow:hidden; background:#00FF00; }

  .scene {
    width:1280px; height:720px; position:relative;
    background:#00FF00;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 40px;
    opacity:0; animation:fadeIn .5s ease-out .1s forwards;
  }
  @keyframes fadeIn { to{opacity:1} }
  .scene.out { animation:fadeOut .6s ease-in forwards; }
  @keyframes fadeOut { to{opacity:0} }

  /* Espacio central para el hablante */
  .center-space { width:440px; flex-shrink:0; }

  /* Paneles laterales */
  .side-panel { width:360px; display:flex; flex-direction:column; gap:14px; }

  /* Card de foto */
  .photo-card {
    background:rgba(15,10,11,.88);
    border:1px solid rgba(232,200,112,.3);
    border-radius:10px; overflow:hidden;
    opacity:0; transform:translateX(-24px);
    box-shadow:0 4px 20px rgba(15,10,11,.4);
  }
  .side-panel.right .photo-card { transform:translateX(24px); }

  .photo-card:nth-child(1){ animation:slideIn .45s ease-out 1.0s forwards; }
  .photo-card:nth-child(2){ animation:slideIn .45s ease-out 2.2s forwards; }
  .photo-card:nth-child(3){ animation:slideIn .45s ease-out 3.4s forwards; }
  .side-panel.right .photo-card:nth-child(1){ animation:slideInR .45s ease-out 1.6s forwards; }
  .side-panel.right .photo-card:nth-child(2){ animation:slideInR .45s ease-out 2.8s forwards; }

  @keyframes slideIn  { to{opacity:1;transform:translateX(0)} }
  @keyframes slideInR { to{opacity:1;transform:translateX(0)} }

  /* Imagen de la foto */
  .photo-img {
    width:100%; height:180px;
    object-fit:cover; object-position:center 20%;
    display:block;
  }

  /* Línea dorada */
  .card-line {
    width:0; height:2px;
    background:linear-gradient(90deg,#E8C870,#D4A843,transparent);
    animation:lineGrow .3s ease-out forwards;
  }
  .photo-card:nth-child(1) .card-line { animation-delay:1.1s; }
  .photo-card:nth-child(2) .card-line { animation-delay:2.3s; }
  .photo-card:nth-child(3) .card-line { animation-delay:3.5s; }
  .side-panel.right .photo-card:nth-child(1) .card-line { animation-delay:1.7s; }
  .side-panel.right .photo-card:nth-child(2) .card-line { animation-delay:2.9s; }
  @keyframes lineGrow { to{width:100%} }

  /* Texto */
  .card-body { padding:10px 14px; }
  .card-label {
    font-family:'Cormorant Garamond',Georgia,serif;
    font-style:italic; font-size:18px; color:#F9F3E8; line-height:1.3;
  }
  .card-sub {
    font-family:'Inter',sans-serif; font-size:11px; font-weight:300;
    color:#E8C870; letter-spacing:.1em; text-transform:uppercase; margin-top:3px;
  }
</style>
</head>
