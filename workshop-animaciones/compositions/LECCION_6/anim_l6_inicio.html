<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>L6 — INICIO_LECCION</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,400&family=Inter:wght@300&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1280px; height:720px; overflow:hidden; background:#0F0A0B; }
.scene {
  width:1280px; height:720px; position:relative; overflow:hidden;
  background: linear-gradient(135deg, #0F0A0B 0%, #5C4415 45%, #B8892A 100%);
  display:flex; align-items:center; justify-content:center;
  opacity:0; animation: fadeIn 0.4s ease forwards 0.1s, fadeOut 0.5s ease forwards 4.5s;
}
@keyframes fadeIn { to { opacity:1; } }
@keyframes fadeOut { to { opacity:0; } }
.num-bg {
  position:absolute; right:-30px; top:50%; transform:translateY(-50%) translateX(80px);
  font-family:'Playfair Display',serif; font-weight:900; font-size:620px; line-height:1;
  color:transparent; -webkit-text-stroke:2px rgba(184,137,42,0.35); user-select:none;
  opacity:0; animation: numSlide 0.8s cubic-bezier(0.25,0.46,0.45,0.94) forwards 0.2s;
}
@keyframes numSlide { to { opacity:1; transform:translateY(-50%) translateX(0); } }
.accent-bar {
  position:absolute; left:60px; top:50%; transform:translateY(-50%);
  width:5px; height:0;
  background: linear-gradient(180deg, #F9F3E8, #E8C870);
  box-shadow:0 0 20px rgba(249,243,232,0.5);
  animation: barGrow 0.6s ease forwards 0.6s;
}
@keyframes barGrow { to { height:220px; } }
.content { position:relative; z-index:10; padding-left:100px; width:100%; }
.label {
  font-family:'Inter',sans-serif; font-weight:300; font-size:15px;
  letter-spacing:6px; color:#F9F3E8; text-transform:uppercase;
  margin-bottom:12px; transform:translateX(-20px); opacity:0;
  animation: slideR 0.5s ease forwards 0.9s;
}
@keyframes slideR { to { opacity:1; transform:translateX(0); } }
.num {
  font-family:'Playfair Display',serif; font-weight:900; font-size:26px;
  color:#F9F3E8; margin-bottom:6px;
  opacity:0; animation: flash 0.35s steps(1) forwards 1.1s;
}
.protocolo-label {
  font-family:'Inter',sans-serif; font-weight:300; font-size:18px;
  letter-spacing:4px; color:#F5E4B0; text-transform:uppercase;
  margin-bottom:8px;
  opacity:0; animation: flash 0.35s steps(1) forwards 1.2s;
}
.t1 {
  font-family:'Playfair Display',serif; font-weight:900; font-size:72px;
  line-height:1.05; color:#0F0A0B;
  text-shadow:0 0 40px rgba(15,10,11,0.3);
  opacity:0; animation: flash 0.35s steps(1) forwards 1.35s;
}
.t2 {
  font-family:'Playfair Display',serif; font-weight:900; font-size:72px;
  line-height:1.05; color:#0F0A0B;
  opacity:0; animation: flash 0.35s steps(1) forwards 1.5s;
}
@keyframes flash {
  0%{opacity:0}15%{opacity:1}30%{opacity:0}50%{opacity:1}70%{opacity:0}100%{opacity:1}
}
.linea {
  width:0; height:2px; margin-top:20px;
  background:linear-gradient(90deg,#0F0A0B,transparent);
  animation:lineaGrow 0.7s ease forwards 1.8s;
}
@keyframes lineaGrow { to { width:520px; } }
</style>
</head>
<body>
<div class="scene">
  <div class="num-bg">6</div>
  <div class="accent-bar"></div>
  <div class="content">
    <div class="label">Lección</div>
    <div class="num">06</div>
    <div class="protocolo-label">Protocolo 2 · Lo que sientes</div>
    <div class="t1">La Dimensión</div>
    <div class="t2">Emocional</div>
    <div class="linea"></div>
  </div>
</div>
<script>
document.fonts.ready.then(() => { setTimeout(() => {}, 1500); });
</script>
</body>
</html>
