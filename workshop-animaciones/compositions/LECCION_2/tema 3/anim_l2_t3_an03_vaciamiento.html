<!DOCTYPE html>
<html lang="es">
<head>
<style>
  body:not(.fonts-loaded) * { animation-play-state: paused !important; transition: none !important; }
</style>
<script>
  document.fonts.ready.then(() => {
    setTimeout(() => { document.body.classList.add("fonts-loaded"); }, 1500);
  });
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=720">
<title>anim_l2_t3_an03 — El vaciamiento</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Cormorant+Garamond:ital,wght@1,600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1280px; height:720px; overflow:hidden; }

  .pizarra {
    position:absolute; inset:0;
    background:#F0E8D5;
    background-image:
      linear-gradient(rgba(139,100,60,.13) 1px, transparent 1px),
      linear-gradient(90deg, rgba(139,100,60,.13) 1px, transparent 1px);
    background-size:56px 56px;
  }
  .pizarra::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:8px;
    background:linear-gradient(180deg, #3D0C11, #6B1A2A, #3D0C11);
  }
  .pizarra::after {
    content:''; position:absolute; top:0; left:0; right:0; height:4px;
    background:linear-gradient(90deg, #6B1A2A, #E8C870, #E8C870, #6B1A2A);
  }
  .papel-texture {
    position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(ellipse at 20% 50%, rgba(255,245,220,.6) 0%, transparent 60%),
               radial-gradient(ellipse at 80% 50%, rgba(220,200,160,.3) 0%, transparent 60%);
  }

  .slide {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; z-index:2;
  }
  @keyframes cardIn {
    0%   { opacity:0; transform:translateY(65px) rotate(-1.5deg) scale(.93); }
    68%  { transform:translateY(-9px) rotate(.4deg) scale(1.01); }
    100% { opacity:1; transform:translateY(0) rotate(0deg) scale(1); }
  }
  @keyframes cardOut {
    0%   { opacity:1; transform:translateY(0) scale(1); }
    100% { opacity:0; transform:translateY(-65px) scale(.94); }
  }
  @keyframes lineGrow { 0%{width:0;opacity:0} 100%{width:100%;opacity:1} }
  @keyframes fadeIn   { to{opacity:1} }
  @keyframes checkDraw { to{stroke-dashoffset:0} }

  .card {
    border-radius:16px; padding:52px 76px;
    position:relative;
    box-shadow: 6px 8px 0px rgba(61,12,17,.25), 0 20px 50px rgba(61,12,17,.15);
    display:flex; flex-direction:column; align-items:flex-start;
    min-width:900px; opacity:0;
  }
  .card::after {
    content:''; position:absolute; inset:-2px; border-radius:18px;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.14); pointer-events:none;
  }
  .card-vino   { background:linear-gradient(135deg, #3D0C11, #6B1A2A); }
  .card-negro  { background:linear-gradient(135deg, #0F0A0B, #1C1114); }
  .card-medio  { background:linear-gradient(135deg, #6B1A2A, #8B2D3F); }
  .card-oscuro { background:linear-gradient(135deg, #1A0810, #3D0C11); }

  .card-numero {
    font-family:'Playfair Display',serif; font-weight:900;
    font-size:18px; letter-spacing:.25em; color:rgba(255,255,255,.25);
    margin-bottom:14px; opacity:0; animation:fadeIn .3s ease-out forwards;
  }
  .card-palabra {
    font-family:'Playfair Display',serif; font-weight:900;
    font-size:148px; color:#F9F3E8; line-height:.85;
    text-shadow:0 4px 30px rgba(0,0,0,.3);
  }
  .card-contexto {
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:50px; color:rgba(249,243,232,.65);
    margin-top:16px; line-height:1.2;
    opacity:0; animation:fadeIn .4s ease-out forwards;
  }
  .card-linea {
    height:3px; background:rgba(232,200,112,.5); border-radius:2px;
    margin:20px 0 0; width:0; animation:lineGrow .5s ease-out forwards;
  }
  .card-check {
    position:absolute; bottom:32px; right:44px;
    opacity:0; animation:fadeIn .3s ease-out forwards;
  }
  .card-check svg { width:52px; height:52px; }
  .c-circle {
    fill:none; stroke:rgba(232,200,112,.7); stroke-width:2;
    stroke-dasharray:110; stroke-dashoffset:110;
    animation:checkDraw .4s ease-out forwards;
  }
  .c-mark {
    fill:none; stroke:#F9F3E8; stroke-width:3;
    stroke-linecap:round; stroke-linejoin:round;
    stroke-dasharray:30; stroke-dashoffset:30;
    animation:checkDraw .3s ease-out forwards;
  }
  .card-svg {
    position:absolute; right:64px; top:50%; transform:translateY(-50%);
    opacity:0; animation:fadeIn .6s ease-out forwards;
  }

  /* S0 título */
  #s0 .titulo-pizarra {
    font-family:'Playfair Display',serif; font-weight:900;
    font-size:100px; color:#3D0C11; text-align:center; line-height:1.0;
    opacity:0; animation:cardIn .6s ease-out .3s forwards;
    text-shadow:2px 3px 0 rgba(61,12,17,.12);
  }
  #s0 .sub-pizarra {
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:52px; color:#6B1A2A; text-align:center; margin-top:18px;
    opacity:0; animation:fadeIn .5s ease-out .9s forwards;
  }
  #s0 .linea-titulo {
    height:5px; width:0;
    background:linear-gradient(90deg, #6B1A2A, #E8C870, #6B1A2A);
    border-radius:3px; margin:20px auto 0;
    animation:lineGrow .6s ease-out 1.0s forwards;
  }

  /* Final */
  #sfinal .card-final {
    background:linear-gradient(135deg, #0F0A0B, #3D0C11);
    border-radius:20px; padding:60px 90px;
    box-shadow: 8px 10px 0px rgba(61,12,17,.3), 0 30px 70px rgba(0,0,0,.3);
    min-width:1020px; text-align:center;
    opacity:0; animation:cardIn .7s ease-out .3s forwards;
  }
  #sfinal .frase-final {
    font-family:'Playfair Display',serif; font-style:italic; font-weight:900;
    font-size:72px; color:#F9F3E8; line-height:1.12;
  }
  #sfinal .frase-final em { color:#E8C870; font-style:normal; }
  #sfinal .linea-final {
    height:3px; width:0; margin:28px auto 0;
    background:linear-gradient(90deg, transparent, #E8C870, transparent);
    border-radius:2px;
    animation:lineGrow .6s ease-out 1.1s forwards;
  }
</style>
</head>
<body>

<div class="pizarra"></div>
<div class="papel-texture"></div>

<!-- S0: Título -->
<div class="slide" id="s0">
  <div style="text-align:center;">
    <p class="titulo-pizarra">El<br>Vaciamiento</p>
    <p class="sub-pizarra">dio tanto que ya no quedaba nadie</p>
    <div class="linea-titulo" style="width:580px;"></div>
  </div>
</div>

<!-- S1: SU TIEMPO -->
<div class="slide" id="s1">
  <div class="card card-vino" style="animation:cardIn .55s cubic-bezier(.2,0,.1,1) .2s forwards; opacity:0;">
    <div class="card-numero" style="animation-delay:.5s;">Lo que entregó</div>
    <div class="card-palabra" style="font-size:148px;">TIEMPO</div>
    <div class="card-contexto" style="animation-delay:.75s;">Energía. Cuerpo. Sueños.</div>
    <div class="card-linea" style="animation-delay:.9s; width:320px;"></div>
    <!-- SVG: reloj vaciándose -->
    <div class="card-svg" style="animation-delay:1.0s;">
      <svg width="130" height="140" viewBox="0 0 130 140">
        <circle cx="65" cy="65" r="48" fill="none" stroke="rgba(232,200,112,.4)" stroke-width="2.5"
          stroke-dasharray="300" stroke-dashoffset="300">
          <animate attributeName="stroke-dashoffset" from="300" to="0" dur="0.7s" begin="1.0s" fill="freeze"/>
        </circle>
        <!-- Manecillas del reloj -->
        <line x1="65" y1="65" x2="65" y2="30" stroke="rgba(232,200,112,.7)" stroke-width="3" stroke-linecap="round"
          stroke-dasharray="35" stroke-dashoffset="35">
          <animate attributeName="stroke-dashoffset" from="35" to="0" dur="0.3s" begin="1.5s" fill="freeze"/>
        </line>
        <line x1="65" y1="65" x2="90" y2="75" stroke="rgba(232,200,112,.7)" stroke-width="3" stroke-linecap="round"
          stroke-dasharray="28" stroke-dashoffset="28">
          <animate attributeName="stroke-dashoffset" from="28" to="0" dur="0.3s" begin="1.7s" fill="freeze"/>
        </line>
        <!-- Punto centro -->
        <circle cx="65" cy="65" r="4" fill="rgba(232,200,112,.8)">
          <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.0s" fill="freeze"/>
        </circle>
        <!-- X de vacío -->
        <text x="65" y="120" text-anchor="middle" font-size="30" fill="rgba(201,112,128,.6)" font-family="Playfair Display,serif" font-weight="900">
          ∅
          <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="2.2s" fill="freeze"/>
        </text>
      </svg>
    </div>
    <div class="card-check" style="animation-delay:1.3s;">
      <svg viewBox="0 0 48 48">
        <circle class="c-circle" cx="24" cy="24" r="20" style="animation-delay:1.3s;"/>
        <polyline class="c-mark" points="14,24 21,32 34,16" style="animation-delay:1.7s;"/>
      </svg>
    </div>
  </div>
</div>

<!-- S2: SU CRITERIO -->
<div class="slide" id="s2">
  <div class="card card-negro" style="animation:cardIn .55s cubic-bezier(.2,0,.1,1) .2s forwards; opacity:0;">
    <div class="card-numero" style="animation-delay:.5s;">Lo que sacrificó</div>
    <div class="card-palabra" style="font-size:130px;">SU<br>CRITERIO</div>
    <div class="card-contexto" style="animation-delay:.75s;">Su paz. Sus decisiones. Todo.</div>
    <div class="card-linea" style="animation-delay:.9s;"></div>
    <!-- SVG: brújula sin norte -->
    <div class="card-svg" style="animation-delay:1.0s;">
      <svg width="130" height="130" viewBox="0 0 130 130">
        <circle cx="65" cy="65" r="50" fill="none" stroke="rgba(232,200,112,.4)" stroke-width="2"
          stroke-dasharray="314" stroke-dashoffset="314">
          <animate attributeName="stroke-dashoffset" from="314" to="0" dur="0.7s" begin="1.0s" fill="freeze"/>
        </circle>
        <!-- Aguja girada — sin norte claro -->
        <line x1="65" y1="65" x2="50" y2="35" stroke="rgba(201,112,128,.65)" stroke-width="3.5" stroke-linecap="round"
          stroke-dasharray="32" stroke-dashoffset="32">
          <animate attributeName="stroke-dashoffset" from="32" to="0" dur="0.4s" begin="1.5s" fill="freeze"/>
        </line>
        <line x1="65" y1="65" x2="80" y2="95" stroke="rgba(249,243,232,.25)" stroke-width="3" stroke-linecap="round"
          stroke-dasharray="32" stroke-dashoffset="32">
          <animate attributeName="stroke-dashoffset" from="32" to="0" dur="0.4s" begin="1.7s" fill="freeze"/>
        </line>
        <circle cx="65" cy="65" r="5" fill="rgba(232,200,112,.6)">
          <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.0s" fill="freeze"/>
        </circle>
        <!-- N tachado -->
        <text x="65" y="22" text-anchor="middle" font-size="16" fill="rgba(249,243,232,.2)" font-family="Playfair Display,serif" font-weight="900">N</text>
        <line x1="58" y1="15" x2="72" y2="25" stroke="rgba(201,112,128,.5)" stroke-width="2" stroke-linecap="round">
          <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.2s" fill="freeze"/>
        </line>
      </svg>
    </div>
    <div class="card-check" style="animation-delay:1.3s;">
      <svg viewBox="0 0 48 48">
        <circle class="c-circle" cx="24" cy="24" r="20" style="animation-delay:1.3s;"/>
        <polyline class="c-mark" points="14,24 21,32 34,16" style="animation-delay:1.7s;"/>
      </svg>
    </div>
  </div>
</div>

<!-- S3: NADIE A QUIEN AMAR -->
<div class="slide" id="s3">
  <div class="card card-oscuro" style="animation:cardIn .55s cubic-bezier(.2,0,.1,1) .2s forwards; opacity:0;">
    <div class="card-numero" style="animation-delay:.5s;">El resultado</div>
    <div class="card-palabra" style="font-size:110px;">YA NO<br>QUEDABA</div>
    <div class="card-contexto" style="animation-delay:.75s; color:rgba(232,200,112,.7);">Nadie a quien amar. Solo agotamiento.</div>
    <div class="card-linea" style="animation-delay:.9s;"></div>
    <!-- SVG: silueta vacía -->
    <div class="card-svg" style="animation-delay:1.0s;">
      <svg width="110" height="140" viewBox="0 0 110 140">
        <!-- Silueta punteada vacía -->
        <circle cx="55" cy="32" r="20" fill="none" stroke="rgba(249,243,232,.2)" stroke-width="2" stroke-dasharray="5,4"
          stroke-dashoffset="0">
          <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.0s" fill="freeze"/>
        </circle>
        <path d="M20,130 Q20,75 55,75 Q90,75 90,130" fill="none" stroke="rgba(249,243,232,.2)" stroke-width="2" stroke-dasharray="6,4"
          stroke-linecap="round">
          <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.3s" fill="freeze"/>
        </path>
        <!-- Símbolo de vacío en el centro -->
        <text x="55" y="108" text-anchor="middle" font-size="40" fill="rgba(201,112,128,.45)" font-family="Playfair Display,serif" font-weight="900">
          ∅
          <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.8s" fill="freeze"/>
        </text>
      </svg>
    </div>
    <div class="card-check" style="animation-delay:1.3s;">
      <svg viewBox="0 0 48 48">
        <circle class="c-circle" cx="24" cy="24" r="20" style="animation-delay:1.3s;"/>
        <polyline class="c-mark" points="14,24 21,32 34,16" style="animation-delay:1.7s;"/>
      </svg>
    </div>
  </div>
</div>

<!-- FINAL -->
<div class="slide" id="sfinal">
  <div class="card-final">
    <p class="frase-final">El sacrificio<br>no transformó nada.<br><em>Solo la vació.</em></p>
    <div class="linea-final" style="width:580px;"></div>
  </div>
</div>

<script>
  const SLIDES = [
    { id:'s0',     dur:2800 },
    { id:'s1',     dur:4500 },
    { id:'s2',     dur:4500 },
    { id:'s3',     dur:4500 },
    { id:'sfinal', dur:6000 },
  ];
  const TRANS = 380;
  let current = 0;
  function show(idx) {
    const el = document.getElementById(SLIDES[idx].id);
    el.style.opacity = '1'; el.style.pointerEvents = 'auto';
  }
  function hide(idx) {
    const el = document.getElementById(SLIDES[idx].id);
    el.style.animation = `cardOut ${TRANS}ms ease-in forwards`;
    setTimeout(() => { el.style.opacity='0'; el.style.pointerEvents='none'; el.style.animation=''; }, TRANS);
  }
  function next() {
    hide(current); current++;
    if (current < SLIDES.length) {
      setTimeout(() => {
        show(current);
        if (current < SLIDES.length - 1) setTimeout(next, SLIDES[current].dur);
      }, TRANS);
    }
  }
  show(0);
  setTimeout(next, SLIDES[0].dur);
</script>
</body>
</html>
