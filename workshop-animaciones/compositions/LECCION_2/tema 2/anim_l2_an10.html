<!DOCTYPE html>
<html lang="es">
<head>
<style>
  body:not(.fonts-loaded) * { animation-play-state:paused !important; transition:none !important; }
</style>
<script>
  document.fonts.ready.then(() => { setTimeout(() => { document.body.classList.add("fonts-loaded"); }, 1500); });
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=720">
<title>anim_l2_an10 — Pizarra gradual</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:ital,wght@1,400;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1280px; height:720px; overflow:hidden; }
.scene {
  width:1280px; height:720px; position:relative; overflow:hidden;
  background-color:#EDE3CE;
  background-image:
    linear-gradient(rgba(90,18,32,0.07) 1px, transparent 1px),
    linear-gradient(90deg,rgba(90,18,32,0.07) 1px, transparent 1px);
  background-size:48px 48px;
  opacity:0; animation:fadeIn 0.5s ease forwards 0.1s, fadeOut 0.5s ease forwards 24.5s;
}
@keyframes fadeIn { to{opacity:1} }
@keyframes fadeOut { to{opacity:0} }

.borde-izq { position:absolute; left:0; top:0; bottom:0; width:8px; background:linear-gradient(180deg,#5A1220,#8B2D3F); }
.borde-sup {
  position:absolute; top:0; left:0; right:0; height:5px;
  background:linear-gradient(90deg,#D4A843,#B8892A,transparent);
  width:0; animation:lineaGrow 0.8s ease forwards 0.4s;
}
@keyframes lineaGrow { to{width:100%} }

.titulo-pizarra {
  position:absolute; top:42px; left:60px;
  font-family:'Playfair Display',serif; font-weight:700; font-size:20px;
  color:#3D0C11; letter-spacing:1px; text-transform:uppercase;
  opacity:0; animation:fadeUp 0.5s ease forwards 0.6s;
}
.titulo-pizarra::after {
  content:''; display:block; width:0; height:2px;
  background:linear-gradient(90deg,#5A1220,#B8892A,transparent);
  margin-top:5px; animation:lineaGrow 0.5s ease forwards 1s;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

/* Línea de tiempo horizontal */
.timeline {
  position:absolute; top:50%; left:80px; right:80px;
  transform:translateY(-50%);
}

.tl-line {
  position:relative; height:4px; background:rgba(90,18,32,0.15);
  border-radius:2px; margin-bottom:0;
}
.tl-fill {
  position:absolute; left:0; top:0; height:100%; width:0;
  background:linear-gradient(90deg,#5A1220,#8B2D3F,#B8892A);
  border-radius:2px;
  animation:fillLine 3s ease forwards 1.2s;
  box-shadow:0 0 8px rgba(90,18,32,0.3);
}
@keyframes fillLine { to{width:100%} }

/* Pasos */
.pasos {
  display:flex; justify-content:space-between;
  margin-top:0; position:relative;
}

.paso {
  display:flex; flex-direction:column; align-items:center;
  width:22%; opacity:0;
}
.paso:nth-child(1) { animation:pasoUp 0.5s ease forwards 1.5s; }
.paso:nth-child(2) { animation:pasoUp 0.5s ease forwards 2.2s; }
.paso:nth-child(3) { animation:pasoUp 0.5s ease forwards 2.9s; }
.paso:nth-child(4) { animation:pasoUp 0.5s ease forwards 3.6s; }

@keyframes pasoUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

.paso-dot {
  width:18px; height:18px; border-radius:50%;
  border:3px solid #5A1220;
  background:#EDE3CE;
  margin-bottom:16px; margin-top:-9px;
  position:relative; z-index:2;
  transition:background 0.3s ease;
}
.paso:nth-child(1) .paso-dot { background:#5A1220; animation:dotFill 0.3s ease forwards 1.5s; }
.paso:nth-child(2) .paso-dot { animation:dotFill 0.3s ease forwards 2.2s; }
.paso:nth-child(3) .paso-dot { animation:dotFill 0.3s ease forwards 2.9s; }
.paso:nth-child(4) .paso-dot { background:#B8892A; border-color:#B8892A; animation:dotFillGold 0.3s ease forwards 3.6s; }

@keyframes dotFill { to{background:#5A1220} }
@keyframes dotFillGold { to{background:#B8892A;border-color:#B8892A} }

.paso-num {
  font-family:'Inter',sans-serif; font-weight:500; font-size:11px;
  letter-spacing:3px; text-transform:uppercase; color:#5A1220;
  margin-bottom:10px;
}
.paso:nth-child(4) .paso-num { color:#B8892A; }

.paso-texto {
  font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600;
  font-size:26px; line-height:1.35; color:#3D0C11; text-align:center;
}
.paso:nth-child(4) .paso-texto { color:#5A1220; }

/* Flecha gradual entre pasos */
.tl-arrows {
  position:absolute; top:-8px; left:0; right:0;
  display:flex; justify-content:space-between; padding:0 11%;
}
.tl-arrow {
  font-size:18px; color:rgba(90,18,32,0.3);
  opacity:0; animation:fadeIn 0.3s ease forwards;
}
.tl-arrow:nth-child(1) { animation-delay:1.8s; }
.tl-arrow:nth-child(2) { animation-delay:2.5s; }
.tl-arrow:nth-child(3) { animation-delay:3.2s; }

/* Frase final impacto */
.frase-final {
  position:absolute; bottom:0; left:0; right:0; top:0;
  display:flex; align-items:center; justify-content:center;
  background:rgba(40,8,16,0.94);
  opacity:0; animation:fadeIn 0.6s ease forwards 5.5s;
}
.frase-final-texto {
  font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600;
  font-size:50px; color:#F9F3E8; text-align:center; line-height:1.4;
  padding:0 120px;
}
.frase-final-texto em { color:#E8C870; text-shadow:0 0 20px rgba(232,200,112,0.4); }
</style>
</head>
<body>
<div class="scene">
  <div class="borde-izq"></div>
  <div class="borde-sup"></div>


  <div class="timeline">
    <div class="tl-line">
      <div class="tl-fill"></div>
      <div class="tl-arrows">
        <span class="tl-arrow">→</span>
        <span class="tl-arrow">→</span>
        <span class="tl-arrow">→</span>
      </div>
    </div>
    <div class="pasos">
      <div class="paso">
        <div class="paso-dot"></div>
        <div class="paso-num">Vez 1</div>
        <div class="paso-texto">Cede una vez.<br>Funciona.</div>
      </div>
      <div class="paso">
        <div class="paso-dot"></div>
        <div class="paso-num">Vez 2</div>
        <div class="paso-texto">Cede dos veces.<br>Se siente paz.</div>
      </div>
      <div class="paso">
        <div class="paso-dot"></div>
        <div class="paso-num">Poco a poco</div>
        <div class="paso-texto">Sigue cediendo.<br>Cada vez más.</div>
      </div>
      <div class="paso">
        <div class="paso-dot"></div>
        <div class="paso-num">Un día</div>
        <div class="paso-texto">Se mira al espejo<br>y no se reconoce.</div>
      </div>
    </div>
  </div>

  <div class="frase-final">
    <div class="frase-final-texto">
      Tan gradual que no se notó<br>
      <em>mientras pasaba.</em>
    </div>
  </div>
</div>
</body>
</html>
