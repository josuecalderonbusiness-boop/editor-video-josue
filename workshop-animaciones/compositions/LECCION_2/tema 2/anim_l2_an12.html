<!DOCTYPE html>
<html lang="es">
<head>
<style>
  body:not(.fonts-loaded) * { animation-play-state:paused !important; transition:none !important; }
</style>
<script>
  document.fonts.ready.then(() => { setTimeout(() => { document.body.classList.add("fonts-loaded"); }, 1500); });
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=720">
<title>anim_l2_an12</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,400&family=Cormorant+Garamond:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1280px; height:720px; overflow:hidden; background:#0A0306; }
.scene {
  width:1280px; height:720px; position:relative;
  background:#0A0306;
  display:flex; align-items:center; justify-content:center; gap:80px;
  overflow:hidden;
  opacity:0; animation:fadeIn 0.5s ease forwards 0.2s, fadeOut 0.5s ease forwards 14.5s;
}
@keyframes fadeIn { to{opacity:1} }
@keyframes fadeOut { to{opacity:0} }

.glow {
  position:absolute; left:-100px; top:50%; transform:translateY(-50%);
  width:600px; height:600px;
  background:radial-gradient(circle,rgba(90,18,32,0.35) 0%,transparent 70%);
  pointer-events:none; animation:glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse { 0%,100%{opacity:0.7}50%{opacity:1} }

.svg-wrap {
  flex-shrink:0; width:280px; height:280px;
  opacity:0; animation:fadeIn 0.6s ease forwards 0.8s;
}

.texto-wrap {
  max-width:680px;
  opacity:0; animation:slideIn 0.6s ease forwards 1.2s;
}
@keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }

.frase-texto {
  font-family:'Playfair Display',serif; font-weight:900;
  font-size:48px; line-height:1.3; color:#F9F3E8;
  text-shadow:0 0 30px rgba(249,243,232,0.1);
  margin-bottom:16px;
}
.frase-texto em {
  font-style:italic; color:#E8C870;
  text-shadow:0 0 20px rgba(232,200,112,0.4);
}
.frase-sub {
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:28px; color:#C97080; line-height:1.5;
  opacity:0; animation:fadeIn 0.6s ease forwards 3s;
}
.frase-sub em { color:#F9F3E8; }
.linea {
  width:0; height:2px; margin:20px 0;
  background:linear-gradient(90deg,#5A1220,#B8892A,transparent);
  animation:lineaGrow 0.7s ease forwards 2s;
}
@keyframes lineaGrow { to{width:420px} }
</style>
</head>
<body>
<div class="scene">
  <div class="glow"></div>

  <div class="svg-wrap">
    <svg viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg" width="280" height="280">
      <!-- Círculo exterior — la trampa -->
      <circle cx="140" cy="140" r="100" fill="none" stroke="#5A1220" stroke-width="3" opacity="0.6">
        <animate attributeName="r" values="100;104;100" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0.9;0.6" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <!-- Círculo punteado girando -->
      <circle cx="140" cy="140" r="116" fill="none" stroke="#5A1220" stroke-width="1" opacity="0.2" stroke-dasharray="6 8">
        <animateTransform attributeName="transform" type="rotate" from="0 140 140" to="360 140 140" dur="20s" repeatCount="indefinite"/>
      </circle>
      <!-- Interior suave -->
      <circle cx="140" cy="140" r="88" fill="rgba(90,18,32,0.12)"/>
      <!-- Punto dorado atrapado orbitando -->
      <circle cx="140" cy="58" r="9" fill="#E8C870">
        <animateTransform attributeName="transform" type="rotate" from="0 140 140" to="360 140 140" dur="3s" repeatCount="indefinite"/>
      </circle>
      <!-- Trail del punto -->
      <circle cx="140" cy="58" r="16" fill="rgba(232,200,112,0.15)">
        <animateTransform attributeName="transform" type="rotate" from="0 140 140" to="360 140 140" dur="3s" repeatCount="indefinite"/>
      </circle>
      <!-- Intento de salida -->
      <line x1="140" y1="58" x2="140" y2="20" stroke="#E8C870" stroke-width="2" opacity="0">
        <animate attributeName="opacity" values="0;0.6;0" dur="3s" begin="1s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="rotate" from="0 140 140" to="360 140 140" dur="3s" repeatCount="indefinite"/>
      </line>
      <!-- Pequeños puntos en el perímetro -->
      <circle cx="140" cy="40" r="3" fill="#C97080" opacity="0">
        <animate attributeName="opacity" values="0;0.5;0" dur="4s" begin="0.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="228" cy="140" r="3" fill="#C97080" opacity="0">
        <animate attributeName="opacity" values="0;0.5;0" dur="4s" begin="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="52" cy="140" r="3" fill="#C97080" opacity="0">
        <animate attributeName="opacity" values="0;0.5;0" dur="4s" begin="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="140" cy="240" r="3" fill="#C97080" opacity="0">
        <animate attributeName="opacity" values="0;0.5;0" dur="4s" begin="3.5s" repeatCount="indefinite"/>
      </circle>
    </svg>
  </div>

  <div class="texto-wrap">
    <div class="frase-texto">
      Mientras siga atrapada<br>
      en la <em>Trampa<br>de la Entrega —</em>
    </div>
    <div class="linea"></div>
    <div class="frase-sub">
      sin importar cuánto ore, cuánto llore,<br>
      cuánto hable, cuánto intente —<br>
      <em>la dinámica no va a cambiar.</em>
    </div>
  </div>
</div>
</body>
</html>
