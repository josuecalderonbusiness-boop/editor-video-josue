<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>anim_l2_an7 — Pizarra contraste</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:ital,wght@1,400;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1280px; height:720px; overflow:hidden; }
.scene {
  width:1280px; height:720px; position:relative; overflow:hidden;
  background-color:#EDE3CE;
  background-image:
    linear-gradient(rgba(90,18,32,0.07) 1px, transparent 1px),
    linear-gradient(90deg,rgba(90,18,32,0.07) 1px, transparent 1px);
  background-size:48px 48px;
  opacity:0; animation: fadeIn 0.5s ease forwards 0.1s, fadeOut 0.5s ease forwards 14.5s;
}
@keyframes fadeIn { to{opacity:1} }
@keyframes fadeOut { to{opacity:0} }
.borde-izq {
  position:absolute; left:0; top:0; bottom:0; width:8px;
  background:linear-gradient(180deg,#5A1220,#8B2D3F);
}
.borde-sup {
  position:absolute; top:0; left:0; right:0; height:5px;
  background:linear-gradient(90deg,#D4A843,#B8892A,transparent);
  width:0; animation:lineaGrow 0.8s ease forwards 0.4s;
}
@keyframes lineaGrow { to{width:100%} }
.titulo-pizarra {
  position:absolute; top:48px; left:60px;
  font-family:'Playfair Display',serif; font-weight:700; font-size:20px;
  color:#3D0C11; letter-spacing:1px; text-transform:uppercase;
  opacity:0; animation:fadeUp 0.5s ease forwards 0.6s;
}
.titulo-pizarra::after {
  content:''; display:block; width:0; height:2px;
  background:linear-gradient(90deg,#5A1220,#B8892A,transparent);
  margin-top:6px; animation:lineaGrow 0.5s ease forwards 1s;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.centro {
  position:absolute; top:50%; left:60px; right:60px;
  transform:translateY(-45%);
  display:flex; align-items:center; gap:60px;
}
.col { flex:1; opacity:0; }
.col-ellas { animation:slideFromLeft 0.6s ease forwards 0.9s; }
.col-ellos { animation:slideFromRight 0.6s ease forwards 1.5s; }
@keyframes slideFromLeft { from{opacity:0;transform:translateX(-30px)} to{opacity:1;transform:translateX(0)} }
@keyframes slideFromRight { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }
.col-label {
  font-family:'Inter',sans-serif; font-weight:500; font-size:13px;
  letter-spacing:4px; text-transform:uppercase; margin-bottom:14px;
}
.col-ellas .col-label { color:#5A1220; }
.col-ellos .col-label { color:#B8892A; }
.col-items { list-style:none; }
.col-items li {
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:30px; line-height:1.5; color:#3D0C11;
  padding:4px 0; display:flex; align-items:baseline; gap:10px;
}
.col-ellas .col-items li::before {
  content:'✓'; font-family:'Inter',sans-serif; font-style:normal;
  font-size:18px; color:#5A1220; font-weight:600; flex-shrink:0;
}
.col-ellos .col-items li::before {
  content:'·'; font-family:'Inter',sans-serif; font-style:normal;
  font-size:22px; color:#B8892A; font-weight:700; flex-shrink:0;
}
.divisor {
  width:2px; height:0; flex-shrink:0;
  background:linear-gradient(180deg,transparent,#5A1220,transparent);
  animation:divisorGrow 0.6s ease forwards 1.2s; opacity:0.35;
}
@keyframes divisorGrow { to{height:280px} }
.frase-final {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  background:rgba(40,8,16,0.95);
  opacity:0; animation:fadeIn 0.6s ease forwards 3.8s;
}
.frase-final-texto {
  font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600;
  font-size:58px; color:#F9F3E8; text-align:center; line-height:1.35;
  padding:0 100px; text-shadow:0 0 40px rgba(249,243,232,0.1);
}
.frase-final-texto em { color:#E8C870; text-shadow:0 0 20px rgba(232,200,112,0.4); }
</style>
</head>
<body>
<div class="scene">
  <div class="borde-izq"></div>
  <div class="borde-sup"></div>
  <div class="titulo-pizarra">El patrón que no podía ignorar</div>
  <div class="centro">
    <div class="col col-ellas">
      <div class="col-label">Ellas</div>
      <ul class="col-items">
        <li>Oraban</li>
        <li>Leían</li>
        <li>Asistían</li>
        <li>Lo intentaban</li>
        <li>Buscaban ayuda</li>
      </ul>
    </div>
    <div class="divisor"></div>
    <div class="col col-ellos">
      <div class="col-label">Ellos</div>
      <ul class="col-items">
        <li>Llegaban obligados</li>
        <li>No volvían a la segunda</li>
        <li>También oraban...</li>
      </ul>
    </div>
  </div>
  <div class="frase-final">
    <div class="frase-final-texto">
      Ellos también oraban.<br>
      Solo que oraban para que<br>
      <em>ella cambiara.</em>
    </div>
  </div>
</div>
<script>document.fonts.ready.then(() => { setTimeout(() => {}, 1500); });</script>
</body>
</html>
