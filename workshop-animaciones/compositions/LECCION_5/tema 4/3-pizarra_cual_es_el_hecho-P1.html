<!DOCTYPE html>
<html lang="es">
<head>
<style>body:not(.fonts-loaded)*{animation-play-state:paused!important;}</style>
<script>document.fonts.ready.then(function(){setTimeout(function(){document.body.classList.add("fonts-loaded");},1200);});</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=720">
<title>Pizarra — ¿Cuál es el HECHO?</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900&family=Cormorant+Garamond:ital,wght@1,400;1,600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  width:1280px;height:720px;overflow:hidden;
  background:#EDE3CE;
  opacity:0;
  animation:bodyIn .45s ease forwards .1s, bodyOut .6s ease forwards 7.4s;
}
@keyframes bodyIn{to{opacity:1;}}
@keyframes bodyOut{to{opacity:0;}}

/* ── FONDO PIZARRA con cuadrícula ── */
.pizarra{
  position:absolute;inset:0;
  background:#EDE3CE;
}
/* Cuadrícula beige */
.pizarra::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(180,160,120,.18) 1px, transparent 1px),
    linear-gradient(90deg, rgba(180,160,120,.18) 1px, transparent 1px);
  background-size:42px 42px;
}

/* Borde izquierdo borgoña */
.borde-izq{
  position:absolute;left:0;top:0;bottom:0;
  width:0;
  background:linear-gradient(180deg,#6B1A2A,#3D0C11 50%,#8B2D3F);
  animation:bordeIzqCrece .5s ease forwards .3s;
}
@keyframes bordeIzqCrece{to{width:8px;}}

/* Borde superior dorado */
.borde-sup{
  position:absolute;top:0;left:0;right:0;
  height:0;
  background:linear-gradient(90deg,#E8C870,#D4A843 50%,#E8C870);
  animation:bordeSupCrece .6s ease forwards .5s;
}
@keyframes bordeSupCrece{to{height:6px;}}

/* ── CONTENIDO ── */
.contenido{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:60px 100px 50px;
  gap:0;
}

/* ── TÍTULO ── */
.titulo-wrap{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:28px;
  opacity:0;
  animation:tituloEntrada .55s cubic-bezier(.25,.46,.45,.94) forwards .7s;
}
@keyframes tituloEntrada{
  from{opacity:0;transform:translateY(-16px);}
  to{opacity:1;transform:translateY(0);}
}

.titulo{
  font-family:'Playfair Display',serif;font-weight:700;
  font-size:52px;line-height:1;
  color:#3D0C11;
  text-align:center;
  letter-spacing:.01em;
}

/* La palabra HECHO en borgoña fuerte con subrayado */
.titulo .hecho{
  color:#6B1A2A;
  position:relative;
  display:inline-block;
}
.titulo .hecho::after{
  content:'';
  position:absolute;
  bottom:-6px;left:0;right:0;
  height:3px;
  background:linear-gradient(90deg,#E8C870,#D4A843);
  border-radius:2px;
  transform:scaleX(0);
  transform-origin:left;
  animation:subrayado .5s ease forwards 1.2s;
}
@keyframes subrayado{to{transform:scaleX(1);}}

/* Signo de pregunta grande decorativo */
.q-deco{
  font-family:'Playfair Display',serif;font-weight:900;
  font-size:72px;line-height:1;
  color:#E8C870;
  opacity:0;
  animation:qDeco .4s ease forwards 1.0s;
  margin-left:6px;
  display:inline-block;
  vertical-align:middle;
  text-shadow:0 0 18px rgba(232,200,112,.4);
}
@keyframes qDeco{from{opacity:0;transform:scale(.5) rotate(-15deg);}to{opacity:1;transform:scale(1) rotate(0);}}

.linea-titulo{
  width:0;height:2px;margin-top:14px;
  background:linear-gradient(90deg,#E8C870,#D4A843,rgba(232,200,112,.3));
  border-radius:1px;
  animation:lineaCrece .6s ease forwards 1.1s;
}
@keyframes lineaCrece{to{width:580px;}}

/* ── CUERPO TIPO WRAPPED — texto gigante centrado ── */
.cuerpo{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  width:100%;
}

.frase-wrap{
  display:flex;
  align-items:center;
  gap:18px;
  opacity:0;
}

/* Escritura a mano con Cormorant */
.frase{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:54px;line-height:1.15;
  color:#2A1008;
  text-align:center;
}

/* Icono lápiz / check dibujado */
.icono{
  flex-shrink:0;
  opacity:0;
}

/* Aparición secuencial */
.frase-wrap:nth-child(1){animation:fraseEntrada .5s cubic-bezier(.25,.46,.45,.94) forwards 1.4s;}
.frase-wrap:nth-child(2){animation:fraseEntrada .5s cubic-bezier(.25,.46,.45,.94) forwards 1.9s;}
.frase-wrap:nth-child(3){animation:fraseEntrada .5s cubic-bezier(.25,.46,.45,.94) forwards 2.4s;}

.icono:nth-of-type(1){animation:iconoIn .4s ease forwards 1.55s;}
.icono:nth-of-type(2){animation:iconoIn .4s ease forwards 2.05s;}
.icono:nth-of-type(3){animation:iconoIn .4s ease forwards 2.55s;}

@keyframes fraseEntrada{
  from{opacity:0;transform:translateX(-30px);}
  to{opacity:1;transform:translateX(0);}
}
@keyframes iconoIn{
  from{opacity:0;transform:scale(.4) rotate(-20deg);}
  to{opacity:1;transform:scale(1) rotate(0);}
}

/* ── FRASE FINAL GRANDE tipo wrapped ── */
.frase-grande-wrap{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:8px;
  background:#EDE3CE;
  opacity:0;
  animation:grandeAparece .7s ease forwards 3.6s;
  padding:0 80px;
}
/* cuadrícula también aquí */
.frase-grande-wrap::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(180,160,120,.18) 1px, transparent 1px),
    linear-gradient(90deg, rgba(180,160,120,.18) 1px, transparent 1px);
  background-size:42px 42px;
  z-index:0;
}
@keyframes grandeAparece{
  from{opacity:0;transform:scale(.96);}
  to{opacity:1;transform:scale(1);}
}

.grande-tag{
  font-family:'Inter',sans-serif;font-weight:300;font-size:13px;
  letter-spacing:6px;text-transform:uppercase;
  color:rgba(107,26,42,.55);
  position:relative;z-index:1;
  opacity:0;
  animation:grandeTagIn .5s ease forwards 4.1s;
}
@keyframes grandeTagIn{to{opacity:1;}}

.grande-texto{
  font-family:'Playfair Display',serif;font-weight:900;
  font-size:110px;line-height:1.02;
  color:#3D0C11;
  text-align:center;
  position:relative;z-index:1;
  opacity:0;
  animation:grandeTextIn .6s cubic-bezier(.25,.46,.45,.94) forwards 4.2s;
}
@keyframes grandeTextIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

.grande-sub{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:44px;line-height:1;
  color:#6B1A2A;
  text-align:center;
  position:relative;z-index:1;
  opacity:0;
  animation:grandeTextIn .5s ease forwards 4.7s;
}

.grande-linea{
  width:0;height:3px;
  background:linear-gradient(90deg,transparent,#E8C870,#D4A843,transparent);
  border-radius:2px;
  position:relative;z-index:1;
  animation:lineaCreceC .7s ease forwards 4.9s;
}
@keyframes lineaCreceC{to{width:700px;}}
</style>
</head>
<body>

<!-- ── PIZARRA ── -->
<div class="pizarra"></div>
<div class="borde-izq"></div>
<div class="borde-sup"></div>

<!-- ── FASE 1: pregunta + 3 ítems ── -->
<div class="contenido" id="fase1">

  <div class="titulo-wrap">
    <div style="display:flex;align-items:center;gap:4px;">
      <div class="titulo">¿Cuál es el <span class="hecho">HECHO</span>?<span class="q-deco"> </span></div>
    </div>
    <div class="linea-titulo"></div>
  </div>

  <div class="cuerpo">

    <div class="frase-wrap">
      <!-- Lápiz SVG -->
      <svg class="icono" width="38" height="38" viewBox="0 0 38 38" fill="none">
        <path d="M8 28L10 20L28 5L33 10L15 28L8 28Z" stroke="#6B1A2A" stroke-width="2" stroke-linejoin="round" fill="rgba(107,26,42,.08)"/>
        <path d="M25 8L30 13" stroke="#E8C870" stroke-width="2" stroke-linecap="round"/>
        <path d="M8 28L10 20" stroke="#6B1A2A" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <div class="frase">Lo que ocurrió exactamente</div>
    </div>

    <div class="frase-wrap">
      <svg class="icono" width="38" height="38" viewBox="0 0 38 38" fill="none">
        <path d="M8 28L10 20L28 5L33 10L15 28L8 28Z" stroke="#6B1A2A" stroke-width="2" stroke-linejoin="round" fill="rgba(107,26,42,.08)"/>
        <path d="M25 8L30 13" stroke="#E8C870" stroke-width="2" stroke-linecap="round"/>
        <path d="M8 28L10 20" stroke="#6B1A2A" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <div class="frase">Sin interpretación ni historia</div>
    </div>

    <div class="frase-wrap">
      <svg class="icono" width="38" height="38" viewBox="0 0 38 38" fill="none">
        <path d="M8 28L10 20L28 5L33 10L15 28L8 28Z" stroke="#6B1A2A" stroke-width="2" stroke-linejoin="round" fill="rgba(107,26,42,.08)"/>
        <path d="M25 8L30 13" stroke="#E8C870" stroke-width="2" stroke-linecap="round"/>
        <path d="M8 28L10 20" stroke="#6B1A2A" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <div class="frase">Solo lo observable y verificable</div>
    </div>

  </div>
</div>

<!-- ── FASE 2: frase grande tipo wrapped ── -->
<div class="frase-grande-wrap">
  <div class="borde-izq" style="animation:bordeIzqCrece .3s ease forwards 3.6s;"></div>
  <div class="borde-sup" style="animation:bordeSupCrece .3s ease forwards 3.7s;"></div>
  <div class="grande-tag">Pregunta 1 · Sistema de Tres Preguntas</div>
  <div class="grande-texto">¿Cuál es<br>el HECHO?</div>
  <div class="grande-linea"></div>
  <div class="grande-sub">Lo que ocurrió — no lo que sentiste</div>
</div>

</body>
</html>
