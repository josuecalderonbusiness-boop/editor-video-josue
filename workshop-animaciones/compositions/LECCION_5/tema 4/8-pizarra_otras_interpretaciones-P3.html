<!DOCTYPE html>
<html lang="es">
<head>
<style>body:not(.fonts-loaded)*{animation-play-state:paused!important;}</style>
<script>document.fonts.ready.then(function(){setTimeout(function(){document.body.classList.add("fonts-loaded");},1200);});</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=720">
<title>Pizarra — ¿Qué otras interpretaciones?</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900&family=Cormorant+Garamond:ital,wght@1,400;1,600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  width:1280px;height:720px;overflow:hidden;
  background:#EDE3CE;
  opacity:0;
  animation:bodyIn .45s ease forwards .1s, bodyOut .6s ease forwards 7.4s;
}
@keyframes bodyIn{to{opacity:1;}}
@keyframes bodyOut{to{opacity:0;}}

.pizarra{position:absolute;inset:0;background:#EDE3CE;}
.pizarra::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(180,160,120,.18) 1px, transparent 1px),
    linear-gradient(90deg, rgba(180,160,120,.18) 1px, transparent 1px);
  background-size:42px 42px;
}

.borde-izq{
  position:absolute;left:0;top:0;bottom:0;width:0;
  background:linear-gradient(180deg,#6B1A2A,#3D0C11 50%,#8B2D3F);
  animation:bordeIzqCrece .5s ease forwards .3s;
}
@keyframes bordeIzqCrece{to{width:8px;}}

.borde-sup{
  position:absolute;top:0;left:0;right:0;height:0;
  background:linear-gradient(90deg,#E8C870,#D4A843 50%,#E8C870);
  animation:bordeSupCrece .6s ease forwards .5s;
}
@keyframes bordeSupCrece{to{height:6px;}}

.contenido{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:55px 100px 45px;gap:0;
}

.titulo-wrap{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:26px;opacity:0;
  animation:tituloEntrada .55s cubic-bezier(.25,.46,.45,.94) forwards .7s;
}
@keyframes tituloEntrada{
  from{opacity:0;transform:translateY(-16px);}
  to{opacity:1;transform:translateY(0);}
}

.titulo{
  font-family:'Playfair Display',serif;font-weight:700;
  font-size:40px;line-height:1.2;
  color:#3D0C11;text-align:center;letter-spacing:.01em;
}

.titulo .posibles{
  color:#6B1A2A;position:relative;display:inline-block;
}
.titulo .posibles::after{
  content:'';position:absolute;
  bottom:-6px;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#E8C870,#D4A843);
  border-radius:2px;transform:scaleX(0);transform-origin:left;
  animation:subrayado .5s ease forwards 1.2s;
}
@keyframes subrayado{to{transform:scaleX(1);}}

.linea-titulo{
  width:0;height:2px;margin-top:14px;
  background:linear-gradient(90deg,#E8C870,#D4A843,rgba(232,200,112,.3));
  border-radius:1px;
  animation:lineaCrece .6s ease forwards 1.1s;
}
@keyframes lineaCrece{to{width:820px;}}

.cuerpo{
  display:flex;flex-direction:column;align-items:center;
  gap:6px;width:100%;
}

.frase-wrap{display:flex;align-items:center;gap:18px;opacity:0;}
.frase{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:50px;line-height:1.18;color:#2A1008;text-align:center;
}
.icono{flex-shrink:0;opacity:0;}

.frase-wrap:nth-child(1){animation:fraseEntrada .5s cubic-bezier(.25,.46,.45,.94) forwards 1.4s;}
.frase-wrap:nth-child(2){animation:fraseEntrada .5s cubic-bezier(.25,.46,.45,.94) forwards 1.9s;}
.frase-wrap:nth-child(3){animation:fraseEntrada .5s cubic-bezier(.25,.46,.45,.94) forwards 2.4s;}
.icono:nth-of-type(1){animation:iconoIn .4s ease forwards 1.55s;}
.icono:nth-of-type(2){animation:iconoIn .4s ease forwards 2.05s;}
.icono:nth-of-type(3){animation:iconoIn .4s ease forwards 2.55s;}

@keyframes fraseEntrada{from{opacity:0;transform:translateX(-30px);}to{opacity:1;transform:translateX(0);}}
@keyframes iconoIn{from{opacity:0;transform:scale(.4) rotate(-20deg);}to{opacity:1;transform:scale(1) rotate(0);}}

.frase-grande-wrap{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:8px;
  background:#EDE3CE;opacity:0;
  animation:grandeAparece .7s ease forwards 3.6s;
  padding:0 80px;
}
.frase-grande-wrap::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(180,160,120,.18) 1px, transparent 1px),
    linear-gradient(90deg, rgba(180,160,120,.18) 1px, transparent 1px);
  background-size:42px 42px;z-index:0;
}
@keyframes grandeAparece{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:scale(1);}}

.grande-tag{
  font-family:'Inter',sans-serif;font-weight:300;font-size:13px;
  letter-spacing:6px;text-transform:uppercase;
  color:rgba(107,26,42,.55);position:relative;z-index:1;
  opacity:0;animation:grandeTagIn .5s ease forwards 4.1s;
}
@keyframes grandeTagIn{to{opacity:1;}}

.grande-texto{
  font-family:'Playfair Display',serif;font-weight:900;
  font-size:80px;line-height:1.05;
  color:#3D0C11;text-align:center;
  position:relative;z-index:1;
  opacity:0;animation:grandeTextIn .6s cubic-bezier(.25,.46,.45,.94) forwards 4.2s;
}
.grande-texto .hl{color:#6B1A2A;}

@keyframes grandeTextIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

.grande-sub{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:38px;line-height:1;color:#6B1A2A;text-align:center;
  position:relative;z-index:1;
  opacity:0;animation:grandeTextIn .5s ease forwards 4.7s;
}

.grande-linea{
  width:0;height:3px;
  background:linear-gradient(90deg,transparent,#E8C870,#D4A843,transparent);
  border-radius:2px;position:relative;z-index:1;
  animation:lineaCreceC .7s ease forwards 4.9s;
}
@keyframes lineaCreceC{to{width:700px;}}
</style>
</head>
<body>

<div class="pizarra"></div>
<div class="borde-izq"></div>
<div class="borde-sup"></div>

<!-- FASE 1 -->
<div class="contenido">

  <div class="titulo-wrap">
    <div class="titulo">¿Qué otras interpretaciones son <span class="posibles">posibles</span><br>para ese mismo hecho?</div>
    <div class="linea-titulo"></div>
  </div>

  <div class="cuerpo">

    <div class="frase-wrap">
      <svg class="icono" width="38" height="38" viewBox="0 0 38 38" fill="none">
        <path d="M8 28L10 20L28 5L33 10L15 28L8 28Z" stroke="#6B1A2A" stroke-width="2" stroke-linejoin="round" fill="rgba(107,26,42,.08)"/>
        <path d="M25 8L30 13" stroke="#E8C870" stroke-width="2" stroke-linecap="round"/>
        <path d="M8 28L10 20" stroke="#6B1A2A" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <div class="frase">¿Qué más pudo haber pasado?</div>
    </div>

    <div class="frase-wrap">
      <svg class="icono" width="38" height="38" viewBox="0 0 38 38" fill="none">
        <path d="M8 28L10 20L28 5L33 10L15 28L8 28Z" stroke="#6B1A2A" stroke-width="2" stroke-linejoin="round" fill="rgba(107,26,42,.08)"/>
        <path d="M25 8L30 13" stroke="#E8C870" stroke-width="2" stroke-linecap="round"/>
        <path d="M8 28L10 20" stroke="#6B1A2A" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <div class="frase">¿Tengo información suficiente?</div>
    </div>

    <div class="frase-wrap">
      <svg class="icono" width="38" height="38" viewBox="0 0 38 38" fill="none">
        <path d="M8 28L10 20L28 5L33 10L15 28L8 28Z" stroke="#6B1A2A" stroke-width="2" stroke-linejoin="round" fill="rgba(107,26,42,.08)"/>
        <path d="M25 8L30 13" stroke="#E8C870" stroke-width="2" stroke-linecap="round"/>
        <path d="M8 28L10 20" stroke="#6B1A2A" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <div class="frase">¿Mi historia es la única versión?</div>
    </div>

  </div>
</div>

<!-- FASE 2 — wrapped -->
<div class="frase-grande-wrap">
  <div class="borde-izq" style="animation:bordeIzqCrece .3s ease forwards 3.6s;"></div>
  <div class="borde-sup" style="animation:bordeSupCrece .3s ease forwards 3.7s;"></div>
  <div class="grande-tag">Pregunta 3 · Sistema de Tres Preguntas</div>
  <div class="grande-texto">¿Qué otras<br><span class="hl">interpretaciones</span><br>son posibles?</div>
  <div class="grande-linea"></div>
  <div class="grande-sub">Tu historia no es la única — ni la verdadera</div>
</div>

</body>
</html>
