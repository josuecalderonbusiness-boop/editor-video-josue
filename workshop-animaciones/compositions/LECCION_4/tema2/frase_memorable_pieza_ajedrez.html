<!DOCTYPE html>
<html lang="es">
<head>
<style>
  body:not(.fonts-loaded) * { animation-play-state: paused !important; transition: none !important; }
</style>
<script>
  document.fonts.ready.then(() => {
    setTimeout(() => { document.body.classList.add("fonts-loaded"); }, 1500);
  });
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=720">
<title>FRASE MEMORABLE — La única pieza que puedes mover</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1280px; height:720px; overflow:hidden; background:#000; }

  .scene {
    width:1280px; height:720px; background:#0F0A0B;
    position:relative; display:flex; flex-direction:row;
    align-items:center; justify-content:flex-start;
    opacity:0; animation:sceneIn .8s ease-out .1s forwards;
  }
  @keyframes sceneIn { to{opacity:1} }
  .scene.out { animation:fadeOut .9s ease-in forwards; }
  @keyframes fadeOut { to{opacity:0} }

  /* Glow borgoña izquierda */
  .bg-glow {
    position:absolute; left:-100px; top:50%; transform:translateY(-50%);
    width:750px; height:680px;
    background:radial-gradient(ellipse at 35% 50%,
      rgba(107,26,42,.48) 0%, rgba(61,12,17,.26) 40%, transparent 68%);
    animation:pulseGlow 3.5s ease-in-out infinite; pointer-events:none;
  }
  @keyframes pulseGlow {
    0%,100%{opacity:.75;transform:translateY(-50%) scale(1)}
    50%{opacity:1;transform:translateY(-50%) scale(1.06)}
  }

  /* ── Columna izquierda: texto ── */
  .col-texto {
    position:relative; z-index:2;
    display:flex; flex-direction:column;
    align-items:flex-start; justify-content:center;
    padding:0 40px 0 100px;
    width:680px; flex-shrink:0;
  }

  .quote-marks {
    font-family:'Playfair Display',Georgia,serif;
    font-size:120px; font-weight:900; color:#E8C870;
    line-height:.72; margin-bottom:12px;
    opacity:0; transform:translateY(-10px);
    animation:marksIn .55s ease-out .5s forwards,
              marksGlow 2.8s ease-in-out 1.2s infinite;
    display:block;
  }
  @keyframes marksIn { to{opacity:1;transform:translateY(0)} }
  @keyframes marksGlow {
    0%,100%{text-shadow:0 0 15px rgba(232,200,112,1),0 0 40px rgba(220,180,60,.8),0 0 80px rgba(220,180,60,.4)}
    50%{text-shadow:0 0 30px rgba(255,248,180,1),0 0 70px rgba(232,200,112,1),0 0 130px rgba(220,180,60,.6)}
  }

  .frase-main {
    font-family:'Playfair Display',Georgia,serif;
    font-size:64px; font-weight:900; color:#FFF;
    line-height:1.08; letter-spacing:-0.015em;
  }
  .frase-italic {
    font-family:'Playfair Display',Georgia,serif;
    font-size:54px; font-weight:400; font-style:italic;
    color:#F9F3E8; line-height:1.18; margin-top:4px;
  }
  .frase-gold {
    font-family:'Playfair Display',Georgia,serif;
    font-size:60px; font-weight:900; font-style:italic;
    color:#E8C870; line-height:1.10; margin-top:4px;
    text-shadow:
      0 0 22px rgba(232,200,112,.95),
      0 0 55px rgba(220,180,60,.5),
      0 0 100px rgba(220,180,60,.22);
  }

  .word {
    display:inline-block; opacity:0; filter:blur(8px);
    transform:translateY(14px) scale(.97); white-space:pre;
  }
  .word.visible {
    transition:opacity .40s ease,filter .40s ease,transform .40s ease;
    opacity:1; filter:blur(0); transform:translateY(0) scale(1);
  }
  .frase-main .word.visible {
    text-shadow:0 0 20px rgba(255,255,255,1),0 0 50px rgba(255,255,255,.7),0 0 90px rgba(255,255,255,.4);
  }
  .frase-italic .word.visible {
    text-shadow:0 0 18px rgba(249,243,232,.45),0 0 45px rgba(249,243,232,.18);
  }

  .gold-line-wrap { margin-top:22px; position:relative; height:14px; width:320px; display:none; }
  .gold-line {
    position:absolute; bottom:0; left:0; height:3px; width:0; border-radius:2px;
    background:linear-gradient(90deg,transparent 0%,#B8892A 8%,#E8C870 35%,#FFF5B0 52%,#E8C870 68%,#D4A843 88%,transparent 100%);
    animation:growLine .85s cubic-bezier(.15,0,.1,1) forwards;
  }
  .gold-glow {
    position:absolute; bottom:-3px; left:0; height:9px; width:0; border-radius:10px;
    background:linear-gradient(90deg,transparent,rgba(232,200,112,.4),transparent);
    animation:growLine .85s cubic-bezier(.15,0,.1,1) .05s forwards,
              glowPulse 2.5s ease-in-out 1s infinite;
  }
  .gold-spark {
    position:absolute; bottom:-4px; left:-30px; width:55px; height:11px;
    background:radial-gradient(ellipse,rgba(255,245,190,1) 0%,rgba(245,228,176,.55) 45%,transparent 75%);
    border-radius:50%; animation:sparkSweep 1s ease-in-out .75s forwards; opacity:0;
  }
  @keyframes growLine   { to{width:320px} }
  @keyframes glowPulse  { 0%,100%{opacity:.55} 50%{opacity:1} }
  @keyframes sparkSweep {
    0%{left:-55px;opacity:0}12%{opacity:1}88%{opacity:.9}100%{left:330px;opacity:0}
  }

  .author {
    margin-top:14px; font-family:'Cormorant Garamond',Georgia,serif;
    font-style:italic; font-size:32px; font-weight:300;
    color:#E8C870; letter-spacing:.05em; opacity:0; transform:translateY(8px);
    text-shadow:0 0 18px rgba(232,200,112,.65),0 0 45px rgba(220,180,60,.30);
  }

  /* ── Columna derecha: tablero + pieza ── */
  .col-tablero {
    position:relative; z-index:2;
    flex:1; display:flex; align-items:center; justify-content:center;
  }

  svg#tablero {
    width:440px; height:440px;
    filter:drop-shadow(0 0 30px rgba(232,200,112,0.15));
  }
</style>
</head>
<body>
<div class="scene" id="scene">
  <div class="bg-glow"></div>

  <!-- COLUMNA IZQUIERDA -->
  <div class="col-texto">
    <span class="quote-marks">&#8220;</span>
    <div>
      <p class="frase-main"   id="l1"></p>
      <p class="frase-italic" id="l2"></p>
      <p class="frase-gold"   id="l3"></p>
    </div>
    <div class="gold-line-wrap" id="lineaWrap">
      <div class="gold-glow"></div>
      <div class="gold-line"></div>
      <div class="gold-spark"></div>
    </div>
    <p class="author" id="author">— Josué Calderón</p>
  </div>

  <!-- COLUMNA DERECHA: tablero de ajedrez SVG -->
  <div class="col-tablero">
    <svg id="tablero" viewBox="0 0 440 440" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow-queen" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="10" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-dim" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Tablero 8x8 real — generado por JS -->
      <g id="tablero-casillas" opacity="0">
        <!-- JS inserta las 64 casillas aquí -->
      </g>

      <!-- Piezas grises de él — quietas, en casillas (5,1) cx=295,cy=95 y (6,4) cx=345,cy=245 -->
      <g id="piezas-el" opacity="0">
        <ellipse cx="295" cy="108" rx="18" ry="6" fill="rgba(80,80,80,0.45)"/>
        <rect x="285" y="78" width="20" height="30" rx="5" fill="rgba(100,100,100,0.4)"/>
        <ellipse cx="295" cy="78" rx="12" ry="12" fill="rgba(110,110,110,0.45)"/>
        <circle  cx="295" cy="68" r="8"  fill="rgba(120,120,120,0.45)"/>

        <ellipse cx="370" cy="258" rx="18" ry="6" fill="rgba(80,80,80,0.4)"/>
        <rect x="360" y="228" width="20" height="30" rx="5" fill="rgba(100,100,100,0.36)"/>
        <ellipse cx="370" cy="228" rx="12" ry="12" fill="rgba(110,110,110,0.4)"/>
        <circle  cx="370" cy="218" r="8"  fill="rgba(120,120,120,0.4)"/>
      </g>

      <!-- Rastro de movimiento de la reina — línea dorada punteada -->
      <line id="rastro" x1="95" y1="345" x2="245" y2="195"
        stroke="#E8C870" stroke-width="2" stroke-dasharray="8 6"
        opacity="0" stroke-linecap="round"/>

      <!-- REINA DORADA — ella -->
      <!-- Empieza en casilla (70,370), se mueve a (170,270) -->
      <g id="reina" opacity="0" filter="url(#glow-queen)">
        <!-- sombra base -->
        <ellipse cx="95" cy="355" rx="22" ry="7" fill="rgba(184,137,42,0.4)"/>
        <!-- cuerpo -->
        <rect x="83" y="318" width="24" height="36" rx="6" fill="#D4A843"/>
        <!-- faldón decorativo -->
        <path d="M 76 354 Q 95 348 114 354 L 118 362 Q 95 356 72 362 Z"
          fill="#B8892A"/>
        <!-- torso -->
        <ellipse cx="95" cy="318" rx="15" ry="15" fill="#E8C870"/>
        <!-- cuello -->
        <rect x="89" y="304" width="12" height="12" rx="4" fill="#D4A843"/>
        <!-- cabeza -->
        <circle cx="95" cy="296" r="14" fill="#E8C870"/>
        <!-- corona -->
        <path d="M 81 290 L 85 278 L 95 285 L 105 278 L 109 290 Z"
          fill="#FFF5B0" stroke="#B8892A" stroke-width="1.5"/>
        <!-- gema corona -->
        <circle cx="95" cy="283" r="4" fill="#FF8C94"/>
        <!-- ojos (puntos pequeños) -->
        <circle cx="90" cy="295" r="2" fill="#3D0C11"/>
        <circle cx="100" cy="295" r="2" fill="#3D0C11"/>
        <!-- brillo -->
        <circle cx="88" cy="291" r="3" fill="rgba(255,255,255,0.3)"/>
      </g>

    </svg>
  </div>
</div>

<script>
  // ── Generar tablero 8x8 real ──────────────────────────
  const NS   = 'http://www.w3.org/2000/svg';
  const GRP  = document.getElementById('tablero-casillas');
  const ORIG = 20;   // margen
  const SZ   = 50;   // tamaño de cada casilla (8x50=400 + 2*20=440)

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const rect = document.createElementNS(NS, 'rect');
      rect.setAttribute('x', ORIG + c * SZ);
      rect.setAttribute('y', ORIG + r * SZ);
      rect.setAttribute('width',  SZ);
      rect.setAttribute('height', SZ);
      const dark = (r + c) % 2 === 0;
      rect.setAttribute('fill', dark
        ? 'rgba(55,10,15,0.88)'
        : 'rgba(130,65,75,0.35)');
      GRP.appendChild(rect);
    }
  }
  // Borde dorado
  const borde = document.createElementNS(NS, 'rect');
  borde.setAttribute('x', ORIG - 2);
  borde.setAttribute('y', ORIG - 2);
  borde.setAttribute('width',  8 * SZ + 4);
  borde.setAttribute('height', 8 * SZ + 4);
  borde.setAttribute('fill', 'none');
  borde.setAttribute('stroke', 'rgba(184,137,42,0.7)');
  borde.setAttribute('stroke-width', '3');
  GRP.appendChild(borde);

  // Helper: centro de casilla (col 0-7, row 0-7)
  function cas(col, row) {
    return { x: ORIG + col * SZ + SZ / 2, y: ORIG + row * SZ + SZ / 2 };
  }
  // Reina: casilla (1,6) → se mueve a (4,3) diagonal
  const reinaStart = cas(1, 6);
  const reinaEnd   = cas(4, 3);

  const LINEAS = [
    { id:'l1', texto:'En tu relación,' },
    { id:'l2', texto:'la única pieza que puedes mover' },
    { id:'l3', texto:'directamente eres tú.' },
  ];

  const DURACION_MS    = 10000;
  const DELAY_INICIO   = 900;
  const MS_POR_PALABRA = 255;
  const PAUSA_LINEA    = 200;

  // ── Construir palabras ──────────────────────────────────
  function buildWords(texto, id) {
    const el = document.getElementById(id);
    texto.split(' ').forEach((w, i, arr) => {
      const span = document.createElement('span');
      span.className = 'word';
      span.textContent = w + (i < arr.length - 1 ? ' ' : '');
      el.appendChild(span);
    });
    return el.querySelectorAll('.word');
  }

  let t = DELAY_INICIO;
  LINEAS.forEach(linea => {
    const words = buildWords(linea.texto, linea.id);
    words.forEach(w => {
      setTimeout(() => w.classList.add('visible'), t);
      t += MS_POR_PALABRA;
    });
    t += PAUSA_LINEA;
  });

  // ── Línea dorada + firma ────────────────────────────────
  const fin = t + 200;
  setTimeout(() => { document.getElementById('lineaWrap').style.display = 'block'; }, fin);
  setTimeout(() => {
    const a = document.getElementById('author');
    a.style.transition = 'opacity .6s ease, transform .6s ease';
    a.style.opacity = '1';
    a.style.transform = 'translateY(0)';
  }, fin + 520);

  // ── Tablero aparece ────────────────────────────────────
  setTimeout(() => {
    document.getElementById('tablero-casillas').animate(
      [{opacity:0},{opacity:1}], {duration:900, fill:'forwards', easing:'ease-out'}
    );
  }, 700);

  // ── Piezas apagadas aparecen ───────────────────────────
  setTimeout(() => {
    document.getElementById('piezas-el').animate(
      [{opacity:0},{opacity:1}], {duration:600, fill:'forwards'}
    );
  }, 1400);

  // ── Reina aparece ──────────────────────────────────────
  setTimeout(() => {
    document.getElementById('reina').animate(
      [{opacity:0, transform:'scale(0.6)'}, {opacity:1, transform:'scale(1)'}],
      {duration:700, fill:'forwards', easing:'cubic-bezier(.2,0,.1,1)'}
    );
  }, 2000);

  // ── Reina se mueve a la casilla nueva ─────────────────
  // De (70,370) → (170,270) — diagonal dorada
  setTimeout(() => {
    // Rastro aparece
    document.getElementById('rastro').animate(
      [{opacity:0},{opacity:1}], {duration:400, fill:'forwards'}
    );

    // Reina se desplaza
    document.getElementById('reina').animate([
      { transform: 'translate(0px, 0px)' },
      { transform: 'translate(150px, -150px)' }
    ], {
      duration: 1200,
      fill: 'forwards',
      easing: 'cubic-bezier(.4,0,.2,1)',
      delay: 200
    });

    // Glow al llegar
    setTimeout(() => {
      document.getElementById('reina').style.filter = 'url(#glow-queen) brightness(1.3)';
      setTimeout(() => {
        document.getElementById('reina').style.filter = 'url(#glow-queen)';
      }, 600);
    }, 1500);

  }, 5000);

  // ── Fade out ───────────────────────────────────────────
  setTimeout(() => {
    document.getElementById('scene').classList.add('out');
  }, DURACION_MS);
</script>
</body>
</html>
