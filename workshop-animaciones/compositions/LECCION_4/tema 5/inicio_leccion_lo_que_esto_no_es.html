<!DOCTYPE html>
<html lang="es">
<head>
<style>
  body:not(.fonts-loaded) * { animation-play-state: paused !important; transition: none !important; }
</style>
<script>
  document.fonts.ready.then(() => {
    setTimeout(() => { document.body.classList.add("fonts-loaded"); }, 1500);
  });
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=720">
<title>INICIO_LECCION — Lo Que Esto No Es</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,700&family=Cormorant+Garamond:ital,wght@1,400;1,600&family=Inter:wght@300&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    width:1280px;
    height:720px;
    overflow:hidden;
    background:#0F0A0B;
  }

  /* ── Escena principal ── */
  .scene {
    width:1280px;
    height:720px;
    position:relative;
    overflow:hidden;
    background: linear-gradient(135deg, #0F0A0B 0%, #1E060A 50%, #3D0C11 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    animation: fadeIn .4s ease forwards .1s, fadeOut .6s ease forwards 5.4s;
  }

  @keyframes fadeIn { to { opacity:1; } }
  @keyframes fadeOut { to { opacity:0; } }

  /* ── Glow de fondo pulsante ── */
  .bg-glow {
    position:absolute;
    left:-200px; top:50%;
    transform:translateY(-50%);
    width:700px; height:700px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(107,26,42,.25) 0%, transparent 70%);
    animation:glowPulse 3s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%,100% { opacity:.6; transform:translateY(-50%) scale(1); }
    50%      { opacity:1;  transform:translateY(-50%) scale(1.08); }
  }

  /* ── Signo de alerta — silueta de fondo ── */
  .alert-bg {
    position:absolute;
    right: -20px;
    top: 50%;
    transform: translateY(-52%) translateX(120px);
    font-size: 580px;
    line-height: 1;
    color: transparent;
    -webkit-text-stroke: 2px rgba(61,12,17,.55);
    user-select: none;
    opacity: 0;
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    animation: alertSlide .9s cubic-bezier(.25,.46,.45,.94) forwards .2s;
    filter: drop-shadow(0 0 40px rgba(107,26,42,.3));
  }
  @keyframes alertSlide {
    to { opacity:1; transform:translateY(-52%) translateX(0); }
  }

  /* ── Barra dorada izquierda ── */
  .accent-bar {
    position:absolute;
    left: 60px; top:50%;
    transform: translateY(-50%);
    width: 5px; height: 0;
    background: linear-gradient(180deg, #E8C870, #B8892A, #E8C870);
    box-shadow: 0 0 20px rgba(232,200,112,.7), 0 0 50px rgba(232,200,112,.3);
    border-radius: 3px;
    animation: barGrow .6s ease forwards .65s;
  }
  @keyframes barGrow { to { height: 260px; } }

  /* ── Contenido ── */
  .content {
    position:relative;
    z-index: 10;
    padding-left: 100px;
    width: 100%;
  }

  /* Label superior — Inter espaciado */
  .label {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 15px;
    letter-spacing: .42em;
    color: #E8C870;
    text-transform: uppercase;
    margin-bottom: 18px;
    opacity: 0;
    transform: translateX(-20px);
    animation: slideR .5s ease forwards .95s;
  }
  @keyframes slideR { to { opacity:1; transform:translateX(0); } }

  /* Bloque principal de texto */
  .title-wrap {
    display: flex;
    flex-direction: column;
    gap: 0px;
  }

  /* Línea 1: LO QUE ESTO */
  .line-1 {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 90px;
    line-height: 1;
    color: #F9F3E8;
    text-shadow:
      0 0 30px rgba(249,243,232,.12),
      0 0 60px rgba(249,243,232,.06);
    opacity: 0;
    animation: flashReveal .35s steps(1) forwards 1.1s;
  }

  /* Línea 2: NO ES — grande y en dorado/rojo */
  .line-2 {
    display: flex;
    align-items: center;
    gap: 24px;
    line-height: 1;
  }

  .line-2-text {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 138px;
    line-height: .92;
    color: #F9F3E8;
    text-shadow:
      0 0 40px rgba(249,243,232,.18),
      0 0 80px rgba(249,243,232,.08);
    opacity: 0;
    animation: flashReveal .35s steps(1) forwards 1.28s;
  }

  /* Signo de alerta inline — dorado con glow */
  .alert-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: alertIconIn .5s cubic-bezier(.34,1.56,.64,1) forwards 1.5s;
    position: relative;
    top: -4px;
  }

  @keyframes alertIconIn {
    from { opacity:0; transform:scale(.4) rotate(-15deg); }
    to   { opacity:1; transform:scale(1)  rotate(0deg); }
  }

  /* SVG triángulo de alerta */
  .alert-svg {
    width: 110px;
    height: 110px;
    filter:
      drop-shadow(0 0 14px rgba(232,200,112,.9))
      drop-shadow(0 0 40px rgba(232,200,112,.5))
      drop-shadow(0 0 80px rgba(232,200,112,.25));
    animation: alertGlow 1.8s ease-in-out infinite 2s;
  }

  @keyframes alertGlow {
    0%,100% { filter: drop-shadow(0 0 10px rgba(232,200,112,.7)) drop-shadow(0 0 30px rgba(232,200,112,.4)); }
    50%      { filter: drop-shadow(0 0 22px rgba(232,200,112,1))  drop-shadow(0 0 60px rgba(232,200,112,.7)) drop-shadow(0 0 100px rgba(232,200,112,.3)); }
  }

  @keyframes flashReveal { from { opacity:0; } to { opacity:1; } }

  /* Línea dorada decorativa bajo el texto */
  .gold-line-wrap {
    margin-top: 22px;
    position: relative;
    width: 0;
    height: 2px;
    overflow: visible;
    animation: lineExpand .8s ease forwards 1.7s;
  }
  @keyframes lineExpand { to { width: 520px; } }

  .gold-line {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 2px;
    background: linear-gradient(90deg, #E8C870, #D4A843, transparent);
    border-radius: 2px;
    box-shadow: 0 0 10px rgba(232,200,112,.5);
  }

  /* Chispa que recorre la línea */
  .gold-spark {
    position: absolute;
    top: -3px; left: 0;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #E8C870;
    box-shadow: 0 0 12px #E8C870, 0 0 30px rgba(232,200,112,.8);
    opacity: 0;
    animation: sparkRun .8s ease forwards 1.7s;
  }
  @keyframes sparkRun {
    0%   { opacity:0; left:0; }
    10%  { opacity:1; }
    90%  { opacity:1; }
    100% { opacity:0; left:calc(100% - 8px); }
  }

  /* Partículas flotantes de fondo */
  .particle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    animation: float linear infinite;
  }
  @keyframes float {
    0%   { transform:translateY(0)   opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform:translateY(-80px); opacity: 0; }
  }
</style>
</head>
<body>

<div class="scene">

  <!-- Glow de fondo -->
  <div class="bg-glow"></div>

  <!-- Partículas sutiles -->
  <div class="particle" style="width:3px;height:3px;background:rgba(232,200,112,.3);left:15%;bottom:20%;animation-duration:6s;animation-delay:0s;"></div>
  <div class="particle" style="width:2px;height:2px;background:rgba(232,200,112,.2);left:22%;bottom:35%;animation-duration:8s;animation-delay:1s;"></div>
  <div class="particle" style="width:4px;height:4px;background:rgba(107,26,42,.5);left:30%;bottom:15%;animation-duration:7s;animation-delay:2s;"></div>
  <div class="particle" style="width:2px;height:2px;background:rgba(232,200,112,.25);left:42%;bottom:28%;animation-duration:9s;animation-delay:.5s;"></div>

  <!-- Signo de alerta de fondo (silueta) -->
  <div class="alert-bg">!</div>

  <!-- Barra dorada izquierda -->
  <div class="accent-bar"></div>

  <!-- Contenido principal -->
  <div class="content">

    <!-- Bloque de título -->
    <div class="title-wrap">

      <!-- Línea 1 -->
      <div class="line-1">LO QUE ESTO</div>

      <!-- Línea 2: NO ES + ícono alerta -->
      <div class="line-2">
        <span class="line-2-text">NO ES</span>

        <!-- Triángulo de alerta SVG -->
        <div class="alert-icon">
          <svg class="alert-svg" viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
            <!-- Triángulo relleno suave -->
            <polygon points="50,6 96,84 4,84"
              fill="rgba(232,200,112,.08)"
              stroke="#E8C870"
              stroke-width="3.5"
              stroke-linejoin="round"/>
            <!-- Signo ! -->
            <rect x="46.5" y="32" width="7" height="28" rx="3.5"
              fill="#E8C870"/>
            <circle cx="50" cy="70" r="4.5"
              fill="#E8C870"/>
          </svg>
        </div>
      </div>

      <!-- Línea dorada -->
      <div class="gold-line-wrap">
        <div class="gold-line"></div>
        <div class="gold-spark"></div>
      </div>

    </div>
  </div>

</div>

</body>
</html>
