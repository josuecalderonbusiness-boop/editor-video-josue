<!DOCTYPE html>
<html lang="es">
<head>
<style>
  body:not(.fonts-loaded) * { animation-play-state: paused !important; transition: none !important; }
</style>
<script>
  document.fonts.ready.then(() => {
    setTimeout(() => { document.body.classList.add("fonts-loaded"); }, 1500);
  });
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=720">
<title>Conflictos Bajan — Pizarra Wrapped</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900;1,700&family=Cormorant+Garamond:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1280px; height:720px; overflow:hidden; background:#F0E8D5; }

  /* ── PIZARRA BASE ── */
  .pizarra {
    position:absolute; inset:0;
    background:#F0E8D5;
    background-image:
      linear-gradient(rgba(139,100,60,.12) 1px, transparent 1px),
      linear-gradient(90deg, rgba(139,100,60,.12) 1px, transparent 1px);
    background-size:56px 56px;
  }
  .pizarra::before {
    content:""; position:absolute; left:0; top:0; bottom:0;
    width:8px;
    background:linear-gradient(180deg, #3D0C11, #6B1A2A, #3D0C11);
  }
  .pizarra::after {
    content:""; position:absolute; top:0; left:0; right:0;
    height:4px;
    background:linear-gradient(90deg, #6B1A2A, #E8C870, #E8C870, #6B1A2A);
  }
  .papel-texture {
    position:absolute; inset:0; pointer-events:none;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(255,245,220,.5) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 50%, rgba(220,200,160,.25) 0%, transparent 55%);
  }

  /* ── KEYFRAMES ── */
  @keyframes cardIn {
    0%   { opacity:0; transform:translateY(70px) rotate(-1.5deg) scale(.93); }
    65%  { transform:translateY(-10px) rotate(.5deg) scale(1.02); }
    100% { opacity:1; transform:translateY(0) rotate(0deg) scale(1); }
  }
  @keyframes cardOut {
    0%   { opacity:1; transform:translateY(0) scale(1); }
    100% { opacity:0; transform:translateY(-65px) scale(.94); }
  }
  @keyframes fadeIn    { to { opacity:1; } }
  @keyframes lineGrow  { 0%{width:0;opacity:0;} 100%{width:100%;opacity:1;} }
  @keyframes lineGrowH { 0%{height:0;opacity:0;} 100%{height:var(--h);opacity:1;} }
  @keyframes barraCrece { 0%{height:0;opacity:0;} 100%{height:100%;opacity:1;} }
  @keyframes gemFloat {
    0%,100% { transform:translateY(0px) rotate(-2deg); }
    50%      { transform:translateY(-12px) rotate(2deg); }
  }
  @keyframes gemIn {
    0%  { opacity:0; transform:scale(.5) rotate(-10deg); }
    70% { transform:scale(1.08) rotate(2deg); }
    100%{ opacity:1; transform:scale(1) rotate(0deg); }
  }
  @keyframes glowPulse {
    0%,100% { filter:drop-shadow(0 0 16px rgba(232,200,112,.6)); }
    50%      { filter:drop-shadow(0 0 36px rgba(232,200,112,1)) drop-shadow(0 0 55px rgba(232,200,112,.4)); }
  }
  @keyframes noShake {
    0%   { transform:translateX(0) rotate(0deg); }
    15%  { transform:translateX(-14px) rotate(-3deg); }
    30%  { transform:translateX(12px) rotate(3deg); }
    45%  { transform:translateX(-10px) rotate(-2deg); }
    60%  { transform:translateX(8px) rotate(2deg); }
    75%  { transform:translateX(-5px) rotate(-1deg); }
    90%  { transform:translateX(3px) rotate(1deg); }
    100% { transform:translateX(0) rotate(0deg); }
  }
  @keyframes switchOff {
    0%   { transform:translateX(52px); }
    100% { transform:translateX(4px); }
  }
  @keyframes trackOff {
    0%   { background:#4CAF50; }
    100% { background:#555; }
  }
  @keyframes strokeDraw {
    to { stroke-dashoffset:0; }
  }

  /* ── SLIDES ── */
  .slide {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    z-index:2;
  }

  /* ── TARJETA BASE ── */
  .card {
    border-radius:18px;
    padding:50px 68px;
    box-shadow: 7px 9px 0px rgba(61,12,17,.28), 0 24px 55px rgba(61,12,17,.18);
    display:flex; flex-direction:column; align-items:flex-start;
    position:relative;
    opacity:0;
    animation: cardIn .6s cubic-bezier(.2,0,.1,1) .25s forwards;
  }
  .card::after {
    content:""; position:absolute; inset:-1px; border-radius:19px;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.12);
    pointer-events:none;
  }
  .card-vino  { background:linear-gradient(135deg, #3D0C11 0%, #6B1A2A 100%); min-width:900px; max-width:1100px; }
  .card-negro { background:linear-gradient(135deg, #0F0A0B 0%, #1C1114 100%); min-width:900px; max-width:1100px; }
  .card-oscuro{ background:linear-gradient(135deg, #0F0A0B 0%, #3D0C11 100%); min-width:1060px; text-align:center; align-items:center; }

  .card-tag {
    font-family:"Playfair Display",serif; font-weight:900;
    font-size:17px; letter-spacing:.28em;
    color:rgba(255,255,255,.22); margin-bottom:14px;
    opacity:0; animation:fadeIn .3s ease-out .6s forwards;
  }
  .card-titulo {
    font-family:"Playfair Display",serif; font-weight:900;
    font-size:138px; color:#F9F3E8; line-height:.82;
    text-shadow:0 5px 32px rgba(0,0,0,.3);
  }
  .card-sub {
    font-family:"Cormorant Garamond",serif; font-style:italic;
    font-size:52px; color:rgba(249,243,232,.7);
    margin-top:10px; line-height:1.15;
    opacity:0; animation:fadeIn .4s ease-out .75s forwards;
  }
  .card-linea {
    height:3px; background:rgba(232,200,112,.55);
    border-radius:2px; margin:22px 0 0;
    width:0; animation:lineGrow .5s ease-out .9s forwards;
  }

  /* ── SLIDE 0: TÍTULO ── */
  #s0 {
    animation: fadeIn .5s ease-out .2s forwards; opacity:0;
  }
  #s0 .titulo-intro {
    font-family:"Playfair Display",serif; font-weight:900; font-style:italic;
    font-size:118px; color:#3D0C11;
    text-align:center; line-height:.95;
    opacity:0; animation: cardIn .65s cubic-bezier(.2,0,.1,1) .3s forwards;
    text-shadow: 3px 4px 0 rgba(61,12,17,.1);
  }
  #s0 .linea-s0 {
    height:5px; width:0;
    background:linear-gradient(90deg, #6B1A2A, #E8C870, #6B1A2A);
    border-radius:3px; margin:22px auto 0;
    animation: lineGrow .6s ease-out .95s forwards;
  }

  /* ── SLIDE 1: GRÁFICO ── */
  #s1 .card { min-width:1100px; max-width:1140px; flex-direction:row; align-items:flex-end; gap:0; padding:40px 60px 48px; }
  #s1 .grafico-wrap { display:flex; flex-direction:column; align-items:flex-start; flex:1; }
  #s1 .grafico-titulo {
    font-family:"Playfair Display",serif; font-weight:900;
    font-size:48px; color:#F9F3E8; line-height:1.0;
    margin-bottom:8px;
  }
  #s1 .grafico-sub {
    font-family:"Cormorant Garamond",serif; font-style:italic;
    font-size:36px; color:rgba(249,243,232,.65); margin-bottom:28px;
    opacity:0; animation:fadeIn .4s ease-out .7s forwards;
  }
  #s1 .barras {
    display:flex; align-items:flex-end; gap:28px;
    height:220px; padding-bottom:0;
  }
  #s1 .barra-col {
    display:flex; flex-direction:column; align-items:center; gap:8px;
  }
  #s1 .barra {
    width:72px; border-radius:8px 8px 0 0;
    background:linear-gradient(180deg, #E8C870, #B8892A);
    height:0; opacity:0;
  }
  #s1 .barra-label {
    font-family:"Cormorant Garamond",serif; font-style:italic;
    font-size:28px; color:rgba(249,243,232,.6);
  }
  #s1 .barra-num {
    font-family:"Playfair Display",serif; font-weight:900;
    font-size:32px; color:#E8C870;
    opacity:0; animation:fadeIn .3s ease-out forwards;
  }

  /* barras con delays */
  #s1 .b1 { animation:lineGrowH .5s ease-out .4s forwards; --h:190px; }
  #s1 .b2 { animation:lineGrowH .5s ease-out .65s forwards; --h:138px; }
  #s1 .b3 { animation:lineGrowH .5s ease-out .9s forwards;  --h:90px; }
  #s1 .n1 { animation-delay:.9s; }
  #s1 .n2 { animation-delay:1.15s; }
  #s1 .n3 { animation-delay:1.4s; }

  #s1 .flecha-tend {
    font-size:120px; color:#E8C870; line-height:1;
    opacity:0; animation:fadeIn .4s ease-out 1.2s forwards;
    margin-left:12px; margin-bottom:12px;
    text-shadow: 0 0 30px rgba(232,200,112,.5);
  }
  #s1 .gema-wrap {
    position:absolute; right:-28px; top:50%;
    transform:translateY(-50%);
    opacity:0;
    animation: gemIn .7s cubic-bezier(.2,0,.1,1) .5s forwards,
               gemFloat 3.2s ease-in-out 1.3s infinite,
               glowPulse 2.8s ease-in-out 1.3s infinite;
  }
  #s1 .gema-wrap img { width:240px; height:auto; }

  /* ── SLIDE 2: PREGUNTA ── */
  #s2 .card-negro { min-width:860px; max-width:1040px; }
  #s2 .pregunta-wrap {
    display:flex; flex-direction:column; align-items:flex-start;
  }
  #s2 .signo {
    font-family:"Playfair Display",serif; font-weight:900; font-style:italic;
    font-size:160px; color:#E8C870; line-height:.75;
    opacity:0; animation:fadeIn .4s ease-out .3s forwards;
    text-shadow: 0 0 40px rgba(232,200,112,.5);
  }
  #s2 .pregunta-texto {
    font-family:"Playfair Display",serif; font-weight:900;
    font-size:88px; color:#F9F3E8; line-height:.92;
    margin-top:4px;
    opacity:0; animation:cardIn .5s ease-out .55s forwards;
  }
  #s2 .pregunta-sub {
    font-family:"Cormorant Garamond",serif; font-style:italic;
    font-size:46px; color:rgba(249,243,232,.6); margin-top:16px;
    opacity:0; animation:fadeIn .4s ease-out .95s forwards;
  }

  /* ── SLIDE 3: NO — SWITCH ── */
  #s3 .card-negro { min-width:1020px; flex-direction:row; align-items:center; gap:60px; }
  #s3 .no-lado {
    display:flex; flex-direction:column; align-items:flex-start;
  }
  #s3 .no-grande {
    font-family:"Playfair Display",serif; font-weight:900;
    font-size:260px; color:#F9F3E8; line-height:.82;
    opacity:0;
    animation: cardIn .55s cubic-bezier(.2,0,.1,1) .25s forwards,
               noShake .6s ease-in-out 1.1s 1;
    text-shadow: 0 0 60px rgba(249,243,232,.1);
  }
  #s3 .no-sub {
    font-family:"Cormorant Garamond",serif; font-style:italic;
    font-size:46px; color:rgba(249,243,232,.6); margin-top:8px;
    opacity:0; animation:fadeIn .4s ease-out .7s forwards;
  }
  /* Switch */
  #s3 .switch-lado {
    display:flex; flex-direction:column; align-items:center; gap:20px;
  }
  #s3 .switch-label {
    font-family:"Cormorant Garamond",serif; font-style:italic;
    font-size:36px; color:rgba(249,243,232,.5);
    opacity:0; animation:fadeIn .3s ease-out .6s forwards;
  }
  #s3 .switch-track {
    width:120px; height:64px; border-radius:32px;
    background:#4CAF50;
    position:relative; overflow:hidden;
    opacity:0; animation:fadeIn .3s ease-out .65s forwards,
                         trackOff .3s ease-out 1.4s forwards;
    box-shadow: 0 0 0 3px rgba(255,255,255,.1), inset 0 2px 8px rgba(0,0,0,.3);
  }
  #s3 .switch-thumb {
    width:52px; height:52px; border-radius:50%;
    background:#F9F3E8;
    position:absolute; top:6px; left:4px;
    transform:translateX(52px);
    box-shadow: 2px 2px 8px rgba(0,0,0,.4);
    animation: switchOff .3s ease-out 1.4s forwards;
  }
  #s3 .switch-off-text {
    font-family:"Playfair Display",serif; font-weight:900;
    font-size:28px; color:rgba(249,243,232,.3); letter-spacing:.15em;
    opacity:0; animation:fadeIn .3s ease-out 1.8s forwards;
  }
  #s3 .x-marca {
    font-size:72px; color:#C97080; line-height:1;
    opacity:0; animation:fadeIn .3s ease-out 1.8s forwards;
    text-shadow: 0 0 25px rgba(201,112,128,.4);
  }

  /* ── SLIDE FINAL ── */
  #sfinal .card-oscuro {
    padding:56px 88px; min-width:1060px;
    opacity:0; animation:cardIn .7s ease-out .3s forwards;
  }
  #sfinal .label-final {
    font-family:"Cormorant Garamond",serif; font-style:italic;
    font-size:30px; color:rgba(232,200,112,.6);
    letter-spacing:.12em; margin-bottom:20px;
    opacity:0; animation:fadeIn .4s ease-out .7s forwards;
  }
  #sfinal .frase-final {
    font-family:"Playfair Display",serif; font-weight:900;
    font-size:72px; color:#F9F3E8; line-height:1.08;
  }
  #sfinal .frase-final em { color:#E8C870; font-style:italic; }
  #sfinal .linea-final {
    height:3px; width:0; margin:24px auto 0;
    background:linear-gradient(90deg, transparent, #E8C870, transparent);
    border-radius:2px;
    animation:lineGrow .6s ease-out 1.0s forwards;
  }
  #sfinal .firma {
    font-family:"Cormorant Garamond",serif; font-style:italic;
    font-size:32px; color:rgba(232,200,112,.65);
    margin-top:20px;
    opacity:0; animation:fadeIn .4s ease-out 1.3s forwards;
  }

  /* Barra decorativa izquierda */
  .barra-lateral { position:absolute; left:0; top:0; bottom:0; width:8px; overflow:hidden; }
  .barra-lateral-fill {
    position:absolute; left:0; right:0; bottom:0; height:0;
    background:linear-gradient(0deg, #3D0C11, #6B1A2A, #3D0C11);
    animation:barraCrece 1.2s ease-out .1s forwards;
  }
</style>
</head>
<body>

<div class="pizarra"></div>
<div class="papel-texture"></div>
<div class="barra-lateral"><div class="barra-lateral-fill"></div></div>

<!-- SLIDE 0: Título -->
<div class="slide" id="s0">
  <div style="text-align:center;">
    <p class="titulo-intro">primeras<br>2 semanas</p>
    <div class="linea-s0" style="max-width:580px;"></div>
  </div>
</div>

<!-- SLIDE 1: Gráfico de conflictos -->
<div class="slide" id="s1">
  <div class="card card-vino">
    <div class="grafico-wrap">
      <div class="card-tag">01 — LO QUE PASA</div>
      <div class="grafico-titulo">conflictos en casa</div>
      <div class="grafico-sub">semana a semana</div>
      <div class="barras">
        <!-- Semana 1 -->
        <div class="barra-col">
          <div class="barra-num n1">12</div>
          <div class="barra b1"></div>
          <div class="barra-label">S1</div>
        </div>
        <!-- Semana 2 -->
        <div class="barra-col">
          <div class="barra-num n2">7</div>
          <div class="barra b2"></div>
          <div class="barra-label">S2</div>
        </div>
        <!-- Semana 3 -->
        <div class="barra-col">
          <div class="barra-num n3">3</div>
          <div class="barra b3"></div>
          <div class="barra-label">S3</div>
        </div>
        <!-- Flecha tendencia -->
        <div class="flecha-tend">↓</div>
      </div>
    </div>

    <div class="linea-final" style="max-width:700px;"></div>
    <div class="firma">Josué Calderón</div>
  </div>
</div>

<script>
  const SLIDES    = ['s0','s1','s2','s3','sfinal'];
  const DURATIONS = [8000, 11000, 9000, 10000, 13000];
  const TRANS     = 450;

  function resetAnimations(el) {
    const clone = el.cloneNode(true);
    el.parentNode.replaceChild(clone, el);
    return clone;
  }

  function transition(fromId, toId) {
    const from = document.getElementById(fromId);
    from.style.animation = 'cardOut ' + TRANS + 'ms ease-in forwards';
    setTimeout(() => {
      from.style.display = 'none';
      let to = document.getElementById(toId);
      to = resetAnimations(to);
      to.style.display = 'flex';
      void to.offsetWidth;
    }, TRANS - 20);
  }

  document.addEventListener('DOMContentLoaded', () => {
    SLIDES.forEach((id, i) => {
      document.getElementById(id).style.display = (i === 0) ? 'flex' : 'none';
    });
    let t = 0;
    for (let i = 0; i < SLIDES.length - 1; i++) {
      t += DURATIONS[i];
      (function(fi, ti) {
        setTimeout(() => transition(SLIDES[fi], SLIDES[ti]), t);
      })(i, i + 1);
    }
  });
</script>
