<!DOCTYPE html>
<html lang="es">
<head>
<style>
  body:not(.fonts-loaded) * { animation-play-state: paused !important; transition: none !important; }
</style>
<script>
  document.fonts.ready.then(() => {
    setTimeout(() => { document.body.classList.add("fonts-loaded"); }, 1500);
  });
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=720">
<title>DIAGRAMA — Zona de Impotencia v3</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@700;900&family=Cormorant+Garamond:ital,wght@1,600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1280px; height:720px; overflow:hidden; background:#0000FF; }

  .scene {
    width:1280px; height:720px;
    position:relative; background:#0000FF;
  }
  .scene.out { animation: sceneOut .9s ease-in forwards; }
  @keyframes sceneOut { to { opacity:0; } }

  svg {
    position:absolute; top:0; left:0;
    width:1280px; height:720px;
  }

  /* ── Rayos estrella ── */
  .ray {
    stroke: #F9F3E8;
    stroke-width: 5;
    stroke-linecap: round;
    opacity: 0;
    animation: rayIn .4s ease forwards;
  }
  @keyframes rayIn { to { opacity: 1; } }

  /* ── Círculos ── */
  #circulo-1 {
    fill: none; stroke: #E8C870; stroke-width: 10;
    stroke-dasharray: 879; stroke-dashoffset: 879;
    filter: url(#glow-gold);
    animation: drawC1 1.1s cubic-bezier(.4,0,.2,1) 1.4s forwards;
  }
  @keyframes drawC1 { to { stroke-dashoffset: 0; } }

  #circulo-2 {
    fill: none; stroke: #8B2D3F; stroke-width: 13;
    stroke-dasharray: 1696; stroke-dashoffset: 1696;
    filter: url(#glow-wine);
    animation: drawC2 1.6s cubic-bezier(.4,0,.2,1) 2.8s forwards;
  }
  @keyframes drawC2 { to { stroke-dashoffset: 0; } }

  /* ── Flecha ── */
  #arrow-zona {
    stroke: #E8C870; stroke-width: 4;
    fill: none; stroke-linecap: round; stroke-linejoin: round;
    opacity: 0;
    stroke-dasharray: 120; stroke-dashoffset: 120;
    animation: drawArrow .6s ease 4.4s forwards;
  }
  @keyframes drawArrow { to { stroke-dashoffset: 0; opacity: 1; } }

  /* ── Label ZONA DE IMPOTENCIA ── */
  #label-zona { opacity: 0; animation: fadeUp .5s ease 5.0s forwards; }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(8px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* ── Chips / etiquetas flotantes ── */
  /* El chip es un foreignObject con div estilizado */
  .chip-wrap {
    opacity: 0;
    animation: chipIn .5s ease forwards;
  }
  @keyframes chipIn {
    from { opacity:0; transform: scale(.85) translateY(10px); }
    to   { opacity:1; transform: scale(1) translateY(0); }
  }

  /* drift continuo por CSS en foreignObject — usamos grupos con animateTransform en SVG */

  .chip-inner {
    display: inline-block;
    background: rgba(139,45,63,0.82);
    border: 2.5px solid #C97080;
    border-radius: 8px;
    padding: 10px 22px;
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 32px;
    letter-spacing: 0.08em;
    color: #F9F3E8;
    white-space: nowrap;
    backdrop-filter: blur(4px);
    box-shadow: 0 0 18px rgba(139,45,63,0.6), 0 2px 8px rgba(0,0,0,0.4);
  }

  @keyframes starIn { to { opacity:1; } }
  @keyframes starPulse {
    0%,100% { opacity:1; }
    50%     { opacity:.7; }
  }
</style>
</head>
<body>
<div class="scene" id="scene">
<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-cream" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-gold" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-wine" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#E8C870"/>
    </marker>
  </defs>

  <!-- ══ ESTRELLA CENTRAL (ella) ══ -->
  <!-- Rayos largos -->
  <line class="ray" x1="640" y1="325" x2="640" y2="300" style="animation-delay:.30s"/>
  <line class="ray" x1="640" y1="435" x2="640" y2="460" style="animation-delay:.35s"/>
  <line class="ray" x1="605" y1="380" x2="580" y2="380" style="animation-delay:.32s"/>
  <line class="ray" x1="675" y1="380" x2="700" y2="380" style="animation-delay:.38s"/>
  <line class="ray" x1="615" y1="345" x2="597" y2="327" style="animation-delay:.40s"/>
  <line class="ray" x1="665" y1="345" x2="683" y2="327" style="animation-delay:.33s"/>
  <line class="ray" x1="615" y1="415" x2="597" y2="433" style="animation-delay:.44s"/>
  <line class="ray" x1="665" y1="415" x2="683" y2="433" style="animation-delay:.37s"/>

  <!-- Estrella (polygon) -->
  <polygon
    points="640,336 648,356 670,356 654,368 660,388 640,376 620,388 626,368 610,356 632,356"
    fill="#F9F3E8" filter="url(#glow-cream)"
    opacity="0"
    style="animation: starIn .6s ease .3s forwards, starPulse 2.2s ease-in-out 1s infinite;">
  </polygon>

  <!-- Silueta femenina -->
  <circle cx="640" cy="395" r="11" fill="#F9F3E8" opacity="0"
    style="animation:starIn .5s ease .5s forwards;"/>
  <line x1="640" y1="406" x2="640" y2="428"
    stroke="#F9F3E8" stroke-width="5" stroke-linecap="round"
    opacity="0" style="animation:starIn .5s ease .55s forwards;"/>
  <line x1="624" y1="413" x2="656" y2="413"
    stroke="#F9F3E8" stroke-width="4" stroke-linecap="round"
    opacity="0" style="animation:starIn .5s ease .60s forwards;"/>
  <line x1="640" y1="428" x2="630" y2="445"
    stroke="#F9F3E8" stroke-width="4" stroke-linecap="round"
    opacity="0" style="animation:starIn .5s ease .65s forwards;"/>
  <line x1="640" y1="428" x2="650" y2="445"
    stroke="#F9F3E8" stroke-width="4" stroke-linecap="round"
    opacity="0" style="animation:starIn .5s ease .65s forwards;"/>

  <!-- Halo pulsante -->
  <circle cx="640" cy="395" r="48" fill="none"
    stroke="rgba(249,243,232,0.25)" stroke-width="3"
    opacity="0"
    style="animation:starIn .5s ease .8s forwards, starPulse 2.2s ease-in-out 1s infinite;"/>

  <!-- ══ CÍRCULO 1 — dorado ══ -->
  <circle id="circulo-1" cx="640" cy="395" r="140"/>

  <!-- ══ CÍRCULO 2 — borgoña ══ -->
  <circle id="circulo-2" cx="640" cy="395" r="275"/>

  <!-- ══ FLECHA ══
       Sale desde el label (arriba-izquierda) hacia el espacio
       entre los dos círculos — zona libre, NO toca el borde del exterior -->
  <!-- Flecha: sale desde debajo del label (640,95) hacia el espacio exterior izq del círculo -->
  <path id="arrow-zona"
    d="M 450 95 C 420 140 390 180 375 230"
    marker-end="url(#arrowhead)"
  />

  <!-- ══ LABEL ZONA DE IMPOTENCIA ══ centrado -->
  <g id="label-zona">
    <text
      x="640" y="55"
      font-family="'Bebas Neue', Impact, sans-serif"
      font-size="52"
      fill="#E8C870"
      letter-spacing="0.12em"
      text-anchor="middle"
      filter="url(#glow-gold)">ZONA DE IMPOTENCIA</text>
    <text
      x="640" y="85"
      font-family="'Cormorant Garamond', Georgia, serif"
      font-style="italic"
      font-size="26"
      fill="rgba(201,112,128,0.80)"
      text-anchor="middle">lo que no puedes controlar</text>
  </g>

  <!-- ══ CHIPS FLOTANTES — todos dentro de 1280×720, sin duplicados ══ -->

  <!-- Chip 1 — izquierda alta -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-8; 0,0" dur="5s" begin="4.8s" repeatCount="indefinite"/>
    <foreignObject x="10" y="148" width="300" height="58"
      style="opacity:0; animation: chipIn .5s ease 4.8s forwards;">
      <div xmlns="http://www.w3.org/1999/xhtml" class="chip-inner">El carácter de él.</div>
    </foreignObject>
  </g>

  <!-- Chip 2 — derecha alta -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,8; 0,0" dur="6s" begin="5.2s" repeatCount="indefinite"/>
    <foreignObject x="870" y="118" width="400" height="58"
      style="opacity:0; animation: chipIn .5s ease 5.2s forwards;">
      <div xmlns="http://www.w3.org/1999/xhtml" class="chip-inner">Su historia de vida.</div>
    </foreignObject>
  </g>

  <!-- Chip 3 — izquierda media -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-7; 0,0" dur="4.5s" begin="5.6s" repeatCount="indefinite"/>
    <foreignObject x="10" y="308" width="250" height="58"
      style="opacity:0; animation: chipIn .5s ease 5.6s forwards;">
      <div xmlns="http://www.w3.org/1999/xhtml" class="chip-inner">Sus silencios.</div>
    </foreignObject>
  </g>

  <!-- Chip 4 — derecha media -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,5; 0,-5; 0,5" dur="5.5s" begin="6.0s" repeatCount="indefinite"/>
    <foreignObject x="990" y="288" width="280" height="58"
      style="opacity:0; animation: chipIn .5s ease 6.0s forwards;">
      <div xmlns="http://www.w3.org/1999/xhtml" class="chip-inner">Sus decisiones.</div>
    </foreignObject>
  </g>

  <!-- Chip 5 — izquierda baja -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,9; 0,0" dur="7s" begin="6.4s" repeatCount="indefinite"/>
    <foreignObject x="10" y="488" width="420" height="58"
      style="opacity:0; animation: chipIn .5s ease 6.4s forwards;">
      <div xmlns="http://www.w3.org/1999/xhtml" class="chip-inner">Sus reacciones automáticas.</div>
    </foreignObject>
  </g>

  <!-- Chip 6 — derecha baja -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,-4; 0,6; 0,-4" dur="4.8s" begin="6.8s" repeatCount="indefinite"/>
    <foreignObject x="990" y="468" width="280" height="58"
      style="opacity:0; animation: chipIn .5s ease 6.8s forwards;">
      <div xmlns="http://www.w3.org/1999/xhtml" class="chip-inner">Sus prioridades.</div>
    </foreignObject>
  </g>

  <!-- Chip 7 — abajo izquierda-centro -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-8; 0,0" dur="6.2s" begin="7.2s" repeatCount="indefinite"/>
    <foreignObject x="200" y="636" width="430" height="58"
      style="opacity:0; animation: chipIn .5s ease 7.2s forwards;">
      <div xmlns="http://www.w3.org/1999/xhtml" class="chip-inner">Lo que la crianza le instaló.</div>
    </foreignObject>
  </g>

  <!-- Chip 8 — abajo derecha -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,6; 0,-4; 0,6" dur="5.2s" begin="7.6s" repeatCount="indefinite"/>
    <foreignObject x="700" y="606" width="380" height="58"
      style="opacity:0; animation: chipIn .5s ease 7.6s forwards;">
      <div xmlns="http://www.w3.org/1999/xhtml" class="chip-inner">La forma en que lo criaron.</div>
    </foreignObject>
  </g>

</svg>
</div>
<script>
  const DURACION_MS = 12000;
  setTimeout(() => {
    document.getElementById('scene').classList.add('out');
  }, DURACION_MS);
</script>
</body>
</html>
