<!DOCTYPE html>
<html lang="es">
<head>
<style>
  body:not(.fonts-loaded) * { animation-play-state: paused !important; transition: none !important; }
</style>
<script>
  document.fonts.ready.then(() => {
    setTimeout(() => { document.body.classList.add("fonts-loaded"); }, 1500);
  });
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=720">
<title>LO QUE ESTO NO ES</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Cormorant+Garamond:ital,wght@1,600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1280px; height:720px; overflow:hidden; }

  /* Pizarra beige */
  .pizarra {
    position:absolute; inset:0;
    background:#F0E8D5;
    background-image:
      linear-gradient(rgba(139,100,60,.13) 1px, transparent 1px),
      linear-gradient(90deg, rgba(139,100,60,.13) 1px, transparent 1px);
    background-size:56px 56px;
  }
  .pizarra::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:8px;
    background:linear-gradient(180deg,#3D0C11,#6B1A2A,#3D0C11);
  }
  .pizarra::after {
    content:''; position:absolute; top:0; left:0; right:0; height:4px;
    background:linear-gradient(90deg,#6B1A2A,#E8C870,#E8C870,#6B1A2A);
  }

  /* Escena */
  .scene {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
  }
  .scene.out { animation:sceneOut 1s ease-in forwards; }
  @keyframes sceneOut { to{opacity:0} }

  /* ── CARD ALERTA ── */
  .card-alerta {
    position:relative;
    background:linear-gradient(135deg, #0F0A0B 0%, #1A0810 50%, #2D0812 100%);
    border-radius:20px;
    padding:56px 80px 60px 80px;
    min-width:1060px;
    box-shadow:
      8px 10px 0px rgba(61,12,17,.35),
      0 30px 80px rgba(0,0,0,.35),
      inset 0 0 0 2px rgba(232,200,112,.18);
    opacity:0;
    display:flex; flex-direction:column; align-items:flex-start;
  }

  /* Animación entrada — igual al sistema wrapped */
  @keyframes cardIn {
    0%   { opacity:0; transform:translateY(70px) rotate(-1.5deg) scale(.93); }
    68%  { transform:translateY(-10px) rotate(.5deg) scale(1.01); }
    100% { opacity:1; transform:translateY(0) rotate(0deg) scale(1); }
  }
  @keyframes fadeIn { to{opacity:1} }
  @keyframes lineGrow { 0%{width:0;opacity:0} 100%{width:100%;opacity:1} }
  @keyframes alertPulse {
    0%,100% { box-shadow:8px 10px 0px rgba(61,12,17,.35), 0 30px 80px rgba(0,0,0,.35), inset 0 0 0 2px rgba(232,200,112,.18), 0 0 0px rgba(201,112,128,0); }
    50%     { box-shadow:8px 10px 0px rgba(61,12,17,.35), 0 30px 80px rgba(0,0,0,.35), inset 0 0 0 3px rgba(201,112,128,.55), 0 0 60px rgba(201,112,128,.2); }
  }

  /* Badge "ALERTA" arriba */
  .badge-alerta {
    display:inline-flex; align-items:center; gap:10px;
    background:rgba(201,112,128,0.18);
    border:1.5px solid rgba(201,112,128,0.55);
    border-radius:30px;
    padding:6px 22px;
    margin-bottom:26px;
    opacity:0;
  }
  .badge-dot {
    width:10px; height:10px; border-radius:50%;
    background:#C97080;
    box-shadow:0 0 10px rgba(201,112,128,0.9);
    animation:dotPulse 1.2s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%,100%{transform:scale(1); opacity:1}
    50%{transform:scale(1.4); opacity:0.6}
  }
  .badge-txt {
    font-family:'Bebas Neue', Impact, sans-serif;
    font-size:22px; letter-spacing:0.22em;
    color:#C97080;
  }

  /* Texto principal — enorme */
  .texto-principal {
    font-family:'Playfair Display', Georgia, serif;
    font-weight:900;
    font-size:148px;
    color:#F9F3E8;
    line-height:.88;
    letter-spacing:-0.02em;
    text-shadow:0 4px 30px rgba(0,0,0,.4);
  }
  .texto-principal .lo    { font-size:100px; color:rgba(249,243,232,.55); }
  .texto-principal .que   { font-size:100px; color:rgba(249,243,232,.55); font-style:italic; }
  .texto-principal .esto  { font-size:148px; color:#F9F3E8; display:block; }
  .texto-principal .no    { font-size:172px; color:#C97080; display:block; line-height:.85;
    text-shadow:0 0 30px rgba(201,112,128,.7), 0 0 70px rgba(201,112,128,.3);
    animation:noPulse 2.2s ease-in-out infinite;
  }
  .texto-principal .es    { font-size:148px; color:#F9F3E8; display:block; }
  @keyframes noPulse {
    0%,100%{text-shadow:0 0 30px rgba(201,112,128,.7),0 0 70px rgba(201,112,128,.3)}
    50%{text-shadow:0 0 60px rgba(220,140,155,1),0 0 130px rgba(201,112,128,.7),0 0 200px rgba(201,112,128,.35)}
  }

  /* Línea decorativa */
  .card-linea {
    height:3px;
    background:linear-gradient(90deg, #C97080, rgba(201,112,128,.3), transparent);
    border-radius:2px;
    margin-top:28px;
    width:0;
  }

  /* Icono alerta esquina */
  .icon-alerta {
    position:absolute; top:44px; right:52px;
    opacity:0;
  }

</style>
</head>
<body>
<div class="pizarra"></div>

<div class="scene" id="scene">
  <div class="card-alerta" id="card"
    style="animation: cardIn .65s cubic-bezier(.2,0,.1,1) .2s forwards,
                      alertPulse 2.8s ease-in-out 2s infinite;">

    <!-- Badge alerta -->
    <div class="badge-alerta" id="badge" style="animation:fadeIn .4s ease .6s forwards;">
      <div class="badge-dot"></div>
      <span class="badge-txt">ATENCIÓN</span>
    </div>

    <!-- Texto principal -->
    <div class="texto-principal">
      <span class="lo">Lo </span><span class="que">que</span>
      <span class="esto">esto</span>
      <span class="no">NO</span>
      <span class="es">es.</span>
    </div>

    <!-- Línea -->
    <div class="card-linea" id="linea"
      style="animation:lineGrow .6s ease-out 1.1s forwards;"></div>

    <!-- Icono ⚠ -->
    <div class="icon-alerta" id="icon" style="animation:fadeIn .5s ease .8s forwards;">
      <svg width="58" height="58" viewBox="0 0 58 58" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M29 6 L54 50 H4 Z" fill="none" stroke="rgba(201,112,128,0.6)" stroke-width="3" stroke-linejoin="round"/>
        <line x1="29" y1="22" x2="29" y2="36" stroke="#C97080" stroke-width="3.5" stroke-linecap="round"/>
        <circle cx="29" cy="43" r="2.5" fill="#C97080"/>
      </svg>
    </div>

  </div>
</div>

<script>
  setTimeout(() => {
    document.getElementById('scene').classList.add('out');
  }, 8000);
</script>
</body>
</html>
