<!DOCTYPE html>
<html lang="es">
<head>
<style>
  body:not(.fonts-loaded) * { animation-play-state: paused !important; transition: none !important; }
</style>
<script>
  document.fonts.ready.then(() => {
    setTimeout(() => { document.body.classList.add("fonts-loaded"); }, 1500);
  });
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=720">
<title>Los 3 Protocolos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Cormorant+Garamond:ital,wght@0,500;1,400;1,600&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1280px; height:720px; overflow:hidden; background:#0F0A0B; }

/* ══ FONDO ══ */
canvas {
  position:absolute; inset:0; width:100%; height:100%;
  opacity:0.45;
}

/* ══ VELO CENTRAL ══ */
.velo {
  position:absolute; inset:0;
  background:radial-gradient(ellipse 70% 70% at 50% 50%, rgba(61,12,17,0.55) 0%, transparent 100%);
}

/* ══ LINEA SUPERIOR / INFERIOR ══ */
.linea-top, .linea-bot {
  position:absolute; left:50%; transform:translateX(-50%);
  height:1px; width:0;
  background:linear-gradient(90deg, transparent, #B8892A, #E8C870, #B8892A, transparent);
}
.linea-top { top:80px; }
.linea-bot { bottom:80px; }

/* ══ CONTENIDO CENTRAL ══ */
.centro {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:0;
}

.numero {
  font-family:'Inter',sans-serif; font-weight:200;
  font-size:180px; line-height:1; color:rgba(184,137,42,0.08);
  letter-spacing:-8px;
  position:absolute;
  opacity:0;
}

.eyebrow {
  font-family:'Inter',sans-serif; font-weight:300;
  font-size:13px; letter-spacing:10px; text-transform:uppercase;
  color:#B8892A; text-align:center; margin-bottom:28px;
  opacity:0;
}

.titulo-top {
  font-family:'Inter',sans-serif; font-weight:200;
  font-size:22px; letter-spacing:14px; text-transform:uppercase;
  color:rgba(232,200,112,0.6); text-align:center;
  opacity:0; transform:translateY(-12px);
  margin-bottom:6px;
}

.titulo-principal {
  font-family:'Playfair Display',serif; font-weight:900; font-style:italic;
  font-size:112px; line-height:0.95; color:#F5ECD7;
  text-align:center;
  opacity:0; transform:translateY(24px);
  letter-spacing:-2px;
}
.titulo-principal span { color:#B8892A; }

.titulo-sub {
  font-family:'Inter',sans-serif; font-weight:200;
  font-size:20px; letter-spacing:14px; text-transform:uppercase;
  color:rgba(232,200,112,0.6); text-align:center;
  opacity:0; transform:translateY(12px);
  margin-top:10px;
}

.subtitulo {
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:30px; color:rgba(245,236,215,0.45);
  text-align:center; margin-top:24px;
  letter-spacing:1px;
  opacity:0;
}

/* ══ TRES PUNTOS ══ */
.puntos {
  display:flex; gap:20px; margin-top:32px;
  opacity:0;
}
.punto {
  width:6px; height:6px; border-radius:50%;
  background:#B8892A;
  transform:scale(0);
}

/* ══ KEYFRAMES ══ */
@keyframes fadeIn  { to { opacity:1; } }
@keyframes slideUp { to { opacity:1; transform:translateY(0); } }
@keyframes lineGrow { to { width:760px; } }
@keyframes puntoPop { to { transform:scale(1); } }
@keyframes numFade { 0%{opacity:0;transform:scale(0.8)} 30%{opacity:1} 100%{opacity:0;transform:scale(1.15)} }
@keyframes shimmer {
  0%   { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}
</style>
</head>
<body>

<canvas id="c"></canvas>
<div class="velo"></div>
<div class="linea-top" id="lt"></div>
<div class="linea-bot" id="lb"></div>

<div class="centro">
  <div class="numero" id="num">3</div>
  <div class="eyebrow" id="ey">Código Soberana</div>
  <div class="titulo-top" id="ttop">Los</div>
  <div class="titulo-principal" id="tp"><span>3</span> Protocolos</div>
  <div class="titulo-sub" id="tsub">del Código Soberana</div>
  <div class="subtitulo" id="sub">El sistema que cambia tu posición dentro de la relación</div>
  <div class="puntos" id="puntos">
    <div class="punto" id="p1"></div>
    <div class="punto" id="p2"></div>
    <div class="punto" id="p3"></div>
  </div>
</div>

<script>
/* ── partículas ── */
const cvs = document.getElementById('c');
cvs.width = 1280; cvs.height = 720;
const ctx = cvs.getContext('2d');
const pts = Array.from({length:60}, ()=>({
  x: Math.random()*1280, y: Math.random()*720,
  r: Math.random()*1.4+0.3,
  vx:(Math.random()-.5)*.25, vy:(Math.random()-.5)*.25,
  a: Math.random()*.5+.1
}));
function drawParticles(){
  ctx.clearRect(0,0,1280,720);
  pts.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(184,137,42,${p.a})`;
    ctx.fill();
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0||p.x>1280) p.vx*=-1;
    if(p.y<0||p.y>720)  p.vy*=-1;
  });
  requestAnimationFrame(drawParticles);
}
drawParticles();

/* ── animación ── */
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }
function anim(el, kf, delay=0, dur=700, ease='cubic-bezier(0.16,1,0.3,1)'){
  if(!el) return;
  el.style.animation = `${kf} ${dur}ms ${ease} ${delay}ms forwards`;
}
function g(id){ return document.getElementById(id); }

async function run(){
  await wait(400);

  // Líneas
  g('lt').style.animation = 'lineGrow 1.2s cubic-bezier(0.16,1,0.3,1) forwards';
  g('lb').style.animation = 'lineGrow 1.2s cubic-bezier(0.16,1,0.3,1) 200ms forwards';
  await wait(600);

  // Número fantasma
  g('num').style.animation = 'numFade 2.2s ease forwards';
  await wait(300);

  // Eyebrow
  anim(g('ey'), 'fadeIn', 0, 600, 'ease');
  await wait(400);

  // Título top
  anim(g('ttop'), 'slideUp', 0, 700);
  await wait(200);

  // Título principal
  anim(g('tp'), 'slideUp', 0, 900);
  await wait(300);

  // Título sub
  anim(g('tsub'), 'slideUp', 0, 700);
  await wait(600);

  // Subtítulo
  anim(g('sub'), 'fadeIn', 0, 800, 'ease');
  await wait(500);

  // Puntos
  g('puntos').style.animation = 'fadeIn 400ms ease forwards';
  await wait(100);
  anim(g('p1'), 'puntoPop', 0,   400, 'cubic-bezier(0.34,1.56,0.64,1)');
  await wait(120);
  anim(g('p2'), 'puntoPop', 0,   400, 'cubic-bezier(0.34,1.56,0.64,1)');
  await wait(120);
  anim(g('p3'), 'puntoPop', 0,   400, 'cubic-bezier(0.34,1.56,0.64,1)');
}

document.fonts.ready.then(()=>{ setTimeout(run, 1500); });
</script>
</body>
</html>
