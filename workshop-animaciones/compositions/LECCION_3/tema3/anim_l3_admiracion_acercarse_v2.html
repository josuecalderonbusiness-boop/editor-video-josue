<!DOCTYPE html>
<html lang="es">
<head>
<style>body:not(.fonts-loaded) * { animation-play-state: paused !important; transition: none !important; }</style>
<script>document.fonts.ready.then(() => { setTimeout(() => { document.body.classList.add("fonts-loaded"); }, 1500); });</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=720">
<title>Admiración — Acercarse</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,400;1,900&family=Cormorant+Garamond:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1280px; height:720px; overflow:hidden; }

  /* Fondo vinotinto/negro */
  .fondo {
    position:absolute; inset:0;
    background:linear-gradient(135deg,#0F0A0B 0%,#1A0810 45%,#3D0C11 100%);
  }

  /* ── GRÁFICOS DE FONDO ── */
  .graficos-bg {
    position:absolute; inset:0; pointer-events:none; overflow:hidden; opacity:.18;
  }

  /* Círculos concéntricos — como ondas de atracción */
  .ondas {
    position:absolute; right:-60px; top:50%; transform:translateY(-50%);
  }
  .onda {
    position:absolute; border-radius:50%;
    border:2px solid #E8C870; top:50%; left:50%;
    transform:translate(-50%,-50%);
    animation:ondaExpand 3.5s ease-out infinite;
  }
  .onda:nth-child(1) { width:180px; height:180px; animation-delay:0s; }
  .onda:nth-child(2) { width:320px; height:320px; animation-delay:.7s; }
  .onda:nth-child(3) { width:460px; height:460px; animation-delay:1.4s; }
  .onda:nth-child(4) { width:600px; height:600px; animation-delay:2.1s; }
  .onda:nth-child(5) { width:740px; height:740px; animation-delay:2.8s; }
  @keyframes ondaExpand {
    0%  { opacity:0; transform:translate(-50%,-50%) scale(.85); }
    20% { opacity:1; }
    80% { opacity:.3; }
    100%{ opacity:0; transform:translate(-50%,-50%) scale(1.08); }
  }

  /* Flecha hacia arriba — admiración */
  .flecha-svg {
    position:absolute; left:60px; top:50%; transform:translateY(-50%);
    opacity:.25;
  }

  /* ── SLIDES ── */
  .slide { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; z-index:2; }
  @keyframes cardIn     { 0%{opacity:0;transform:translateY(55px) scale(.94)} 70%{transform:translateY(-4px) scale(1.01)} 100%{opacity:1;transform:none} }
  @keyframes cardInLeft { 0%{opacity:0;transform:translateX(-65px) scale(.94)} 70%{transform:translateX(4px)} 100%{opacity:1;transform:none} }
  @keyframes cardInRight{ 0%{opacity:0;transform:translateX(65px) scale(.94)} 70%{transform:translateX(-4px)} 100%{opacity:1;transform:none} }
  @keyframes cardOut    { 0%{opacity:1;transform:none} 100%{opacity:0;transform:translateY(-45px) scale(.95)} }
  @keyframes fadeIn     { to{opacity:1} }
  @keyframes lineGrow   { to{width:100%;opacity:1} }
  @keyframes pulse      { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.04);opacity:.75} }
  @keyframes goldGlow   { 0%,100%{text-shadow:0 0 20px rgba(232,200,112,.5),0 0 50px rgba(232,200,112,.2)} 50%{text-shadow:0 0 50px rgba(255,245,180,1),0 0 100px rgba(232,200,112,.7)} }
  @keyframes wordPop    { 0%{opacity:0;transform:translateY(22px) scale(.88)} 100%{opacity:1;transform:none} }
  @keyframes aparecer   { 0%{opacity:0;filter:blur(10px)} 100%{opacity:1;filter:blur(0)} }

  /* SLIDE 0 — setup */
  #s0 { flex-direction:column; gap:0; padding:0 100px; }
  #s0 .linea-top {
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:46px; color:rgba(249,243,232,.55); text-align:center;
    opacity:0; animation:fadeIn .5s ease-out .4s forwards;
    margin-bottom:14px; letter-spacing:.02em;
  }
  #s0 .palabra-clave {
    font-family:'Playfair Display',serif; font-weight:900;
    font-size:140px; color:#F9F3E8; text-align:center; line-height:.95;
    opacity:0; animation:cardIn .7s ease-out .7s forwards;
    text-shadow:0 0 60px rgba(249,243,232,.2);
  }
  #s0 .linea-bajo {
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:48px; color:rgba(249,243,232,.5); text-align:center;
    opacity:0; animation:fadeIn .5s ease-out 1.2s forwards;
    margin-top:10px;
  }
  #s0 .divider {
    height:3px; width:0; margin-top:22px; border-radius:2px;
    background:linear-gradient(90deg,transparent,rgba(249,243,232,.3),transparent);
    animation:lineGrow .6s ease-out 1.4s forwards; opacity:0;
  }

  /* SLIDE 1 — culpa sofocamiento TACHADO — columna vertical */
  #s1 { padding:0 120px; flex-direction:column; gap:18px; justify-content:center; }
  .col-card {
    width:100%; border-radius:14px; padding:22px 50px;
    display:flex; flex-direction:row; align-items:center;
    text-align:left; position:relative; opacity:0; gap:30px;
  }
  .col-card.vino  { background:rgba(61,12,17,.85); border:2px solid rgba(107,26,42,.6); }
  .col-card.negro { background:rgba(15,10,11,.9); border:2px solid rgba(232,200,112,.35); }
  .col-icon { font-size:46px; flex-shrink:0; opacity:0; animation:fadeIn .4s ease-out forwards; }
  .col-texto-wrap { display:flex; flex-direction:row; align-items:center; gap:24px; flex:1; }
  .col-titulo {
    font-family:'Playfair Display',serif; font-weight:900;
    font-size:72px; line-height:1; position:relative; display:inline-block;
    white-space:nowrap;
  }
  .col-titulo.tachado { color:rgba(201,112,128,.75); }
  .col-titulo.brillante { color:#E8C870; animation:goldGlow 2.5s ease-in-out 1.5s infinite; }
  .tacho-line {
    position:absolute; top:50%; left:-4px; right:-4px; height:6px;
    background:#C97080; border-radius:3px; transform:translateY(-50%);
    width:0; animation:lineGrow .5s ease-out forwards;
    box-shadow:0 0 10px rgba(201,112,128,.6);
  }
  .col-sub {
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:30px; opacity:0; animation:fadeIn .4s ease-out forwards;
    padding-left:4px;
  }
  .col-sub.vino-txt { color:rgba(201,112,128,.65); }
  .col-sub.gold-txt { color:rgba(232,200,112,.75); }

  /* SLIDE 2 — La gran revelación */
  #s2 { flex-direction:column; padding:0 80px; }
  #s2 .pre {
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:44px; color:rgba(249,243,232,.5); margin-bottom:10px;
    opacity:0; animation:fadeIn .4s ease-out .4s forwards;
  }
  #s2 .big {
    font-family:'Playfair Display',serif; font-weight:900; font-style:italic;
    font-size:148px; color:#E8C870; line-height:.92; text-align:center;
    animation:goldGlow 2.2s ease-in-out 1.2s infinite;
    opacity:0; animation:wordPop .6s ease-out .6s forwards, goldGlow 2.2s ease-in-out 1.5s infinite;
  }
  #s2 .post {
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:52px; color:rgba(249,243,232,.65); margin-top:14px; text-align:center;
    opacity:0; animation:fadeIn .5s ease-out 1.1s forwards;
  }
  #s2 .linea-final {
    height:3px; width:0; margin-top:24px; border-radius:2px;
    background:linear-gradient(90deg,transparent,#E8C870,transparent);
    opacity:0; animation:lineGrow .7s ease-out 1.4s forwards;
  }

  /* SLIDE 3 — acercarse no alejarse */
  #s3 { flex-direction:column; padding:0 80px; gap:0; }
  #s3 .frase-wrap {
    display:flex; align-items:center; gap:50px;
    opacity:0; animation:cardIn .6s ease-out .3s forwards;
  }
  .arrow-svg { flex-shrink:0; }
  .arrow-svg.abajo { transform:rotate(180deg); }
  .frase-txt {
    font-family:'Playfair Display',serif; font-weight:900;
    font-size:110px; line-height:.95;
  }
  .frase-txt.blanca { color:#F9F3E8; text-shadow:0 0 30px rgba(249,243,232,.2); }
  .frase-txt.roja   { color:#C97080; }
  .conectora {
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:46px; color:rgba(249,243,232,.45); text-align:center;
    margin:12px 0; opacity:0; animation:fadeIn .4s ease-out .9s forwards;
  }
  #s3 .linea3 {
    height:3px; width:0; border-radius:2px; margin-top:18px;
    background:linear-gradient(90deg,transparent,rgba(249,243,232,.35),transparent);
    opacity:0; animation:lineGrow .6s ease-out 1.4s forwards;
  }
</style>
</head>
<body>
<div class="fondo"></div>

<!-- Gráficos de fondo -->
<div class="graficos-bg">
  <div class="ondas" style="right:-80px;">
    <div class="onda"></div><div class="onda"></div><div class="onda"></div>
    <div class="onda"></div><div class="onda"></div>
  </div>
  <svg class="flecha-svg" width="80" height="400" viewBox="0 0 80 400">
    <defs><marker id="arr" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#E8C870"/></marker></defs>
    <line x1="40" y1="380" x2="40" y2="20" stroke="#E8C870" stroke-width="3" marker-end="url(#arr)"/>
    <line x1="20" y1="80" x2="40" y2="20" stroke="#E8C870" stroke-width="3"/>
    <line x1="60" y1="80" x2="40" y2="20" stroke="#E8C870" stroke-width="3"/>
  </svg>
</div>

<!-- S0: setup -->
<div class="slide" id="s0">
  <div style="width:100%;text-align:center;">
    <div class="linea-top">Una mujer que no depende de él</div>
    <div class="palabra-clave">para estar bien</div>
    <div class="linea-bajo">no genera esto:</div>
    <div class="divider" style="width:400px;margin:22px auto 0;"></div>
  </div>
</div>

<!-- S1: culpa/sofocamiento TACHADOS → admiración — columna vertical -->
<div class="slide" id="s1">

  <!-- Fila 1: CULPA -->
  <div class="col-card vino" id="c1" style="animation:cardInLeft .55s cubic-bezier(.2,0,.1,1) .15s forwards;">
    <div class="col-icon" style="animation-delay:.45s;">💨</div>
    <div class="col-texto-wrap">
      <div class="col-titulo tachado" id="t1">
        CULPA
        <div class="tacho-line" id="tl1" style="animation-delay:.75s;"></div>
      </div>
      <div class="col-sub vino-txt" style="animation-delay:1.1s;">que él siente por alejarse</div>
    </div>
  </div>

  <!-- Fila 2: SOFOCAMIENTO -->
  <div class="col-card vino" id="c2" style="animation:cardInLeft .55s cubic-bezier(.2,0,.1,1) .55s forwards;">
    <div class="col-icon" style="animation-delay:.85s;">🔗</div>
    <div class="col-texto-wrap">
      <div class="col-titulo tachado" id="t2">
        SOFOCAMIENTO
        <div class="tacho-line" id="tl2" style="animation-delay:1.1s;"></div>
      </div>
      <div class="col-sub vino-txt" style="animation-delay:1.45s;">en la relación</div>
    </div>
  </div>

  <!-- Fila 3: ADMIRACIÓN -->
  <div class="col-card negro" id="c3" style="animation:cardInLeft .55s cubic-bezier(.2,0,.1,1) .95s forwards;">
    <div class="col-icon" style="animation-delay:1.25s;">✦</div>
    <div class="col-texto-wrap">
      <div class="col-titulo brillante">ADMIRACIÓN</div>
      <div class="col-sub gold-txt" style="animation-delay:1.65s;">genuina y profunda</div>
    </div>
  </div>

</div>

<!-- S2: Admiración grande -->
<div class="slide" id="s2">
  <div class="pre">Genera</div>
  <div class="big">Admiración.</div>
  <div class="post">genuina · profunda · duradera</div>
  <div class="linea-final" style="width:540px;"></div>
</div>

<!-- S3: acercarse no alejarse -->
<div class="slide" id="s3">
  <div class="frase-wrap">
    <svg class="arrow-svg" width="60" height="120" viewBox="0 0 60 120">
      <defs><marker id="a1" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#E8C870"/></marker></defs>
      <line x1="30" y1="110" x2="30" y2="10" stroke="#E8C870" stroke-width="4" marker-end="url(#a1)"/>
    </svg>
    <div class="frase-txt blanca">ACERCARSE,</div>
  </div>
  <div class="conectora">no de</div>
  <div class="frase-wrap" style="animation:cardInLeft .6s ease-out 1s forwards; opacity:0;">
    <svg class="arrow-svg abajo" width="60" height="120" viewBox="0 0 60 120">
      <defs><marker id="a2" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#C97080"/></marker></defs>
      <line x1="30" y1="110" x2="30" y2="10" stroke="#C97080" stroke-width="4" marker-end="url(#a2)"/>
    </svg>
    <div class="frase-txt roja">alejarse.</div>
  </div>
  <div class="linea3" style="width:560px; margin:18px auto 0;"></div>
</div>

<script>
  const SLIDES = [
    {id:'s0', dur:3200},
    {id:'s1', dur:5000},
    {id:'s2', dur:4200},
    {id:'s3', dur:5500},
  ];
  const TRANS = 420; let cur = 0;

  function show(i) {
    const e = document.getElementById(SLIDES[i].id);
    e.style.opacity = '1'; e.style.pointerEvents = 'auto';
  }
  function hide(i, cb) {
    const e = document.getElementById(SLIDES[i].id);
    e.style.animation = `cardOut ${TRANS}ms ease-in forwards`;
    setTimeout(() => {
      e.style.opacity = '0'; e.style.pointerEvents = 'none';
      e.style.animation = ''; if (cb) cb();
    }, TRANS);
  }
  function next() {
    hide(cur, () => {
      cur++;
      if (cur < SLIDES.length) {
        setTimeout(() => {
          show(cur);
          if (cur < SLIDES.length - 1) setTimeout(next, SLIDES[cur].dur);
        }, 80);
      }
    });
  }
  show(0);
  setTimeout(next, SLIDES[0].dur);
</script>
</body>
</html>
