<!DOCTYPE html>
<html lang="es">
<head>
<style>body:not(.fonts-loaded) * { animation-play-state: paused !important; transition: none !important; }</style>
<script>document.fonts.ready.then(() => { setTimeout(() => { document.body.classList.add("fonts-loaded"); }, 1500); });</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=720">
<title>Pizarra — Magnético</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,400;1,900&family=Cormorant+Garamond:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1280px; height:720px; overflow:hidden; }

  .pizarra {
    position:absolute; inset:0; background:#F0E8D5;
    background-image:linear-gradient(rgba(139,100,60,.13) 1px,transparent 1px),linear-gradient(90deg,rgba(139,100,60,.13) 1px,transparent 1px);
    background-size:56px 56px;
  }
  .pizarra::before { content:''; position:absolute; left:0; top:0; bottom:0; width:8px; background:linear-gradient(180deg,#3D0C11,#6B1A2A,#3D0C11); }
  .pizarra::after  { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,#6B1A2A,#E8C870,#E8C870,#6B1A2A); }

  /* Slides */
  .slide { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; z-index:2; }
  @keyframes cardIn     { 0%{opacity:0;transform:translateY(60px) scale(.94)} 70%{transform:translateY(-5px) scale(1.01)} 100%{opacity:1;transform:none} }
  @keyframes cardInLeft { 0%{opacity:0;transform:translateX(-70px) scale(.94)} 70%{transform:translateX(5px) scale(1.01)} 100%{opacity:1;transform:none} }
  @keyframes cardOut    { 0%{opacity:1;transform:none} 100%{opacity:0;transform:translateY(-50px) scale(.95)} }
  @keyframes fadeIn     { to{opacity:1} }
  @keyframes lineGrow   { to{width:100%;opacity:1} }
  @keyframes pulse      { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.7;transform:scale(1.03)} }
  @keyframes glowPulse  { 0%,100%{text-shadow:2px 3px 0 rgba(61,12,17,.15)} 50%{text-shadow:0 0 30px rgba(61,12,17,.35),2px 3px 0 rgba(61,12,17,.15)} }
  @keyframes goldGlow   { 0%,100%{text-shadow:0 0 20px rgba(107,26,42,.4)} 50%{text-shadow:0 0 50px rgba(107,26,42,.8),0 0 80px rgba(107,26,42,.4)} }
  @keyframes wordPop    { 0%{opacity:0;transform:translateY(18px) scale(.9)} 100%{opacity:1;transform:none} }

  /* SLIDE 0 — Pregunta */
  #s0 .card {
    background:linear-gradient(135deg,#3D0C11,#6B1A2A);
    border-radius:20px; padding:52px 80px;
    box-shadow:7px 9px 0 rgba(61,12,17,.3),0 24px 60px rgba(61,12,17,.2);
    text-align:center; min-width:680px;
    opacity:0; animation:cardIn .6s ease-out .3s forwards;
  }
  #s0 .pregunta {
    font-family:'Playfair Display',serif; font-weight:900; font-style:italic;
    font-size:130px; color:#F9F3E8; line-height:.95;
    text-shadow:0 0 40px rgba(249,243,232,.3);
    animation:pulse 2s ease-in-out 1s infinite;
  }
  #s0 .sub {
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:40px; color:rgba(232,200,112,.8); margin-top:16px;
    opacity:0; animation:fadeIn .5s ease-out 1s forwards;
    letter-spacing:.08em;
  }

  /* SLIDE 1 — "no hay nada más magnético" */
  #s1 .card {
    background:#F9F3E8;
    border-radius:20px; padding:52px 80px;
    box-shadow:7px 9px 0 rgba(61,12,17,.25),0 24px 60px rgba(61,12,17,.15);
    text-align:center; max-width:1000px;
    opacity:0; animation:cardInLeft .6s ease-out .2s forwards;
    position:relative;
  }
  #s1 .tag {
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:30px; color:rgba(61,12,17,.4); letter-spacing:.1em;
    margin-bottom:14px; display:block; opacity:0;
    animation:fadeIn .4s ease-out .6s forwards;
  }
  #s1 .frase1 {
    font-family:'Playfair Display',serif; font-weight:900;
    font-size:86px; color:#3D0C11; line-height:1.0;
    text-shadow:2px 3px 0 rgba(61,12,17,.12);
    animation:glowPulse 2.5s ease-in-out 1.5s infinite;
  }
  #s1 .acento {
    font-family:'Playfair Display',serif; font-style:italic;
    font-size:78px; color:#6B1A2A; font-weight:900; line-height:1.0;
    opacity:0; animation:wordPop .55s ease-out .9s forwards;
  }
  #s1 .linea {
    height:4px; width:0; margin:18px auto 0; border-radius:2px;
    background:linear-gradient(90deg,#6B1A2A,#E8C870,#6B1A2A);
    opacity:0; animation:lineGrow .6s ease-out 1.1s forwards;
  }

  /* SLIDE 2 — "que no te necesita para existir" */
  #s2 .card {
    background:linear-gradient(135deg,#0F0A0B,#1A0810);
    border-radius:20px; padding:52px 80px;
    box-shadow:7px 9px 0 rgba(61,12,17,.35),0 24px 60px rgba(0,0,0,.3);
    text-align:center; max-width:1020px;
    opacity:0; animation:cardIn .6s ease-out .2s forwards;
  }
  #s2 .tag {
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:30px; color:rgba(232,200,112,.5); letter-spacing:.1em;
    margin-bottom:14px; display:block; opacity:0;
    animation:fadeIn .4s ease-out .6s forwards;
  }
  #s2 .frase2 {
    font-family:'Playfair Display',serif; font-weight:900;
    font-size:82px; color:#F9F3E8; line-height:1.05;
    text-shadow:0 0 30px rgba(249,243,232,.25);
  }
  #s2 .frase2 em {
    color:#E8C870; font-style:italic;
    animation:goldGlow 2.5s ease-in-out 1.5s infinite;
  }
  #s2 .linea {
    height:3px; width:0; margin:20px auto 0; border-radius:2px;
    background:linear-gradient(90deg,transparent,#E8C870,transparent);
    opacity:0; animation:lineGrow .6s ease-out 1.1s forwards;
  }

  /* SLIDE 3 — "pero que te elige de todas formas" */
  #s3 .card {
    background:linear-gradient(135deg,#6B1A2A,#3D0C11);
    border-radius:20px; padding:56px 90px;
    box-shadow:7px 9px 0 rgba(61,12,17,.35),0 30px 70px rgba(61,12,17,.25);
    text-align:center; max-width:1060px;
    opacity:0; animation:cardInLeft .65s ease-out .2s forwards;
  }
  #s3 .conector {
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:42px; color:rgba(249,243,232,.55); margin-bottom:10px;
    display:block; opacity:0; animation:fadeIn .4s ease-out .5s forwards;
  }
  #s3 .frase3 {
    font-family:'Playfair Display',serif; font-weight:900; font-style:italic;
    font-size:96px; color:#F9F3E8; line-height:1.0;
    text-shadow:0 0 40px rgba(249,243,232,.3);
  }
  #s3 .frase3 em {
    color:#E8C870; font-style:italic;
    animation:goldGlow 2.2s ease-in-out 1.5s infinite;
    display:inline;
  }
  #s3 .linea {
    height:4px; width:0; margin:22px auto 0; border-radius:2px;
    background:linear-gradient(90deg,transparent,rgba(249,243,232,.6),transparent);
    opacity:0; animation:lineGrow .7s ease-out 1.2s forwards;
  }
</style>
</head>
<body>
<div class="pizarra"></div>

<!-- S0: ¿Por qué? -->
<div class="slide" id="s0">
  <div class="card">
    <div class="pregunta">¿Por qué?</div>
    <div class="sub">Una pregunta con una sola respuesta.</div>
  </div>
</div>

<!-- S1: no hay nada más magnético -->
<div class="slide" id="s1">
  <div class="card">
    <span class="tag">Porque…</span>
    <div class="frase1">no hay nada más</div>
    <div class="acento">magnético</div>
    <div class="linea" style="width:340px;"></div>
  </div>
</div>

<!-- S2: que no te necesita para existir -->
<div class="slide" id="s2">
  <div class="card">
    <span class="tag">que una persona que…</span>
    <div class="frase2">no te <em>necesita</em><br>para existir</div>
    <div class="linea" style="width:400px;"></div>
  </div>
</div>

<!-- S3: pero que te elige de todas formas -->
<div class="slide" id="s3">
  <div class="card">
    <span class="conector">pero que…</span>
    <div class="frase3">te <em>elige</em><br>de todas formas.</div>
    <div class="linea" style="width:480px;"></div>
  </div>
</div>

<script>
  const SLIDES = [
    {id:'s0', dur:3200},
    {id:'s1', dur:4200},
    {id:'s2', dur:4200},
    {id:'s3', dur:5500},
  ];
  const TRANS = 400; let cur = 0;

  function show(i) {
    const e = document.getElementById(SLIDES[i].id);
    e.style.opacity = '1'; e.style.pointerEvents = 'auto';
  }
  function hide(i, cb) {
    const e = document.getElementById(SLIDES[i].id);
    e.style.animation = `cardOut ${TRANS}ms ease-in forwards`;
    setTimeout(() => {
      e.style.opacity = '0'; e.style.pointerEvents = 'none';
      e.style.animation = ''; if(cb) cb();
    }, TRANS);
  }
  function next() {
    hide(cur, () => {
      cur++;
      if (cur < SLIDES.length) {
        setTimeout(() => { show(cur); if(cur < SLIDES.length-1) setTimeout(next, SLIDES[cur].dur); }, 80);
      }
    });
  }

  show(0);
  setTimeout(next, SLIDES[0].dur);
</script>
</body>
</html>
