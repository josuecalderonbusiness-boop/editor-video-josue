<!DOCTYPE html>
<html lang="es">
<head>
<style>body:not(.fonts-loaded) * { animation-play-state: paused !important; transition: none !important; }</style>
<script>document.fonts.ready.then(() => { setTimeout(() => { document.body.classList.add("fonts-loaded"); }, 1500); });</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=720">
<title>Frase — No renunció al amor</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1280px; height:720px; overflow:hidden; background:#000; }
  .scene { width:1280px; height:720px; background:#0F0A0B; position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 100px; opacity:0; animation:sceneIn .8s ease-out .1s forwards; }
  @keyframes sceneIn { to{opacity:1} }
  .scene.out { animation:fadeOut .9s ease-in forwards; }
  @keyframes fadeOut { to{opacity:0} }
  .bg-glow { position:absolute; right:-100px; top:50%; transform:translateY(-50%); width:900px; height:700px; background:radial-gradient(ellipse at 65% 50%, rgba(107,26,42,.55) 0%, rgba(61,12,17,.28) 38%, transparent 68%); animation:pulseGlow 3.5s ease-in-out infinite; pointer-events:none; }
  @keyframes pulseGlow { 0%,100%{opacity:.75;transform:translateY(-50%) scale(1)} 50%{opacity:1;transform:translateY(-50%) scale(1.07)} }
  .comillas { font-family:'Playfair Display',serif; font-size:120px; font-weight:900; color:#E8C870; line-height:.75; letter-spacing:-0.05em; opacity:0; transform:translateY(-10px); animation:marksIn .55s ease-out .4s forwards, marksGlow 2.8s ease-in-out 1s infinite; display:block; text-align:center; }
  @keyframes marksIn { to{opacity:1;transform:translateY(0)} }
  @keyframes marksGlow { 0%,100%{text-shadow:0 0 15px rgba(232,200,112,1),0 0 40px rgba(220,180,60,.8)} 50%{text-shadow:0 0 35px rgba(255,248,180,1),0 0 80px rgba(232,200,112,1)} }
  .frase { font-family:'Playfair Display',serif; font-weight:900; font-size:66px; color:#FFF; line-height:1.12; text-align:center; letter-spacing:-0.01em; }
  .frase-2 { font-family:'Playfair Display',serif; font-weight:400; font-style:italic; font-size:58px; color:#F9F3E8; line-height:1.18; text-align:center; margin-top:6px; }
  .frase-gold { font-family:'Playfair Display',serif; font-weight:700; font-style:italic; font-size:64px; color:#E8C870; line-height:1.1; text-align:center; margin-top:6px; }
  .word { display:inline-block; opacity:0; filter:blur(10px); transform:translateY(16px); white-space:pre; }
  .word.visible { transition:opacity .4s ease,filter .4s ease,transform .4s ease; opacity:1; filter:blur(0); transform:translateY(0); }
  .frase .word.visible { text-shadow:0 0 20px rgba(255,255,255,1),0 0 50px rgba(255,255,255,.6); }
  .frase-2 .word.visible { text-shadow:0 0 20px rgba(249,243,232,.5); }
  .frase-gold .word.visible { text-shadow:0 0 30px rgba(232,200,112,.9),0 0 70px rgba(232,200,112,.5); animation:goldPulse 2.5s ease-in-out infinite; }
  @keyframes goldPulse { 0%,100%{text-shadow:0 0 25px rgba(232,200,112,.7)} 50%{text-shadow:0 0 55px rgba(255,245,180,1),0 0 110px rgba(232,200,112,.8)} }
  .gold-line-wrap { margin-top:24px; position:relative; height:10px; width:560px; display:none; }
  .gold-line { position:absolute; bottom:0; left:0; height:3px; width:0; border-radius:2px; background:linear-gradient(90deg,transparent,#B8892A,#E8C870,#FFF5B0,#E8C870,#D4A843,transparent); animation:growLine .9s cubic-bezier(.15,0,.1,1) forwards; }
  .gold-spark { position:absolute; bottom:-4px; left:-30px; width:55px; height:11px; background:radial-gradient(ellipse,rgba(255,245,190,1) 0%,rgba(245,228,176,.55) 45%,transparent 75%); border-radius:50%; animation:sparkSweep 1s ease-in-out .8s forwards; opacity:0; }
  @keyframes growLine { to{width:560px} }
  @keyframes sparkSweep { 0%{left:-55px;opacity:0}12%{opacity:1}88%{opacity:.9}100%{left:570px;opacity:0} }
  .author { margin-top:18px; font-family:'Cormorant Garamond',serif; font-style:italic; font-size:34px; color:#E8C870; letter-spacing:.05em; opacity:0; transform:translateY(8px); text-shadow:0 0 18px rgba(232,200,112,.6); }
</style>
</head>
<body>
<div class="scene" id="scene">
  <div class="bg-glow"></div>
  <span class="comillas">&#8220;</span>
  <div style="max-width:1080px; width:100%;">
    <p class="frase" id="l1"></p>
    <p class="frase-2" id="l2"></p>
    <p class="frase-gold" id="l3"></p>
  </div>
  <div class="gold-line-wrap" id="lineaWrap"><div class="gold-line"></div><div class="gold-spark"></div></div>
  <p class="author" id="author">— Josué Calderón</p>
</div>
<script>
  const L1 = "La Soberana no renunció al amor.";
  const L2 = "Aprendió a amar desde la elección, no desde el miedo.";
  const L3 = "Esa diferencia lo cambia todo.";
  const DURACION_MS = 11000;
  const DELAY = 700; const MS = 230;

  function buildWords(txt, id) {
    const el = document.getElementById(id);
    txt.split(" ").forEach((w,i,a) => {
      const s = document.createElement("span");
      s.className = "word";
      s.textContent = w+(i<a.length-1?" ":"");
      el.appendChild(s);
    });
    return el.querySelectorAll(".word");
  }

  const w1=buildWords(L1,"l1"), w2=buildWords(L2,"l2"), w3=buildWords(L3,"l3");
  let t=DELAY;
  w1.forEach(w=>{setTimeout(()=>w.classList.add("visible"),t);t+=MS;});
  t+=240;
  w2.forEach(w=>{setTimeout(()=>w.classList.add("visible"),t);t+=MS;});
  t+=260;
  w3.forEach(w=>{setTimeout(()=>w.classList.add("visible"),t);t+=MS;});
  const fin=t+300;
  setTimeout(()=>{document.getElementById("lineaWrap").style.display="block";},fin);
  setTimeout(()=>{const a=document.getElementById("author");a.style.transition="opacity .6s ease,transform .6s ease";a.style.opacity="1";a.style.transform="translateY(0)";},fin+520);
  setTimeout(()=>{document.getElementById("scene").classList.add("out");},DURACION_MS);
</script>
</body>
</html>
