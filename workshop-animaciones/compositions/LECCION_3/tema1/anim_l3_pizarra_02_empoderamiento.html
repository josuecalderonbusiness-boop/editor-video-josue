<!DOCTYPE html>
<html lang="es">
<head>
<style>body:not(.fonts-loaded) * { animation-play-state: paused !important; transition: none !important; }</style>
<script>document.fonts.ready.then(() => { setTimeout(() => { document.body.classList.add("fonts-loaded"); }, 1500); });</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=720">
<title>Empoderamiento mal usado</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Cormorant+Garamond:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1280px; height:720px; overflow:hidden; }
  .pizarra { position:absolute; inset:0; background:#F0E8D5; background-image:linear-gradient(rgba(139,100,60,.13) 1px,transparent 1px),linear-gradient(90deg,rgba(139,100,60,.13) 1px,transparent 1px); background-size:56px 56px; }
  .pizarra::before { content:''; position:absolute; left:0; top:0; bottom:0; width:8px; background:linear-gradient(180deg,#3D0C11,#6B1A2A,#3D0C11); }
  .pizarra::after  { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,#6B1A2A,#E8C870,#E8C870,#6B1A2A); }
  .slide { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; z-index:2; }
  @keyframes cardIn  { 0%{opacity:0;transform:translateX(80px) rotate(2deg) scale(.93)} 70%{transform:translateX(-6px) rotate(-.3deg) scale(1.01)} 100%{opacity:1;transform:none} }
  @keyframes cardOut { 0%{opacity:1;transform:none} 100%{opacity:0;transform:translateY(-60px) scale(.95)} }
  @keyframes fadeIn  { to{opacity:1} }
  @keyframes lineGrow { to{width:100%; opacity:1} }
  @keyframes checkDraw { to{stroke-dashoffset:0} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
  @keyframes glowPulse { 0%,100%{text-shadow:0 0 20px rgba(232,200,112,.6)} 50%{text-shadow:0 0 40px rgba(255,245,180,1),0 0 80px rgba(232,200,112,.7)} }
  @keyframes crackIn { 0%{opacity:0;transform:scale(1.15)} 100%{opacity:1;transform:scale(1)} }

  #s0 .titulo { font-family:'Playfair Display',serif; font-weight:900; font-size:88px; color:#3D0C11; text-align:center; line-height:1.05; opacity:0; animation:cardIn .6s ease-out .3s forwards; text-shadow:2px 3px 0 rgba(61,12,17,.12); }
  #s0 .subtitulo { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:50px; color:#6B1A2A; text-align:center; margin-top:14px; opacity:0; animation:fadeIn .5s ease-out .9s forwards; }
  #s0 .linea { height:5px; width:0; background:linear-gradient(90deg,#6B1A2A,#E8C870,#6B1A2A); border-radius:3px; margin:20px auto 0; animation:lineGrow .6s ease-out 1.1s forwards; }

  .card { border-radius:18px; padding:50px 72px; position:relative; box-shadow:6px 8px 0px rgba(61,12,17,.25),0 20px 50px rgba(61,12,17,.15); display:flex; flex-direction:column; align-items:flex-start; min-width:900px; opacity:0; }
  .card-vino  { background:linear-gradient(135deg,#3D0C11,#6B1A2A); }
  .card-negro { background:linear-gradient(135deg,#0F0A0B,#1C1114); }
  .card-medio { background:linear-gradient(135deg,#6B1A2A,#8B2D3F); }
  .card-label { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:34px; color:rgba(232,200,112,.7); margin-bottom:12px; letter-spacing:.06em; opacity:0; animation:fadeIn .3s ease-out forwards; }
  .card-palabra { font-family:'Playfair Display',serif; font-weight:900; font-size:130px; color:#F9F3E8; line-height:.9; }
  .card-contexto { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:52px; color:rgba(249,243,232,.75); margin-top:18px; line-height:1.2; opacity:0; animation:fadeIn .4s ease-out forwards; }
  .card-linea { height:3px; background:rgba(232,200,112,.5); border-radius:2px; margin:22px 0 0; width:0; opacity:0; animation:lineGrow .5s ease-out forwards; }
  .card-check { position:absolute; bottom:32px; right:40px; opacity:0; animation:fadeIn .3s ease-out forwards; }
  .card-check svg { width:50px; height:50px; }
  .c-circle { fill:none; stroke:rgba(232,200,112,.7); stroke-width:2; stroke-dasharray:110; stroke-dashoffset:110; animation:checkDraw .4s ease-out forwards; }
  .c-mark { fill:none; stroke:#F9F3E8; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; stroke-dasharray:30; stroke-dashoffset:30; animation:checkDraw .3s ease-out forwards; }

  #sfinal .card-final { background:linear-gradient(135deg,#0F0A0B,#3D0C11); border-radius:20px; padding:56px 80px; box-shadow:8px 10px 0px rgba(61,12,17,.3),0 30px 70px rgba(0,0,0,.3); min-width:1000px; text-align:center; opacity:0; animation:crackIn .7s ease-out .3s forwards; }
  #sfinal .frase-final { font-family:'Playfair Display',serif; font-style:italic; font-weight:900; font-size:70px; color:#F9F3E8; line-height:1.15; }
  #sfinal .frase-final em { color:#E8C870; animation:glowPulse 2.5s ease-in-out 1s infinite; display:inline; }
  #sfinal .linea-final { height:3px; width:0; margin:24px auto 0; background:linear-gradient(90deg,transparent,#E8C870,transparent); border-radius:2px; animation:lineGrow .6s ease-out 1s forwards; }
</style>
</head>
<body>
<div class="pizarra"></div>

<div class="slide" id="s0">
  <div style="text-align:center;">
    <p class="titulo">Empoderamiento<br>mal usado</p>
    <p class="subtitulo">¿Cómo suena por dentro?</p>
    <div class="linea" style="width:520px;"></div>
  </div>
</div>

<div class="slide" id="s1">
  <div class="card card-negro" style="animation:cardIn .55s cubic-bezier(.2,0,.1,1) .2s forwards;">
    <div class="card-label" style="animation-delay:.5s;">La armadura que construye</div>
    <div class="card-palabra" style="font-size:110px; animation:shake .6s ease-out 1s forwards;">SOY FUERTE<br>Y NADA<br>ME AFECTA</div>
    <div class="card-linea" style="animation-delay:1s; width:360px;"></div>
    <div class="card-check" style="animation-delay:1.3s;"><svg viewBox="0 0 48 48"><circle class="c-circle" cx="24" cy="24" r="20" style="animation-delay:1.3s;"/><polyline class="c-mark" points="14,24 21,32 34,16" style="animation-delay:1.7s;"/></svg></div>
  </div>
</div>

<div class="slide" id="s2">
  <div class="card card-vino" style="animation:cardIn .55s cubic-bezier(.2,0,.1,1) .2s forwards;">
    <div class="card-label" style="animation-delay:.5s;">Lo que esconde esa frase</div>
    <div class="card-palabra" style="font-size:120px; opacity:0; animation:fadeIn .5s ease-out .6s forwards;">BLINDAJE<br>EMOCIONAL</div>
    <div class="card-contexto" style="animation-delay:.9s; color:rgba(232,200,112,.8);">también.</div>
    <div class="card-linea" style="animation-delay:1.1s; width:340px;"></div>
    <div class="card-check" style="animation-delay:1.4s;"><svg viewBox="0 0 48 48"><circle class="c-circle" cx="24" cy="24" r="20" style="animation-delay:1.4s;"/><polyline class="c-mark" points="14,24 21,32 34,16" style="animation-delay:1.8s;"/></svg></div>
  </div>
</div>

<div class="slide" id="sfinal">
  <div class="card-final">
    <p class="frase-final">Sentir no es <em>debilidad.</em><br>Es la prueba de que<br>estás <em>viva.</em></p>
    <div class="linea-final" style="width:600px;"></div>
  </div>
</div>

<script>
  const SLIDES = [{id:'s0',dur:2800},{id:'s1',dur:4500},{id:'s2',dur:4500},{id:'sfinal',dur:5500}];
  const TRANS = 380; let cur = 0;
  function show(i){ const e=document.getElementById(SLIDES[i].id); e.style.opacity='1'; e.style.pointerEvents='auto'; }
  function hide(i){ const e=document.getElementById(SLIDES[i].id); e.style.animation=`cardOut ${TRANS}ms ease-in forwards`; setTimeout(()=>{ e.style.opacity='0'; e.style.pointerEvents='none'; e.style.animation=''; },TRANS); }
  function next(){ hide(cur); cur++; if(cur<SLIDES.length){ setTimeout(()=>{ show(cur); if(cur<SLIDES.length-1) setTimeout(next,SLIDES[cur].dur); },TRANS); } }
  show(0); setTimeout(next,SLIDES[0].dur);
</script>
</body>
</html>
