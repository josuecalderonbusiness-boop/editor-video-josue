<!DOCTYPE html>
<html lang="es">
<head>
<style>
  body:not(.fonts-loaded) * { animation-play-state: paused !important; transition: none !important; }
</style>
<script>
  document.fonts.ready.then(() => {
    setTimeout(() => { document.body.classList.add("fonts-loaded"); }, 1500);
  });
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=720">
<title>anim_l3 — PABLO CONTRASTE</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1280px; height:720px; overflow:hidden; background:#0F0A0B; }

  .scene {
    width:1280px; height:720px; background:#0F0A0B;
    position:relative; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:0 110px;
    opacity:0; animation:sceneIn .8s ease-out .1s forwards;
  }
  @keyframes sceneIn { to{opacity:1} }
  .scene.out { animation:fadeOut .9s ease-in forwards; }
  @keyframes fadeOut { to{opacity:0} }

  /* Glow borgoña fondo */
  .bg-glow {
    position:absolute; left:-100px; top:50%; transform:translateY(-50%);
    width:900px; height:700px;
    background:radial-gradient(ellipse at 35% 50%, rgba(107,26,42,.45) 0%, rgba(61,12,17,.22) 40%, transparent 68%);
    animation:pulseGlow 3.5s ease-in-out infinite; pointer-events:none;
  }
  @keyframes pulseGlow {
    0%,100%{opacity:.75;transform:translateY(-50%) scale(1)}
    50%{opacity:1;transform:translateY(-50%) scale(1.06)}
  }

  /* ── ACTO 1: CITA ── */
  .bloque-cita {
    position:relative; z-index:2;
    text-align:center; max-width:1020px;
    opacity:0;
    animation:bloqueIn .6s ease-out .3s forwards;
  }
  @keyframes bloqueIn { to{opacity:1} }

  .comillas {
    font-family:'Playfair Display',Georgia,serif;
    font-size:110px; font-weight:900; color:#E8C870;
    line-height:.7; letter-spacing:-0.05em;
    display:block; margin-bottom:8px;
    text-shadow:0 0 20px rgba(232,200,112,.9),0 0 50px rgba(220,180,60,.5);
    animation:marksGlow 2.8s ease-in-out 1s infinite;
  }
  @keyframes marksGlow {
    0%,100%{text-shadow:0 0 15px rgba(232,200,112,1),0 0 40px rgba(220,180,60,.8)}
    50%{text-shadow:0 0 30px rgba(255,248,180,1),0 0 70px rgba(232,200,112,1)}
  }

  .cita-texto {
    font-family:'Playfair Display',Georgia,serif;
    font-size:62px; font-weight:900; color:#FFF;
    line-height:1.12; letter-spacing:-0.01em;
    text-shadow:0 0 20px rgba(255,255,255,.8),0 0 50px rgba(255,255,255,.35);
  }
  .cita-ref {
    font-family:'Cormorant Garamond',Georgia,serif;
    font-style:italic; font-size:34px; font-weight:300;
    color:#E8C870; letter-spacing:.06em;
    margin-top:10px; display:block;
    opacity:0;
    text-shadow:0 0 18px rgba(232,200,112,.6);
  }

  .word {
    display:inline-block; opacity:0; filter:blur(8px);
    transform:translateY(14px); white-space:pre;
  }
  .word.visible {
    transition:opacity .4s ease, filter .4s ease, transform .4s ease;
    opacity:1; filter:blur(0); transform:translateY(0);
    text-shadow:0 0 20px rgba(255,255,255,1),0 0 50px rgba(255,255,255,.6),0 0 90px rgba(255,255,255,.3);
  }

  /* ── ACTO 2: TACHADO ── */
  .bloque-contraste {
    position:relative; z-index:2;
    text-align:center; margin-top:32px;
    max-width:1020px; width:100%;
    display:none;
  }

  .label-erroneo {
    font-family:'Cormorant Garamond',Georgia,serif;
    font-style:italic; font-size:28px; font-weight:300;
    color:#C97080; letter-spacing:.1em; text-transform:uppercase;
    opacity:0; display:block; margin-bottom:6px;
  }

  .texto-tachado {
    position:relative; display:inline-block;
    font-family:'Playfair Display',Georgia,serif;
    font-size:64px; font-weight:900; color:#C97080;
    line-height:1; opacity:0;
  }
  .linea-tacho {
    position:absolute; top:50%; left:0;
    height:5px; width:0; border-radius:3px;
    background:linear-gradient(90deg, #6B1A2A, #C97080, #6B1A2A);
    box-shadow:0 0 12px rgba(107,26,42,.8);
    transform:translateY(-50%);
  }

  /* ── ACTO 3: REVELACIÓN ── */
  .bloque-revelacion {
    position:relative; z-index:2;
    width:100%; text-align:center;
    display:none; padding:0 80px;
  }

  .label-verdad {
    font-family:'Cormorant Garamond',Georgia,serif;
    font-style:italic; font-size:28px; font-weight:300;
    color:#E8C870; letter-spacing:.12em; text-transform:uppercase;
    opacity:0; display:block; margin-bottom:16px;
  }

  .texto-revelado {
    font-family:'Playfair Display',Georgia,serif;
    font-weight:900; color:#FFF;
    line-height:1.1; letter-spacing:-0.01em;
  }

  .palabra-impacto {
    display:inline-block;
    font-size:110px; color:#E8C870;
    text-shadow:0 0 30px rgba(232,200,112,1),0 0 70px rgba(232,200,112,.7),0 0 120px rgba(220,180,60,.4);
    opacity:0; transform:scale(.85);
    white-space:pre;
  }
  .palabra-normal {
    display:inline-block;
    font-size:72px; color:#FFF;
    text-shadow:0 0 20px rgba(255,255,255,.7),0 0 50px rgba(255,255,255,.3);
    opacity:0; transform:scale(.9);
    white-space:pre;
  }
  .palabra-impacto.pop, .palabra-normal.pop {
    transition: opacity .45s ease, transform .45s cubic-bezier(.15,1.4,.4,1);
    opacity:1; transform:scale(1);
  }

  /* Línea dorada final */
  .gold-line-wrap {
    margin-top:24px; position:relative; height:10px;
    width:0; overflow:visible;
    display:none; margin-left:auto; margin-right:auto;
  }
  .gold-line {
    position:absolute; bottom:0; left:0; height:3px; width:0; border-radius:2px;
    background:linear-gradient(90deg,transparent 0%,#B8892A 8%,#E8C870 35%,#FFF5B0 52%,#E8C870 68%,#D4A843 88%,transparent 100%);
    animation:growLine .9s cubic-bezier(.15,0,.1,1) forwards;
  }
  .gold-spark {
    position:absolute; bottom:-4px; left:-30px; width:55px; height:11px;
    background:radial-gradient(ellipse,rgba(255,245,190,1) 0%,rgba(245,228,176,.55) 45%,transparent 75%);
    border-radius:50%; animation:sparkSweep 1s ease-in-out .8s forwards; opacity:0;
  }
  @keyframes growLine { to{width:480px} }
  @keyframes sparkSweep {
    0%{left:-55px;opacity:0}12%{opacity:1}88%{opacity:.9}100%{left:490px;opacity:0}
  }

  .firma-final {
    font-family:'Cormorant Garamond',Georgia,serif;
    font-style:italic; font-size:32px; font-weight:300;
    color:#E8C870; letter-spacing:.05em;
    opacity:0; transform:translateY(8px);
    margin-top:18px; display:block;
    text-shadow:0 0 18px rgba(232,200,112,.55);
  }
</style>
</head>
<body>
<div class="scene" id="scene">
  <div class="bg-glow"></div>

  <!-- ACTO 1: La cita -->
  <div class="bloque-cita" id="bloqueCita">
    <span class="comillas">&#8220;</span>
    <p class="cita-texto" id="citaTexto"></p>
    <span class="cita-ref" id="citaRef">— Romanos 12:2</span>
  </div>

  <!-- ACTO 2: Lo que NO dijo (tachado) -->
  <div class="bloque-contraste" id="bloqueContraste">
    <span class="label-erroneo" id="labelErr">No dijo:</span>
    <div style="display:inline-block; position:relative;">
      <span class="texto-tachado" id="textoTachado">cambia tu comportamiento</span>
      <div class="linea-tacho" id="lineaTacho"></div>
    </div>
  </div>

  <!-- ACTO 3: La revelación -->
  <div class="bloque-revelacion" id="bloqueRevelacion">
    <span class="label-verdad" id="labelVerdad">Dijo:</span>
    <div class="texto-revelado" id="textoRevelado"></div>
    <div class="gold-line-wrap" id="goldWrap" style="width:480px;">
      <div class="gold-line"></div>
      <div class="gold-spark"></div>
    </div>
    <span class="firma-final" id="firmaFinal">— Pablo, hace dos mil años.</span>
  </div>
</div>

<script>
  const DURACION_MS = 9500;

  // ── ACTO 1: palabras de la cita ──
  const CITA = "Transformaos por medio de la renovación de vuestro entendimiento.";
  const MS_PALABRA = 230;

  function buildWords(texto, el) {
    texto.split(' ').forEach((w, i, arr) => {
      const span = document.createElement('span');
      span.className = 'word';
      span.textContent = w + (i < arr.length - 1 ? ' ' : '');
      el.appendChild(span);
    });
    return el.querySelectorAll('.word');
  }

  const citaEl = document.getElementById('citaTexto');
  const words = buildWords(CITA, citaEl);

  let t = 600;
  words.forEach(w => {
    setTimeout(() => w.classList.add('visible'), t);
    t += MS_PALABRA;
  });

  // Referencia bíblica
  const tFinCita = t + 200;
  setTimeout(() => {
    const ref = document.getElementById('citaRef');
    ref.style.transition = 'opacity .6s ease';
    ref.style.opacity = '1';
  }, tFinCita);

  // ── ACTO 2: Tachado ──
  const tAct2 = tFinCita + 700;
  setTimeout(() => {
    const bc = document.getElementById('bloqueContraste');
    bc.style.display = 'block';

    const labelErr = document.getElementById('labelErr');
    labelErr.style.transition = 'opacity .4s ease';
    labelErr.style.opacity = '1';

    setTimeout(() => {
      const tt = document.getElementById('textoTachado');
      tt.style.transition = 'opacity .4s ease';
      tt.style.opacity = '1';

      setTimeout(() => {
        const lt = document.getElementById('lineaTacho');
        lt.style.transition = 'width .8s cubic-bezier(.15,0,.1,1)';
        lt.style.width = '100%';
      }, 500);
    }, 300);
  }, tAct2);

  // ── ACTO 3: Revelación ──
  const tAct3 = tAct2 + 2200;
  setTimeout(() => {
    // Ocultar actos anteriores con fade y luego display:none
    const bc1 = document.getElementById('bloqueCita');
    const bc2 = document.getElementById('bloqueContraste');
    bc1.style.transition = 'opacity .5s ease';
    bc1.style.opacity = '0';
    bc2.style.transition = 'opacity .5s ease';
    bc2.style.opacity = '0';

    setTimeout(() => {
      bc1.style.display = 'none';
      bc2.style.display = 'none';
      const br = document.getElementById('bloqueRevelacion');
      br.style.display = 'block';

      // Label "Dijo:"
      const lv = document.getElementById('labelVerdad');
      lv.style.transition = 'opacity .5s ease';
      lv.style.opacity = '1';

      // Construir palabras con énfasis
      const contenedor = document.getElementById('textoRevelado');
      const estructura = [
        { texto: 'renueva ', impacto: true },
        { texto: 'el ', impacto: false },
        { texto: 'sistema', impacto: true },
        { texto: ' que produce', impacto: false },
        { texto: '\nese comportamiento', impacto: false },
      ];

      estructura.forEach(item => {
        if (item.texto === '\nese comportamiento') {
          contenedor.appendChild(document.createElement('br'));
          const sp = document.createElement('span');
          sp.className = 'palabra-normal';
          sp.textContent = 'ese comportamiento';
          contenedor.appendChild(sp);
        } else {
          const sp = document.createElement('span');
          sp.className = item.impacto ? 'palabra-impacto' : 'palabra-normal';
          sp.textContent = item.texto;
          contenedor.appendChild(sp);
        }
      });

      const pals = contenedor.querySelectorAll('.palabra-impacto, .palabra-normal');
      let pt = 400;
      pals.forEach(p => {
        setTimeout(() => p.classList.add('pop'), pt);
        pt += 180;
      });

      // Línea dorada
      setTimeout(() => {
        const gw = document.getElementById('goldWrap');
        gw.style.display = 'block';
      }, pt + 200);

      // Firma
      setTimeout(() => {
        const ff = document.getElementById('firmaFinal');
        ff.style.transition = 'opacity .6s ease, transform .6s ease';
        ff.style.opacity = '1';
        ff.style.transform = 'translateY(0)';
      }, pt + 700);

    }, 500);
  }, tAct3);

  // Fade out final
  setTimeout(() => {
    document.getElementById('scene').classList.add('out');
  }, DURACION_MS);
</script>
</body>
</html>
