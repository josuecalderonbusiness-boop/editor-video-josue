<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>L9 — INICIO_LECCION</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,400&family=Inter:wght@300&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1280px; height:720px; overflow:hidden; background:#040F09; }
.scene {
  width:1280px; height:720px; position:relative; overflow:hidden;
  background: linear-gradient(135deg, #020A05 0%, #0A1E10 50%, #0D2418 100%);
  display:flex; align-items:center; justify-content:center;
  opacity:0; animation: fadeIn 0.4s ease forwards 0.1s, fadeOut 0.5s ease forwards 4.5s;
}
@keyframes fadeIn { to { opacity:1; } }
@keyframes fadeOut { to { opacity:0; } }
.num-bg {
  position:absolute; right:-30px; top:50%; transform:translateY(-50%) translateX(80px);
  font-family:'Playfair Display',serif; font-weight:900; font-size:620px; line-height:1;
  color:transparent; -webkit-text-stroke:2px rgba(13,36,24,0.7); user-select:none;
  opacity:0; animation: numSlide 0.8s cubic-bezier(0.25,0.46,0.45,0.94) forwards 0.2s;
}
@keyframes numSlide { to { opacity:1; transform:translateY(-50%) translateX(0); } }

/* Partículas verdes flotantes */
.particle {
  position:absolute; border-radius:50%; background:#5DCAA5; opacity:0;
  animation: particlePulse var(--d) ease-in-out infinite var(--delay);
}
@keyframes particlePulse {
  0%,100%{opacity:0;transform:translateY(0) scale(0.8)}
  50%{opacity:0.25;transform:translateY(-20px) scale(1)}
}

.accent-bar {
  position:absolute; left:60px; top:50%; transform:translateY(-50%);
  width:5px; height:0;
  background: linear-gradient(180deg, #5DCAA5, #1D9E75);
  box-shadow:0 0 20px rgba(93,202,165,0.5);
  animation: barGrow 0.6s ease forwards 0.6s;
}
@keyframes barGrow { to { height:240px; } }
.content { position:relative; z-index:10; padding-left:100px; width:100%; }
.label {
  font-family:'Inter',sans-serif; font-weight:300; font-size:15px;
  letter-spacing:6px; color:#5DCAA5; text-transform:uppercase;
  margin-bottom:12px; transform:translateX(-20px); opacity:0;
  animation: slideR 0.5s ease forwards 0.9s;
}
@keyframes slideR { to { opacity:1; transform:translateX(0); } }
.num {
  font-family:'Playfair Display',serif; font-weight:900; font-size:26px;
  color:#5DCAA5; margin-bottom:6px;
  opacity:0; animation: flash 0.35s steps(1) forwards 1.1s;
}
.t1 {
  font-family:'Playfair Display',serif; font-weight:900; font-size:88px;
  line-height:1; color:#F9F3E8;
  text-shadow:0 0 40px rgba(249,243,232,0.15);
  opacity:0; animation: flash 0.35s steps(1) forwards 1.2s;
}
.t2 {
  font-family:'Playfair Display',serif; font-weight:900; font-size:88px;
  line-height:1; color:#5DCAA5;
  text-shadow:0 0 30px rgba(93,202,165,0.35);
  opacity:0; animation: flash 0.35s steps(1) forwards 1.4s;
}
/* Guión y subtítulo */
.sub {
  font-family:'Playfair Display',serif; font-weight:400; font-style:italic;
  font-size:32px; color:#9FE1CB; margin-top:8px;
  opacity:0; animation: flash 0.35s steps(1) forwards 1.6s;
}
@keyframes flash {
  0%{opacity:0}15%{opacity:1}30%{opacity:0}50%{opacity:1}70%{opacity:0}100%{opacity:1}
}
.linea {
  width:0; height:2px; margin-top:20px;
  background:linear-gradient(90deg,#5DCAA5,transparent);
  animation:lineaGrow 0.7s ease forwards 1.9s;
  box-shadow:0 0 8px rgba(93,202,165,0.4);
}
@keyframes lineaGrow { to { width:460px; } }
</style>
</head>
<body>
<div class="scene">
  <div class="num-bg">9</div>

  <!-- Partículas verdes -->
  <div class="particle" style="width:3px;height:3px;left:12%;top:20%;--d:4s;--delay:0.5s"></div>
  <div class="particle" style="width:4px;height:4px;left:22%;top:70%;--d:5s;--delay:1.2s"></div>
  <div class="particle" style="width:2px;height:2px;left:80%;top:15%;--d:3.5s;--delay:0.3s"></div>
  <div class="particle" style="width:3px;height:3px;left:88%;top:65%;--d:4.5s;--delay:1.8s"></div>
  <div class="particle" style="width:5px;height:5px;left:50%;top:8%;--d:6s;--delay:0.8s"></div>
  <div class="particle" style="width:2px;height:2px;left:70%;top:80%;--d:3.8s;--delay:2s"></div>

  <div class="accent-bar"></div>
  <div class="content">
    <div class="label">Lección</div>
    <div class="num">09</div>
    <div class="t1">Esto no</div>
    <div class="t2">termina aquí</div>
    <div class="sub">— El siguiente nivel te espera</div>
    <div class="linea"></div>
  </div>
</div>
<script>
document.fonts.ready.then(() => { setTimeout(() => {}, 1500); });
</script>
</body>
</html>
